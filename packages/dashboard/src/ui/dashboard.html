		html += '</div>';
		html += '</div>';
	}

	return html;
}

// ── Tab 2: Crawlability ──────────────────────────────
function crawlBotPillHtml(status) {
	var labels = { allowed: '\u2705 \uD5C8\uC6A9', blocked: '\uD83D\uDEAB \uCC28\uB2E8', partial: '\u26A0\uFE0F \uBD80\uBD84 \uD5C8\uC6A9', not_specified: '\u2139\uFE0F \uBBF8\uBA85\uC2DC' };
	var cls = status === 'allowed' ? 'pill-green' : status === 'blocked' ? 'pill-red' : status === 'partial' ? 'pill-yellow' : 'pill-blue';
	return '<span class="pill ' + cls + '">' + (labels[status] || status) + '</span>';
}

function renderCrawlabilityTab(data, ed, rr) {
	var html = '';
	// Merge bot_policies: prefer rr, fallback ed
	var botPolicies = (rr && rr.crawlability && rr.crawlability.bot_policies) ? rr.crawlability.bot_policies : (ed.bot_policies || []);
	var rc = (rr && rr.crawlability) ? rr.crawlability : null;

	if (botPolicies.length === 0 && !rc) return '<div class="empty">\uD06C\uB864\uB9C1 \uC811\uADFC\uC131 \uB370\uC774\uD130 \uC5C6\uC74C</div>';

	// ── 2-column: Bot Policy Table + Blocked/Allowed Paths ──
	html += '<div class="eval-grid-2">';

	// Left: Bot Policy Table
	html += '<div class="card">';
	html += '<div class="eval-section-title"><div class="dot"></div> robots.txt AI \uBD07 \uC815\uCC45</div>';
	html += '<div style="overflow-x:auto;"><table class="geo-table-pro"><thead><tr><th>AI \uBD07 (User-Agent)</th><th>\uC11C\uBE44\uC2A4</th><th>\uD5C8\uC6A9 \uC0C1\uD0DC</th><th>\uBE44\uACE0</th></tr></thead><tbody>';
	for (var i = 0; i < botPolicies.length; i++) {
		var bot = botPolicies[i];
		var st = bot.status || bot.access || 'not_specified';
		var noteText = bot.note || bot.reason || '';
		if (!noteText && bot.disallowed_paths && bot.disallowed_paths.length > 0) {
			noteText = bot.disallowed_paths.slice(0, 3).join(', ');
		}
		if (!noteText) noteText = '\uAE30\uBCF8 \uD06C\uB864\uB7EC \uADDC\uCE59 \uC801\uC6A9';
		html += '<tr><td><code style="color:var(--accent);">' + esc(bot.bot_name || bot.bot || '') + '</code></td>';
		html += '<td>' + esc(bot.service || '') + '</td>';
		html += '<td>' + crawlBotPillHtml(st) + '</td>';
		html += '<td style="font-size:11px;color:var(--text-muted);">' + esc(noteText) + '</td></tr>';
	}
	html += '</tbody></table></div></div>';

	// Right: Blocked + Allowed Paths
	html += '<div class="card">';
	var blockedPaths = rc ? rc.blocked_paths : (ed.blocked_paths || []);
	html += '<div class="eval-section-title"><div class="dot" style="background:var(--danger);"></div> AI \uBD07\uC5D0 \uCC28\uB2E8\uB41C \uC8FC\uC694 \uACBD\uB85C</div>';
	if (blockedPaths.length > 0) {
		for (var i = 0; i < Math.min(blockedPaths.length, 6); i++) {
			var bp = blockedPaths[i];
			var pathText = typeof bp === 'string' ? bp : (bp.path || bp.url || '');
			var pathReason = typeof bp === 'object' ? (bp.reason || '') : '';
			if (!pathReason) pathReason = '\uC774 \uACBD\uB85C\uAC00 AI \uBD07\uC5D0 \uCC28\uB2E8\uB418\uC5B4 LLM\uC774 \uD574\uB2F9 \uCF58\uD150\uCE20\uC5D0 \uC811\uADFC\uD560 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.';
			html += '<div class="finding-card-geo"><span class="fc-icon">\uD83D\uDEAB</span><div><div class="fc-title">' + esc(pathText) + '</div><div class="fc-desc">' + esc(pathReason) + '</div></div></div>';
		}
	} else {
		html += '<div style="padding:16px;text-align:center;color:var(--success);font-size:13px;">\u2705 \uCC28\uB2E8\uB41C \uACBD\uB85C \uC5C6\uC74C \u2014 \uBAA8\uB4E0 AI \uBD07 \uC811\uADFC \uD5C8\uC6A9</div>';
	}
	// Allowed paths (collapsible)
	var allowedPaths = rc ? (rc.allowed_paths || []) : (ed.path_access ? ed.path_access.filter(function(p) { return p.status === 'allowed'; }) : []);
	if (allowedPaths.length > 0) {
		html += '<div style="margin-top:12px;">';
		html += collapsible('\u2705 \uD5C8\uC6A9 \uACBD\uB85C (' + allowedPaths.length + '\uAC1C)', (function() {
			var h = '';
			for (var j = 0; j < allowedPaths.length; j++) {
				var ap = allowedPaths[j];
				var apPath = typeof ap === 'string' ? ap : (ap.path || '');
				h += '<div style="padding:4px 0;font-size:12px;border-bottom:1px solid rgba(31,46,74,0.3);"><code style="color:var(--success);">' + esc(apPath) + '</code></div>';
			}
			return h;
		})());
		html += '</div>';
	}
	html += '</div>';
	html += '</div>'; // close eval-grid-2

	// ── llms.txt 현황 (full width, 3-grid) ──
	html += '<div class="card">';
	html += '<div class="eval-section-title"><div class="dot"></div> llms.txt \uD604\uD669</div>';
	html += '<div class="eval-grid-3" style="margin-bottom:0;">';
	// Card 1: llms.txt status
	var llmsExists = ed.llms_txt && ed.llms_txt.exists;
	var llmsBorder = llmsExists ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)';
	html += '<div style="padding:16px;background:var(--surface2);border-radius:' + 'var(--radius)' + ';border:1px solid ' + llmsBorder + ';">';
	html += '<div style="font-size:24px;margin-bottom:8px;">' + (llmsExists ? '\u2705' : '\u274C') + '</div>';
	html += '<div style="font-weight:700;color:' + (llmsExists ? 'var(--success)' : 'var(--danger)') + ';margin-bottom:6px;">llms.txt</div>';
	html += '<div style="font-size:12px;color:var(--text-muted);line-height:1.5;">' + (llmsExists ? 'llms.txt \uD30C\uC77C \uC874\uC7AC. LLM\uC5D0\uAC8C \uC0AC\uC774\uD2B8 \uAD6C\uC870 \uBC0F \uC778\uC6A9 \uAC00\uC774\uB4DC\uB77C\uC778 \uC81C\uACF5 \uC911.' : 'llms.txt \uBBF8\uC874\uC7AC (HTTP 404). LLM\uC5D0\uAC8C \uC0AC\uC774\uD2B8 \uAD6C\uC870\uB97C \uC548\uB0B4\uD558\uC9C0 \uBABB\uD568.') + '</div></div>';
	// Card 2: robots.txt bot coverage
	var allowedBots = botPolicies.filter(function(b) { return b.status === 'allowed' || b.status === 'partial'; }).length;
	html += '<div style="padding:16px;background:var(--surface2);border-radius:var(--radius);border:1px solid rgba(16,185,129,0.3);">';
	html += '<div style="font-size:24px;margin-bottom:8px;">\u2139\uFE0F</div>';
	html += '<div style="font-weight:700;color:var(--success);margin-bottom:6px;">robots.txt AI \uBD07 \uB300\uC751</div>';
	html += '<div style="font-size:12px;color:var(--text-muted);line-height:1.5;">' + allowedBots + '\uAC1C AI \uBD07\uC5D0 \uB300\uD574 \uBA85\uC2DC\uC801 \uC815\uCC45 \uB4F1\uB85D.</div></div>';
	// Card 3: Unspecified bots warning
	var unspecBots = botPolicies.filter(function(b) { return b.status === 'not_specified'; });
	if (unspecBots.length > 0) {
		html += '<div style="padding:16px;background:var(--surface2);border-radius:var(--radius);border:1px solid rgba(245,158,11,0.3);">';
		html += '<div style="font-size:24px;margin-bottom:8px;">\u26A0\uFE0F</div>';
		html += '<div style="font-weight:700;color:var(--warning);margin-bottom:6px;">\uBBF8\uBA85\uC2DC \uBD07 ' + unspecBots.length + '\uAC1C</div>';
		html += '<div style="font-size:12px;color:var(--text-muted);line-height:1.5;">' + unspecBots.map(function(b) { return b.bot_name || b.bot || ''; }).join(', ') + ' \uCD94\uAC00 \uAD8C\uC7A5.</div></div>';
	} else {
		html += '<div style="padding:16px;background:var(--surface2);border-radius:var(--radius);border:1px solid rgba(16,185,129,0.3);">';
		html += '<div style="font-size:24px;margin-bottom:8px;">\u2705</div>';
		html += '<div style="font-weight:700;color:var(--success);margin-bottom:6px;">\uBAA8\uB4E0 \uBD07 \uBA85\uC2DC</div>';
		html += '<div style="font-size:12px;color:var(--text-muted);line-height:1.5;">\uC8FC\uC694 AI \uBD07\uC774 \uBAA8\uB450 robots.txt\uC5D0 \uBA85\uC2DC\uB418\uC5B4 \uC788\uC2B5\uB2C8\uB2E4.</div></div>';
	}
	html += '</div>'; // close eval-grid-3
	// llms.txt content preview
	if (ed.llms_txt && ed.llms_txt.content_preview) {
		html += '<div style="margin-top:12px;padding:12px;background:var(--surface2);border-radius:8px;font-family:monospace;font-size:11px;white-space:pre-wrap;max-height:150px;overflow:auto;color:var(--text-muted);">' + esc(ed.llms_txt.content_preview) + '</div>';
	}
	html += '</div>'; // close llms.txt card

	// robots.txt raw section (collapsible)
	if (rc && rc.robots_txt_ai_section) {
		html += collapsible('robots.txt AI \uC139\uC158 \uC6D0\uBB38', '<pre style="font-size:11px;color:var(--text-muted);background:var(--surface2);padding:12px;border-radius:8px;max-height:200px;overflow:auto;white-space:pre-wrap;">' + esc(rc.robots_txt_ai_section) + '</pre>');
	}

	// Raw eval_data (collapsible, if rich report also exists)
	if (rc && ed.bot_policies) {
		html += collapsible('\uC815\uC801 \uCD94\uCD9C \uB370\uC774\uD130 (eval_data)', renderEvalCrawlability(ed));
	}

	return html;
}

// ── Tab 3: Structure ─────────────────────────────────
function renderStructureTab(data, ed, rr) {
	var html = '';
	// Rich report structured data
	if (rr && rr.structured_data) {
		var rsd = rr.structured_data;
		if (rsd.page_quality && rsd.page_quality.length > 0) {
			html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">📄 페이지별 Schema 품질 (LLM 분석)</h3>';
			html += '<table class="eval-page-table"><thead><tr><th>Page</th><th>Score</th><th>Schemas</th><th>Issues</th></tr></thead><tbody>';
			for (var i = 0; i < rsd.page_quality.length; i++) {
				var pq = rsd.page_quality[i];
				html += '<tr><td style="font-size:11px;font-family:monospace;">' + esc(pq.url || pq.page || '') + '</td>';
				html += '<td style="color:' + scoreColor(pq.score || 0) + ';font-weight:600;">' + (pq.score || 0) + '</td>';
				html += '<td style="font-size:11px;">' + esc((pq.schemas || pq.schema_types || []).join(', ')) + '</td>';
				html += '<td style="font-size:11px;color:var(--text-muted);">' + esc((pq.issues || []).join(', ') || '-') + '</td></tr>';
			}
			html += '</tbody></table></div>';
		}
		if (rsd.schema_analysis && rsd.schema_analysis.length > 0) {
			html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🏗️ Schema 분석 매트릭스</h3>';
			html += '<table class="eval-page-table"><thead><tr><th>Schema Type</th><th>Pages</th><th>Quality</th><th>LLM Utility</th></tr></thead><tbody>';
			for (var i = 0; i < rsd.schema_analysis.length; i++) {
				var sa = rsd.schema_analysis[i];
				html += '<tr><td><strong>' + esc(sa.type || sa.schema_type || '') + '</strong></td>';
				html += '<td>' + esc(String(sa.applied_pages || sa.count || 0)) + '</td>';
				html += '<td>' + esc(sa.quality || '') + '</td>';
				html += '<td>' + esc(sa.llm_utility || sa.utility || '-') + '</td></tr>';
			}
			html += '</tbody></table></div>';
		}
		if (rsd.schema_counts) {
			html += '<div class="card"><h3 style="font-size:14px;margin-bottom:8px;">Schema Counts</h3>';
			html += '<div style="display:flex;gap:12px;flex-wrap:wrap;">';
			var counts = rsd.schema_counts;
			for (var key in counts) {
				html += '<div class="rich-metric-card" style="min-width:100px;"><div class="metric-value" style="font-size:20px;">' + counts[key] + '</div><div class="metric-label">' + esc(key) + '</div></div>';
			}
			html += '</div></div>';
		}
		if (ed.schema_coverage) html += collapsible('정적 추출 데이터 (eval_data)', renderEvalStructure(ed));
		return html;
	}
	if (!ed.schema_coverage) return '<div class="empty">No structure data available.</div>';

	html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">';

	// Schema coverage table
	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🏗️ 스키마 타입별 구현 현황</h3>';
	html += '<div style="overflow-x:auto;"><table class="eval-page-table"><thead><tr><th>Schema Type</th><th>구현</th><th>품질</th><th>상세</th></tr></thead><tbody>';
	for (var i = 0; i < ed.schema_coverage.length; i++) {
		var sc = ed.schema_coverage[i];
		var qColor = sc.quality === 'excellent' ? 'var(--success)' : sc.quality === 'good' ? 'var(--success)' : sc.quality === 'partial' ? 'var(--warning)' : 'var(--danger)';
		var icon = sc.present ? '✅' : '❌';
		var qLabel = sc.quality === 'excellent' ? '우수' : sc.quality === 'good' ? '양호' : sc.quality === 'partial' ? '부분' : '없음';
		html += '<tr><td><strong>' + esc(sc.schema_type) + '</strong></td>';
		html += '<td>' + icon + '</td>';
		html += '<td style="color:' + qColor + ';font-weight:600;">' + qLabel + '</td>';
		html += '<td style="font-size:12px;color:var(--text-muted);">' + esc(sc.details) + '</td></tr>';
	}
	html += '</tbody></table></div></div>';

	// Schema implementation summary
	var present = ed.schema_coverage.filter(function(s) { return s.present; }).length;
	var total = ed.schema_coverage.length;
	var pct = Math.round(present / total * 100);
	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">📊 구조화 데이터 요약</h3>';
	html += '<div style="text-align:center;padding:20px;"><div style="font-size:48px;font-weight:800;color:' + scoreColor(pct) + ';">' + present + '/' + total + '</div>';
	html += '<div style="font-size:13px;color:var(--text-muted);">스키마 타입 구현 (' + pct + '%)</div></div>';

	// List missing critical schemas
	var missing = ed.schema_coverage.filter(function(s) { return !s.present; });
	if (missing.length > 0) {
		html += '<h3 style="font-size:13px;color:var(--danger);margin:12px 0 8px;">❌ 미구현 스키마</h3>';
		for (var i = 0; i < missing.length; i++) {
			html += '<div style="padding:6px 0;font-size:12px;border-bottom:1px solid rgba(55,65,81,0.3);"><code>' + esc(missing[i].schema_type) + '</code></div>';
		}
	}
	html += '</div></div>';

	// JS dependency
	if (ed.js_dependency) {
		var jd = ed.js_dependency;
		var depColor = jd.estimated_js_dependency > 0.6 ? 'var(--danger)' : jd.estimated_js_dependency > 0.3 ? 'var(--warning)' : 'var(--success)';
		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">⚙️ JavaScript 의존성 분석</h3>';
		html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">';
		html += '<div style="padding:12px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:24px;font-weight:800;">' + jd.script_count + '</div><div style="font-size:11px;color:var(--text-muted);">총 스크립트</div></div>';
		html += '<div style="padding:12px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:24px;font-weight:800;">' + jd.external_scripts + '</div><div style="font-size:11px;color:var(--text-muted);">외부 스크립트</div></div>';
		html += '<div style="padding:12px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:24px;font-weight:800;">' + jd.inline_scripts + '</div><div style="font-size:11px;color:var(--text-muted);">인라인 스크립트</div></div>';
		html += '<div style="padding:12px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:24px;font-weight:800;color:' + depColor + ';">' + Math.round(jd.estimated_js_dependency * 100) + '%</div><div style="font-size:11px;color:var(--text-muted);">JS 의존도</div></div>';
		html += '</div>';
		if (jd.frameworks_detected.length > 0) html += '<div style="margin-top:10px;font-size:12px;color:var(--text-muted);">감지된 프레임워크: ' + esc(jd.frameworks_detected.join(', ')) + '</div>';
		html += '</div>';
	}

	return html;
}

// ── Tab 4: Products ──────────────────────────────────
function productVisibilityScore(info) {
	var s = 0;
	if (info.specs_in_schema.length > 0) s += 35;
	if (info.prices.length > 0) s += 25;
	if (info.has_aggregate_rating) s += 20;
	if (info.specs_in_html.length > 0) s += 10;
	if (info.product_name) s += 10;
	return s;
}

function renderProductsTab(data, ed, rr) {
	var html = '';
	var products = ed.product_info || [];
	var hasAnyData = products.some(function(p) { return p.info.product_name || p.info.prices.length > 0 || p.info.specs_in_schema.length > 0 || p.info.specs_in_html.length > 0; });

	// ── Diagnostic Banner ──
	var totalPages = products.length;
	var pagesWithSchema = products.filter(function(p) { return p.info.specs_in_schema.length > 0; }).length;
	var pagesWithPrice = products.filter(function(p) { return p.info.prices.length > 0; }).length;
	var pagesWithRating = products.filter(function(p) { return p.info.has_aggregate_rating; }).length;
	var pagesWithName = products.filter(function(p) { return p.info.product_name; }).length;
	var pagesJsOnly = products.filter(function(p) { return p.info.specs_in_html.length === 0 && p.info.specs_in_schema.length === 0 && p.info.prices.length === 0; }).length;
	var avgVisibility = totalPages > 0 ? Math.round(products.reduce(function(sum, p) { return sum + productVisibilityScore(p.info); }, 0) / totalPages) : 0;

	// Severity assessment
	var severity = avgVisibility >= 60 ? 'good' : avgVisibility >= 30 ? 'warning' : 'critical';
	var severityColor = severity === 'good' ? 'var(--success)' : severity === 'warning' ? 'var(--warning)' : 'var(--danger)';
	var severityBorder = severity === 'good' ? 'rgba(16,185,129,0.3)' : severity === 'warning' ? 'rgba(245,158,11,0.3)' : 'rgba(239,68,68,0.3)';
	var severityBg = severity === 'good' ? 'rgba(16,185,129,0.05)' : severity === 'warning' ? 'rgba(245,158,11,0.05)' : 'rgba(239,68,68,0.05)';
	var severityMsg = severity === 'good'
		? '\uC81C\uD488 \uC815\uBCF4\uAC00 \uAD6C\uC870\uD654\uB418\uC5B4 \uC788\uC5B4 LLM\uC774 \uC815\uBCF4\uB97C \uC778\uC2DD\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.'
		: severity === 'warning'
		? '\uC81C\uD488 \uC815\uBCF4\uC758 \uC77C\uBD80\uB9CC LLM\uC5D0\uAC8C \uB178\uCD9C\uB429\uB2C8\uB2E4. \uAD6C\uC870\uD654 \uB370\uC774\uD130 \uBCF4\uAC15\uC774 \uD544\uC694\uD569\uB2C8\uB2E4.'
		: '\uC81C\uD488 \uC815\uBCF4\uAC00 LLM\uC5D0\uAC8C \uAC70\uC758 \uB178\uCD9C\uB418\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4. LLM \uD06C\uB864\uB7EC\uB294 \uC815\uC801 HTML\uB9CC \uC218\uC9D1\uD558\uBBC0\uB85C, JavaScript \uB80C\uB354\uB9C1\uC5D0 \uC758\uC874\uD558\uB294 \uC2A4\uD399/\uAC00\uACA9 \uB370\uC774\uD130\uB294 \uC778\uC2DD\uD560 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.';

	html += '<div class="card" style="border:1px solid ' + severityBorder + ';background:' + severityBg + ';">';
	html += '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">';
	html += '<div style="text-align:center;flex-shrink:0;">';
	html += '<div style="font-size:36px;font-weight:900;color:' + severityColor + ';">' + avgVisibility + '</div>';
	html += '<div style="font-size:10px;color:var(--text-muted);">\uC81C\uD488 \uC815\uBCF4 \uB178\uCD9C\uB3C4</div></div>';
	html += '<div style="flex:1;min-width:200px;">';
	html += '<div style="font-size:14px;font-weight:700;margin-bottom:4px;color:' + severityColor + ';">' + (severity === 'good' ? '\uC591\uD638' : severity === 'warning' ? '\uBD80\uBD84\uC801 \uB178\uCD9C' : '\uC2EC\uAC01\uD55C \uC815\uBCF4 \uBD80\uC7AC') + '</div>';
	html += '<div style="font-size:12px;color:var(--text-muted);line-height:1.6;">' + severityMsg + '</div>';
	html += '</div></div></div>';

	// ── Summary Metrics ──
	html += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;">';
	var metrics = [
		{ label: '\uBD84\uC11D \uD398\uC774\uC9C0', value: totalPages, color: 'var(--text)' },
		{ label: '\uC81C\uD488\uBA85 \uC778\uC2DD', value: pagesWithName, color: pagesWithName > 0 ? 'var(--success)' : 'var(--danger)' },
		{ label: '\uAC00\uACA9 \uB370\uC774\uD130', value: pagesWithPrice, color: pagesWithPrice > 0 ? 'var(--success)' : 'var(--danger)' },
		{ label: 'Schema \uC2A4\uD399', value: pagesWithSchema, color: pagesWithSchema > 0 ? 'var(--success)' : 'var(--danger)' },
		{ label: '\uD3C9\uC810/\uB9AC\uBDF0', value: pagesWithRating, color: pagesWithRating > 0 ? 'var(--success)' : 'var(--danger)' }
	];
	for (var mi = 0; mi < metrics.length; mi++) {
		var m = metrics[mi];
		html += '<div class="score-card-geo" style="text-align:center;padding:16px;">';
		html += '<div style="position:absolute;bottom:0;left:0;height:3px;width:100%;background:' + m.color + ';"></div>';
		html += '<div style="font-size:28px;font-weight:900;color:' + m.color + ';">' + m.value + '<span style="font-size:14px;color:var(--text-muted);">/' + totalPages + '</span></div>';
		html += '<div style="font-size:10px;color:var(--text-muted);margin-top:4px;">' + m.label + '</div></div>';
	}
	html += '</div>';

	// ── Rich Report: Category Scores ──
	if (rr && rr.products && rr.products.category_scores && rr.products.category_scores.length > 0) {
		var rp = rr.products;
		html += '<div class="card">';
		html += '<div class="eval-section-title"><div class="dot"></div> \uCE74\uD14C\uACE0\uB9AC\uBCC4 \uC778\uC2DD\uB3C4</div>';
		html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;">';
		for (var i = 0; i < rp.category_scores.length; i++) {
			var cs = rp.category_scores[i];
			var csScore = cs.score || 0;
			var csc = scoreColor(csScore);
			html += '<div style="padding:16px;background:var(--surface2);border-radius:var(--radius);border-left:4px solid ' + csc + ';text-align:center;">';
			html += '<div style="font-size:32px;font-weight:900;color:' + csc + ';">' + csScore + '</div>';
			html += '<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">' + esc(cs.category || cs.name || '') + '</div></div>';
		}
		html += '</div></div>';
	}

	// ── Per-Page Product Analysis ──
	if (hasAnyData) {
		html += '<div class="card">';
		html += '<div class="eval-section-title"><div class="dot"></div> \uD398\uC774\uC9C0\uBCC4 \uC81C\uD488 \uC815\uBCF4 \uBD84\uC11D</div>';
		html += '<div style="overflow-x:auto;"><table class="geo-table-pro"><thead><tr>';
		html += '<th>\uD398\uC774\uC9C0</th><th>\uC81C\uD488\uBA85</th><th>\uAC00\uACA9</th><th>\uD3C9\uC810</th><th>Schema \uC2A4\uD399</th><th>HTML \uC2A4\uD399</th><th>\uB178\uCD9C\uB3C4</th>';
		html += '</tr></thead><tbody>';
		for (var i = 0; i < products.length; i++) {
			var pi = products[i];
			var info = pi.info;
			var vis = productVisibilityScore(info);
			var vc = scoreColor(vis);
			var urlShort = pi.page_url.length > 40 ? '...' + pi.page_url.slice(-37) : pi.page_url;
			html += '<tr>';
			html += '<td><code style="font-size:10px;color:var(--accent);">' + esc(urlShort) + '</code></td>';
			html += '<td style="font-weight:600;">' + esc(info.product_name || '\u2014') + '</td>';
			html += '<td>' + (info.prices.length > 0 ? '<span class="pill pill-green">' + esc(info.prices[0]) + '</span>' : '<span class="pill pill-red">\uC5C6\uC74C</span>') + '</td>';
			html += '<td>' + (info.has_aggregate_rating ? '<span class="pill pill-green">' + esc(info.rating_value || '') + ' \u2605</span>' : '<span class="pill pill-red">\uC5C6\uC74C</span>') + '</td>';
			html += '<td>' + (info.specs_in_schema.length > 0 ? '<span class="pill pill-green">' + info.specs_in_schema.length + '\uAC1C</span>' : '<span class="pill pill-red">\uC5C6\uC74C</span>') + '</td>';
			html += '<td>' + (info.specs_in_html.length > 0 ? '<span class="pill pill-yellow">' + info.specs_in_html.length + '\uAC1C</span>' : '<span class="pill pill-red">\uC5C6\uC74C</span>') + '</td>';
			html += '<td><span style="font-size:16px;font-weight:800;color:' + vc + ';">' + vis + '</span></td>';
			html += '</tr>';
		}
		html += '</tbody></table></div></div>';
	}

	// ── JS-only Warning ──
	if (pagesJsOnly > 0) {
		html += '<div class="card" style="border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.05);">';
		html += '<div class="eval-section-title" style="border-bottom:none;"><div class="dot" style="background:var(--danger);"></div> JavaScript \uC758\uC874\uC131 \uACBD\uACE0</div>';
		html += '<div style="font-size:13px;color:var(--text);line-height:1.7;margin-bottom:12px;">';
		html += '<strong>' + pagesJsOnly + '\uAC1C \uD398\uC774\uC9C0</strong>\uC5D0\uC11C \uC81C\uD488 \uC815\uBCF4\uAC00 \uC815\uC801 HTML\uC5D0 \uD3EC\uD568\uB418\uC9C0 \uC54A\uC558\uC2B5\uB2C8\uB2E4. ';
		html += 'LLM \uD06C\uB864\uB7EC(GPTBot, ClaudeBot \uB4F1)\uB294 \uB300\uBD80\uBD84 <strong>JavaScript\uB97C \uC2E4\uD589\uD558\uC9C0 \uC54A\uACE0</strong> \uC815\uC801 HTML\uB9CC \uC218\uC9D1\uD569\uB2C8\uB2E4. ';
		html += '\uB530\uB77C\uC11C JS \uB80C\uB354\uB9C1 \uD6C4\uC5D0\uB9CC \uBCF4\uC774\uB294 \uC2A4\uD399/\uAC00\uACA9 \uB370\uC774\uD130\uB294 LLM\uC774 \uC778\uC2DD\uD560 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.</div>';
		html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">';
		html += '<div class="finding-card-geo"><span class="fc-icon">\uD83D\uDCA1</span><div><div class="fc-title">\uAD8C\uC7A5: Product JSON-LD \uCD94\uAC00</div><div class="fc-desc">\uC81C\uD488 \uC815\uBCF4\uB97C JSON-LD \uAD6C\uC870\uD654 \uB370\uC774\uD130\uB85C \uCD08\uAE30 HTML\uC5D0 \uD3EC\uD568\uD558\uBA74 JS \uC2E4\uD589 \uC5C6\uC774\uB3C4 LLM\uC774 \uC815\uBCF4\uB97C \uC778\uC2DD\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.</div></div></div>';
		html += '<div class="finding-card-geo"><span class="fc-icon">\uD83D\uDCA1</span><div><div class="fc-title">\uAD8C\uC7A5: SSR/SSG \uC801\uC6A9</div><div class="fc-desc">\uC11C\uBC84 \uC0AC\uC774\uB4DC \uB80C\uB354\uB9C1\uC73C\uB85C \uD575\uC2EC \uC2A4\uD399 \uB370\uC774\uD130\uB97C \uC815\uC801 HTML\uC5D0 \uD3EC\uD568\uD558\uBA74 \uBAA8\uB4E0 \uD06C\uB864\uB7EC\uAC00 \uC811\uADFC\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.</div></div></div>';
		html += '</div></div>';
	}

	// ── Rich Report: Spec Recognition Matrix ──
	if (rr && rr.products && rr.products.spec_recognition && rr.products.spec_recognition.length > 0) {
		html += '<div class="card">';
		html += '<div class="eval-section-title"><div class="dot"></div> \uC2A4\uD399 \uC778\uC2DD \uB9E4\uD2B8\uB9AD\uC2A4</div>';
		html += '<div style="overflow-x:auto;"><table class="geo-table-pro"><thead><tr><th>\uC81C\uD488</th><th>\uC2A4\uD399</th><th>Schema</th><th>HTML</th><th>LLM \uC778\uC2DD</th></tr></thead><tbody>';
		for (var i = 0; i < rr.products.spec_recognition.length; i++) {
			var sr = rr.products.spec_recognition[i];
			html += '<tr><td>' + esc(sr.product || '') + '</td><td>' + esc(sr.spec || sr.name || '') + '</td>';
			html += '<td>' + (sr.in_schema ? '<span class="pill pill-green">\u2705</span>' : '<span class="pill pill-red">\u274C</span>') + '</td>';
			html += '<td>' + (sr.in_html ? '<span class="pill pill-green">\u2705</span>' : '<span class="pill pill-red">\u274C</span>') + '</td>';
			html += '<td>' + (sr.llm_visible ? '<span class="pill pill-green">\u2705</span>' : '<span class="pill pill-red">\u274C</span>') + '</td></tr>';
		}
		html += '</tbody></table></div></div>';
	}

	// ── Explanation Footer ──
	html += '<div style="padding:12px;background:rgba(47,128,237,0.05);border-radius:8px;border:1px solid rgba(47,128,237,0.1);">';
	html += '<div style="font-size:11px;color:var(--text-muted);line-height:1.6;">';
	html += '<strong style="color:var(--text);">\uB178\uCD9C\uB3C4 \uC0B0\uCD9C \uAE30\uC900</strong>: Schema \uC2A4\uD399(35\uC810) + \uAC00\uACA9(25\uC810) + \uD3C9\uC810(20\uC810) + HTML \uC2A4\uD399(10\uC810) + \uC81C\uD488\uBA85(10\uC810). ';
	html += 'JSON-LD \uAD6C\uC870\uD654 \uB370\uC774\uD130\uAC00 \uAC00\uC7A5 \uB192\uC740 \uBE44\uC911\uC744 \uCC28\uC9C0\uD558\uBA70, \uC774\uB294 LLM\uC774 \uAC00\uC7A5 \uC815\uD655\uD558\uAC8C \uD30C\uC2F1\uD560 \uC218 \uC788\uB294 \uD615\uC2DD\uC785\uB2C8\uB2E4.';
	html += '</div></div>';

	return html;
}

// ── Tab 5: Brand ─────────────────────────────────────
function renderBrandTab(data, ed, rr) {
	var html = '';
	// Rich report brand
	if (rr && rr.brand) {
		var rb = rr.brand;
		if (rb.dimensions && rb.dimensions.length > 0) {
			html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">💬 브랜드 차원 분석 (LLM)</h3>';
			for (var i = 0; i < rb.dimensions.length; i++) {
				var bd = rb.dimensions[i];
				var bdScore = bd.score || bd.value || 0;
				html += '<div class="eval-dim-bar"><div class="bar-header"><span>' + esc(bd.name || bd.dimension || '') + '</span><span style="color:' + scoreColor(bdScore) + ';font-weight:600;">' + bdScore + '</span></div>';
				html += '<div class="bar-track"><div class="bar-fill" style="width:' + bdScore + '%;background:' + scoreColor(bdScore) + ';"></div></div>';
				if (bd.description) html += '<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">' + esc(bd.description) + '</div>';
				html += '</div>';
			}
			html += '</div>';
		}
		if (rb.claims && rb.claims.length > 0) {
			html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">Marketing Claims (LLM 분석)</h3>';
			html += '<table class="eval-page-table"><thead><tr><th>Claim</th><th>Sentiment</th><th>Verifiability</th><th>Source</th></tr></thead><tbody>';
			for (var i = 0; i < rb.claims.length; i++) {
				var cl = rb.claims[i];
				var sColor = cl.sentiment === 'positive' ? 'var(--success)' : cl.sentiment === 'negative' ? 'var(--danger)' : 'var(--text-muted)';
				var vColor = (cl.verifiability === 'verifiable' || cl.verifiability === 'factual') ? 'var(--success)' : cl.verifiability === 'partial' ? 'var(--warning)' : 'var(--danger)';
				html += '<tr><td style="font-size:12px;max-width:300px;">' + esc(cl.text || cl.claim || '') + '</td>';
				html += '<td style="color:' + sColor + ';">' + esc(cl.sentiment || '-') + '</td>';
				html += '<td style="color:' + vColor + ';font-weight:600;">' + esc(cl.verifiability || '-') + '</td>';
				html += '<td>' + (cl.has_source || cl.source ? '✅' : '❌') + '</td></tr>';
			}
			html += '</tbody></table></div>';
		}
		if (ed.marketing_claims && ed.marketing_claims.length > 0) html += collapsible('정적 추출 데이터 (eval_data)', renderEvalBrand(ed));
		return html;
	}
	if (!ed.marketing_claims || ed.marketing_claims.length === 0) return '<div class="empty">No marketing claims found. The site may use minimal marketing language.</div>';

	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">💬 마케팅 클레임 & 검증 가능성 분석</h3>';
	html += '<div style="overflow-x:auto;"><table class="eval-page-table"><thead><tr><th>클레임</th><th>위치</th><th>출처</th><th>검증성</th></tr></thead><tbody>';
	for (var i = 0; i < ed.marketing_claims.length; i++) {
		var cl = ed.marketing_claims[i];
		var vColor = cl.verifiability === 'verifiable' || cl.verifiability === 'factual' ? 'var(--success)' : cl.verifiability === 'partial' ? 'var(--warning)' : 'var(--danger)';
		var vLabel = cl.verifiability === 'verifiable' ? '검증 가능' : cl.verifiability === 'factual' ? '사실 기반' : cl.verifiability === 'partial' ? '부분 검증' : '검증 불가';
		var locShort = cl.location ? (cl.location.length > 40 ? '...' + cl.location.slice(-35) : cl.location) : '-';
		html += '<tr><td style="font-size:12px;max-width:350px;">' + esc(cl.text) + '</td>';
		html += '<td style="font-size:11px;color:var(--text-muted);font-family:monospace;">' + esc(locShort) + '</td>';
		html += '<td>' + (cl.has_source ? '✅' : '❌') + '</td>';
		html += '<td style="color:' + vColor + ';font-weight:600;">' + vLabel + '</td></tr>';
	}
	html += '</tbody></table></div>';

	// Summary stats
	var verified = ed.marketing_claims.filter(function(c) { return c.has_source; }).length;
	var total = ed.marketing_claims.length;
	html += '<div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">';
	html += '<div style="padding:10px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:20px;font-weight:700;">' + total + '</div><div style="font-size:11px;color:var(--text-muted);">총 클레임</div></div>';
	html += '<div style="padding:10px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:20px;font-weight:700;color:var(--success);">' + verified + '</div><div style="font-size:11px;color:var(--text-muted);">출처 있음</div></div>';
	html += '<div style="padding:10px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:20px;font-weight:700;color:var(--danger);">' + (total - verified) + '</div><div style="font-size:11px;color:var(--text-muted);">출처 없음</div></div>';
	html += '</div></div>';
	return html;
}

// ── Tab 6: Pages ─────────────────────────────────────
function renderPagesTab(data, rr) {
	var html = '';
	// Rich report pages
	if (rr && rr.pages && rr.pages.pages && rr.pages.pages.length > 0) {
		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🔍 페이지별 분석 (LLM)</h3>';
		html += '<table class="eval-page-table"><thead><tr><th>URL</th><th>Title</th><th>Score</th><th>Tags</th></tr></thead><tbody>';
		for (var i = 0; i < rr.pages.pages.length; i++) {
			var pg = rr.pages.pages[i];
			var pgScore = pg.score || 0;
			var urlShort = (pg.url || '').length > 50 ? '...' + (pg.url || '').slice(-45) : (pg.url || '-');
			html += '<tr><td style="font-family:monospace;font-size:11px;">' + esc(urlShort) + '</td>';
			html += '<td style="font-size:12px;">' + esc(pg.title || '-') + '</td>';
			html += '<td style="color:' + scoreColor(pgScore) + ';font-weight:600;">' + pgScore + '</td>';
			html += '<td style="font-size:11px;">';
			if (pg.tags && pg.tags.length > 0) {
				pg.tags.forEach(function(t) {
					var tColor = t === 'good' ? 'rgba(16,185,129,0.15)' : t === 'bad' ? 'rgba(239,68,68,0.15)' : 'rgba(156,163,175,0.15)';
					var tText = t === 'good' ? 'var(--success)' : t === 'bad' ? 'var(--danger)' : 'var(--text-muted)';
					html += '<span style="display:inline-block;padding:1px 6px;margin:1px;border-radius:3px;background:' + tColor + ';color:' + tText + ';font-size:10px;">' + esc(typeof t === 'string' ? t : t.name || '') + '</span>';
				});
			}
			html += '</td></tr>';
		}
		html += '</tbody></table></div>';
		if (pg && pg.description) {
			html += collapsible('Page Descriptions', (function() {
				var h = '';
				for (var i = 0; i < rr.pages.pages.length; i++) {
					var pg2 = rr.pages.pages[i];
					if (pg2.description) h += '<div style="margin-bottom:8px;padding:8px;background:var(--surface2);border-radius:6px;"><strong style="font-size:12px;">' + esc(pg2.url || '') + '</strong><div style="font-size:12px;color:var(--text-muted);margin-top:4px;">' + esc(pg2.description) + '</div></div>';
				}
				return h || '<div>No descriptions</div>';
			})());
		}
	}
	if (!data.multi_page || !data.multi_page.pages || data.multi_page.pages.length === 0) {
		if (html) return html; // rich report had data
		return '<div class="empty">Multi-page analysis not available. Only single-page analysis was performed.</div>';
	}
	var mp = data.multi_page;
	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🔍 페이지별 GEO 점수 (' + mp.page_count + ' pages)</h3>';
	html += '<div style="text-align:center;padding:16px;margin-bottom:12px;"><div style="font-size:36px;font-weight:800;color:' + scoreColor(mp.aggregate_score) + ';">' + mp.aggregate_score.toFixed(1) + '</div>';
	html += '<div style="font-size:13px;color:var(--text-muted);">가중 집계 점수 (' + esc(mp.aggregate_grade) + ')</div></div>';
	html += '<div style="overflow-x:auto;"><table class="eval-page-table"><thead><tr><th>Page URL</th><th>Score</th><th>Grade</th><th>상태</th></tr></thead><tbody>';
	for (var i = 0; i < mp.pages.length; i++) {
		var p = mp.pages[i];
		var pc = scoreColor(p.score);
		var urlShort = p.url ? (p.url.length > 60 ? '...' + p.url.slice(-55) : p.url) : p.filename;
		var tag = p.score >= 80 ? '<span style="font-size:11px;padding:2px 6px;background:rgba(16,185,129,0.15);color:var(--success);border-radius:3px;">Good</span>' :
				p.score >= 55 ? '<span style="font-size:11px;padding:2px 6px;background:rgba(245,158,11,0.15);color:var(--warning);border-radius:3px;">Needs Work</span>' :
				'<span style="font-size:11px;padding:2px 6px;background:rgba(239,68,68,0.15);color:var(--danger);border-radius:3px;">Critical</span>';
		html += '<tr><td style="font-family:monospace;font-size:12px;">' + esc(urlShort) + '</td>';
		html += '<td style="font-weight:700;color:' + pc + ';">' + p.score.toFixed(1) + '</td>';
		html += '<td>' + esc(p.grade) + '</td>';
		html += '<td>' + tag + '</td></tr>';
	}
	html += '</tbody></table></div></div>';
	return html;
}

// ── Tab 7: Recommendations ───────────────────────────
function renderRecommendationsTab(data, ed, rr) {
	var html = '';
	// Structured recommendations (LLM-generated, cached)
	var sr = data.structured_recommendations;
	if (sr && sr.items && sr.items.length > 0) {
		html += renderStructuredRecommendations(sr);
	} else {
		// Show loading + trigger async fetch
		html += '<div id="recsLoadingArea" class="card" style="text-align:center;padding:32px;color:var(--text-muted);">';
		html += '<div style="font-size:14px;margin-bottom:8px;">AI 기반 권고사항 생성 중...</div>';
		html += '<div style="font-size:12px;">분석 데이터를 종합하여 맞춤형 개선안을 작성합니다.</div>';
		html += '</div>';
		var targetId = document.getElementById('evalTargetSelect').value;
		var pipelineId = document.getElementById('evalPipelineSelect').value;
		if (targetId && pipelineId) {
			loadStructuredRecommendations(targetId, pipelineId);
		}
	}
	// Fallback: show raw data in collapsible
	var hasRawData = (rr && rr.recommendations) || (ed.improvements && ed.improvements.length > 0);
	if (hasRawData) {
		var rawHtml = '';
		if (ed.improvements && ed.improvements.length > 0) {
			rawHtml += '<table class="eval-page-table"><thead><tr><th>#</th><th>항목</th><th>영향</th><th>난이도</th><th>영향 차원</th></tr></thead><tbody>';
			for (var i = 0; i < ed.improvements.length; i++) {
				var r = ed.improvements[i];
				var impactBars = '';
				for (var j = 0; j < 5; j++) impactBars += j < r.impact ? '\u2605' : '\u2606';
				var diffLabel = r.difficulty <= 1 ? '\uC27D\uC74C' : r.difficulty <= 2 ? '\uBCF4\uD1B5' : r.difficulty <= 3 ? '\uB09C\uC774\uB3C4 \uB192\uC74C' : '\uB9E4\uC6B0 \uB09C\uD574';
				var diffColor = r.difficulty <= 1 ? 'var(--success)' : r.difficulty <= 2 ? 'var(--warning)' : 'var(--danger)';
				rawHtml += '<tr><td><code>' + esc(r.id) + '</code></td>';
				rawHtml += '<td><strong>' + esc(r.title) + '</strong></td>';
				rawHtml += '<td style="color:var(--warning);">' + impactBars + '</td>';
				rawHtml += '<td style="color:' + diffColor + ';font-weight:600;">' + diffLabel + '</td>';
				rawHtml += '<td style="font-size:11px;">' + esc(r.affected_dimensions.join(', ')) + '</td></tr>';
			}
			rawHtml += '</tbody></table>';
		}
		if (rawHtml) html += collapsible('정적 분석 기반 원본 데이터', rawHtml);
	}
	return html;
}

function renderStructuredRecommendations(sr) {
	var items = sr.items || [];
	var html = '';
	var priorityConfig = {
		critical: { label: 'CRITICAL', color: '#EF4444', bg: 'rgba(239,68,68,0.08)', border: '#EF4444' },
		high:     { label: 'HIGH',     color: '#F59E0B', bg: 'rgba(245,158,11,0.08)', border: '#F59E0B' },
		medium:   { label: 'MEDIUM',   color: '#3B82F6', bg: 'rgba(59,130,246,0.08)', border: '#3B82F6' },
		low:      { label: 'LOW',      color: '#10B981', bg: 'rgba(16,185,129,0.08)', border: '#10B981' }
	};
	for (var i = 0; i < items.length; i++) {
		var item = items[i];
		var pc = priorityConfig[item.priority] || priorityConfig.medium;
		var effortLabel = { easy: '\uC27D\uC74C', medium: '\uBCF4\uD1B5', hard: '\uB09C\uC774\uB3C4 \uB192\uC74C' }[item.effort] || item.effort || '';
		var effortColor = item.effort === 'easy' ? '#10B981' : item.effort === 'hard' ? '#EF4444' : '#F59E0B';
		html += '<div class="card" style="border-left:4px solid ' + pc.border + ';background:' + pc.bg + ';margin-bottom:12px;">';
		// Header: number + title + priority badge + effort
		html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;">';
		html += '<span style="font-size:20px;font-weight:900;color:' + pc.color + ';width:28px;">' + (i + 1) + '</span>';
		html += '<span style="font-size:15px;font-weight:700;flex:1;">' + esc(item.title || '') + '</span>';
		html += '<span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:800;background:' + pc.color + ';color:#fff;letter-spacing:0.5px;">' + pc.label + '</span>';
		html += '<span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;border:1px solid ' + effortColor + ';color:' + effortColor + ';">' + effortLabel + '</span>';
		html += '</div>';
		// Body: 3-section grid
		html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">';
		// Rationale
		html += '<div style="padding:10px 12px;background:var(--surface);border-radius:6px;">';
		html += '<div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;">\uADFC\uAC70</div>';
		html += '<div style="font-size:12px;line-height:1.6;color:var(--text);">' + esc(item.rationale || '') + '</div>';
		html += '</div>';
		// Action
		html += '<div style="padding:10px 12px;background:var(--surface);border-radius:6px;">';
		html += '<div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;">\uAC1C\uC120 \uBC29\uBC95</div>';
		html += '<div style="font-size:12px;line-height:1.6;color:var(--text);">' + esc(item.action || '') + '</div>';
		html += '</div>';
		// Expected effect
		html += '<div style="padding:10px 12px;background:var(--surface);border-radius:6px;">';
		html += '<div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;">\uAE30\uB300 \uD6A8\uACFC</div>';
		html += '<div style="font-size:12px;line-height:1.6;color:var(--text);">' + esc(item.expected_effect || '') + '</div>';
		if (item.affected_dimensions && item.affected_dimensions.length > 0) {
			html += '<div style="margin-top:6px;">';
			for (var j = 0; j < item.affected_dimensions.length; j++) {
				html += '<span style="display:inline-block;padding:1px 6px;margin-right:4px;border-radius:8px;font-size:10px;font-weight:600;background:rgba(59,130,246,0.15);color:#60A5FA;">' + esc(item.affected_dimensions[j]) + '</span>';
			}
			html += '</div>';
		}
		html += '</div>';
		html += '</div></div>';
	}
	if (sr.model) {
		html += '<div style="text-align:right;font-size:10px;color:var(--text-muted);margin-top:4px;">Generated by ' + esc(sr.model) + '</div>';

		if (implemented.length === 0) html += '<div class="empty" style="font-size:12px;">구현된 스키마 없음</div>';
		html += '</div>';

		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">❌ 미구현 스키마 (실측)</h3>';

			var critical = ['Product', 'Offer', 'AggregateRating'].indexOf(s.schema_type) >= 0;
			html += '<div style="padding:8px;margin-bottom:6px;background:' + (critical ? 'rgba(239,68,68,0.05)' : 'rgba(245,158,11,0.05)') + ';border:1px solid ' + (critical ? 'rgba(239,68,68,0.2)' : 'rgba(245,158,11,0.2)') + ';border-radius:6px;">';

			html += '<td>' + (pi.info.has_aggregate_rating ? '✅' : '❌') + '</td></tr>';
		}
		html += '</tbody></table></div></div>';
	}

	return html;
}

			html += '<div style="font-size:11px;color:var(--text-muted);"><strong>' + esc(pid) + ':</strong> ' + esc(mp.provider_errors[pid]) + '</div>';
