<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO Agent Dashboard</title>
<style>
:root {
	--bg: #0A0E1A;
	--surface: #111827;
	--surface2: #1F2937;
	--border: #374151;
	--primary: #3B82F6;
	--primary-hover: #2563EB;
	--danger: #EF4444;
	--danger-hover: #DC2626;
	--success: #10B981;
	--warning: #F59E0B;
	--text: #F3F4F6;
	--text-muted: #9CA3AF;
	--radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
	font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
	background: var(--bg);
	color: var(--text);
	min-height: 100vh;
}
.header {
	background: var(--surface);
	border-bottom: 1px solid var(--border);
	padding: 12px 24px;
	display: flex;
	align-items: center;
	justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header .status { font-size: 12px; color: var(--text-muted); }
.nav {
	background: var(--surface);
	border-bottom: 1px solid var(--border);
	display: flex;
	gap: 0;
}
.nav button {
	background: none;
	border: none;
	color: var(--text-muted);
	padding: 12px 24px;
	cursor: pointer;
	font-size: 14px;
	border-bottom: 2px solid transparent;
	transition: all 0.2s;
}
.nav button:hover { color: var(--text); background: var(--surface2); }
.nav button.active { color: var(--primary); border-bottom-color: var(--primary); }
.main { padding: 24px; max-width: 1200px; margin: 0 auto; }
.card {
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	padding: 20px;
	margin-bottom: 16px;
}
.card h2 { font-size: 16px; margin-bottom: 12px; }
.card h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
.btn {
	padding: 8px 16px;
	border: none;
	border-radius: var(--radius);
	cursor: pointer;
	font-size: 13px;
	font-weight: 500;
	transition: background 0.2s;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: var(--danger-hover); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
input, textarea, select {
	background: var(--surface2);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	color: var(--text);
	padding: 8px 12px;
	font-size: 13px;
	width: 100%;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); }
textarea { resize: vertical; min-height: 80px; font-family: monospace; }
label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.form-group { margin-bottom: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
th { color: var(--text-muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
tr:hover td { background: var(--surface2); }
.badge {
	display: inline-block;
	padding: 2px 8px;
	border-radius: 12px;
	font-size: 11px;
	font-weight: 600;
}
.badge-blue { background: #1E3A5F; color: #60A5FA; }
.badge-green { background: #064E3B; color: #34D399; }
.badge-yellow { background: #78350F; color: #FBBF24; }
.badge-red { background: #7F1D1D; color: #F87171; }
.badge-gray { background: #374151; color: #9CA3AF; }
.empty { text-align: center; color: var(--text-muted); padding: 40px; }
.actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
.modal-overlay {
	position: fixed;
	inset: 0;
	background: rgba(0,0,0,0.6);
	display: flex;
	align-items: center;
	justify-content: center;
	z-index: 100;
}
.modal {
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	padding: 24px;
	width: 560px;
	max-height: 80vh;
	overflow-y: auto;
}
.modal h2 { margin-bottom: 16px; }
.hidden { display: none !important; }
.toast {
	position: fixed;
	bottom: 24px;
	right: 24px;
	padding: 12px 20px;
	border-radius: var(--radius);
	font-size: 13px;
	z-index: 200;
	animation: fadeIn 0.3s;
}
.toast-success { background: #064E3B; color: #34D399; border: 1px solid #065F46; }
.toast-error { background: #7F1D1D; color: #F87171; border: 1px solid #991B1B; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.stage-badge { font-size: 12px; padding: 3px 10px; border-radius: 4px; font-weight: 600; }
.stage-INIT { background: #374151; color: #D1D5DB; }
.stage-ANALYZING { background: #1E3A5F; color: #60A5FA; }
.stage-CLONING { background: #312E81; color: #A5B4FC; }
.stage-STRATEGIZING { background: #78350F; color: #FBBF24; }
.stage-OPTIMIZING { background: #064E3B; color: #34D399; }
.stage-VALIDATING { background: #701A75; color: #E879F9; }
.stage-REPORTING { background: #1E3A5F; color: #67E8F9; }
.stage-COMPLETED { background: #064E3B; color: #6EE7B7; }
.stage-FAILED { background: #7F1D1D; color: #FCA5A5; }
.stage-PARTIAL_FAILURE { background: #7F1D1D; color: #FCA5A5; }
/* Pipeline expandable cards */
.pipeline-card { cursor: pointer; transition: border-color 0.2s; }
.pipeline-card:hover { border-color: var(--primary); }
.pipeline-card .expand-icon { display: inline-block; transition: transform 0.2s; font-size: 10px; margin-right: 6px; color: var(--text-muted); }
.pipeline-card.expanded .expand-icon { transform: rotate(90deg); }
.stage-list { display: none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
.pipeline-card.expanded .stage-list { display: block; }
.stage-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(55,65,81,0.4); font-size: 13px; }
.stage-item:last-child { border-bottom: none; }
.stage-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.stage-dot.completed { background: var(--success); }
.stage-dot.running { background: var(--warning); animation: stagePulse 1.5s infinite; }
.stage-dot.failed { background: var(--danger); }
.stage-dot.pending { background: var(--border); }
@keyframes stagePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.stage-prompt { color: var(--text-muted); font-size: 12px; margin-top: 2px; font-family: monospace; white-space: pre-wrap; max-height: 40px; overflow: hidden; text-overflow: ellipsis; }
.stage-result { color: var(--text); font-size: 12px; margin-top: 4px; background: var(--surface2); padding: 6px 8px; border-radius: 4px; white-space: pre-wrap; max-height: 60px; overflow: hidden; }
.stage-timing { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
.current-prompt-preview { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 600px; }
/* Evaluation styles */
.eval-score-card { display: flex; align-items: center; gap: 24px; padding: 20px; flex-wrap: wrap; }
.score-circle { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; position: relative; flex-shrink: 0; }
.score-circle::before { content: ''; position: absolute; width: 80px; height: 80px; background: var(--bg); border-radius: 50%; }
.score-circle span { position: relative; z-index: 1; }
.eval-dim-bar { margin-bottom: 10px; }
.eval-dim-bar .bar-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; }
.eval-dim-bar .bar-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; position: relative; }
.eval-dim-bar .bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
.eval-page-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.eval-page-table th { text-align: left; padding: 8px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
.eval-page-table td { padding: 8px; border-bottom: 1px solid rgba(55,65,81,0.3); }
.eval-page-table tr:hover td { background: rgba(255,255,255,0.02); }
.delta-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 700; }
.delta-positive { background: rgba(16,185,129,0.15); color: var(--success); }
.delta-negative { background: rgba(239,68,68,0.15); color: var(--danger); }
.delta-zero { background: rgba(156,163,175,0.15); color: var(--text-muted); }
.toggle { position: relative; width: 40px; height: 22px; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider {
	position: absolute; inset: 0; background: var(--border);
	border-radius: 11px; transition: 0.3s;
}
.toggle .slider::before {
	content: ''; position: absolute; width: 16px; height: 16px;
	left: 3px; bottom: 3px; background: white;
	border-radius: 50%; transition: 0.3s;
}
.toggle input:checked + .slider { background: var(--primary); }
.toggle input:checked + .slider::before { transform: translateX(18px); }
</style>
</head>
<body>
<div class="header">
	<h1>GEO Agent Dashboard</h1>
	<div class="status" id="connectionStatus">Connecting...</div>
</div>
<div class="nav">
	<button class="active" data-tab="targets">Targets</button>
	<button data-tab="pipelines">Pipelines</button>
	<button data-tab="prompts">Agent Prompts</button>
	<button data-tab="evaluation">Evaluation</button>
	<button data-tab="llm">LLM Providers</button>
</div>
<div class="main">
	<!-- Targets Tab -->
	<div id="tab-targets">
		<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
			<h2 style="font-size:18px;">Targets</h2>
			<button class="btn btn-primary" onclick="showCreateTarget()">+ New Target</button>
		</div>
		<div class="card" style="padding:0;">
			<table>
				<thead><tr><th>Name</th><th>URL</th><th>Type</th><th>Status</th><th>Created</th><th></th></tr></thead>
				<tbody id="targetsBody"></tbody>
			</table>
		</div>
	</div>

	<!-- Pipelines Tab -->
	<div id="tab-pipelines" class="hidden">
		<h2 style="font-size:18px; margin-bottom:16px;">Pipeline Status</h2>
		<div id="pipelinesContent"></div>
	</div>

	<!-- Agent Prompts Tab -->
	<div id="tab-prompts" class="hidden">
		<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
			<h2 style="font-size:18px;">Agent Prompts</h2>
			<button class="btn btn-ghost" onclick="resetAllPrompts()">Reset All</button>
		</div>
		<div id="promptsContent"></div>
	</div>

	<!-- Evaluation Tab -->
	<div id="tab-evaluation" class="hidden">
		<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px;">
			<h2 style="font-size:18px;">GEO Evaluation Results</h2>
			<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
				<select id="evalTargetSelect" onchange="onEvalTargetChange()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:var(--radius);font-size:13px;min-width:200px;">
					<option value="">Select a target...</option>
				</select>
				<select id="evalPipelineSelect" onchange="loadEvaluation()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:var(--radius);font-size:13px;min-width:260px;display:none;">
				</select>
				<button class="btn btn-primary btn-sm" onclick="loadEvaluation()">Refresh</button>
			</div>
		</div>
		<div id="evalSubTabs" class="hidden" style="display:none;overflow-x:auto;white-space:nowrap;border-bottom:1px solid var(--border);margin-bottom:16px;padding-bottom:0;">
		</div>
		<div id="evalContent">
			<div class="empty">Select a target to view evaluation results.</div>
		</div>
	</div>

	<!-- LLM Providers Tab -->
	<div id="tab-llm" class="hidden">
		<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
			<h2 style="font-size:18px;">LLM Providers</h2>
			<button class="btn btn-ghost" onclick="resetAllProviders()">Reset All</button>
		</div>
		<div id="llmContent"></div>
	</div>
</div>

<!-- Create/Edit Target Modal -->
<div id="targetModal" class="modal-overlay hidden">
	<div class="modal">
		<h2 id="targetModalTitle">New Target</h2>
		<input type="hidden" id="targetEditId">
		<div class="form-group">
			<label>Name *</label>
			<input type="text" id="targetName" placeholder="e.g., Samsung Galaxy S25">
		</div>
		<div class="form-group">
			<label>URL *</label>
			<input type="url" id="targetUrl" placeholder="https://www.samsung.com/smartphones/galaxy-s25/">
		</div>
		<div class="form-row">
			<div class="form-group">
				<label>Site Type</label>
				<select id="targetSiteType">
					<option value="generic">Generic</option>
					<option value="manufacturer">Manufacturer</option>
					<option value="research">Research</option>
				</select>
			</div>
			<div class="form-group">
				<label>Brand</label>
				<input type="text" id="targetBrand" placeholder="Samsung">
			</div>
		</div>
		<div class="form-group">
			<label>Topics (comma-separated)</label>
			<input type="text" id="targetTopics" placeholder="smartphones, galaxy, 5G">
		</div>
		<div class="form-group">
			<label>Target Score</label>
			<input type="number" id="targetScore" placeholder="80" min="0" max="100">
		</div>
		<div class="actions">
			<button class="btn btn-ghost" onclick="closeModal('targetModal')">Cancel</button>
			<button class="btn btn-primary" onclick="saveTarget()">Save</button>
		</div>
	</div>
</div>

<!-- Edit Prompt Modal -->
<div id="promptModal" class="modal-overlay hidden">
	<div class="modal">
		<h2 id="promptModalTitle">Edit Prompt</h2>
		<input type="hidden" id="promptEditId">
		<div class="form-group">
			<label>System Prompt</label>
			<textarea id="promptText" rows="12"></textarea>
		</div>
		<div class="actions">
			<button class="btn btn-ghost" onclick="closeModal('promptModal')">Cancel</button>
			<button class="btn btn-danger" onclick="resetPrompt()" style="margin-right:auto;">Reset to Default</button>
			<button class="btn btn-primary" onclick="savePrompt()">Save</button>
		</div>
	</div>
</div>

<!-- Edit LLM Provider Modal -->
<div id="llmModal" class="modal-overlay hidden">
	<div class="modal">
		<h2 id="llmModalTitle">Edit Provider</h2>
		<input type="hidden" id="llmEditId">
		<div class="form-group">
			<label>API Key</label>
			<input type="password" id="llmApiKey" placeholder="sk-...">
		</div>
		<div class="form-group">
			<label>Default Model</label>
			<input type="text" id="llmModel" placeholder="gpt-4o">
		</div>
		<div class="form-row">
			<div class="form-group">
				<label>Max Tokens</label>
				<input type="number" id="llmMaxTokens" placeholder="4096">
			</div>
			<div class="form-group">
				<label>Temperature</label>
				<input type="number" id="llmTemp" placeholder="0.7" step="0.1" min="0" max="2">
			</div>
		</div>
		<div class="actions">
			<button class="btn btn-ghost" onclick="closeModal('llmModal')">Cancel</button>
			<button class="btn btn-primary" onclick="saveLLMProvider()">Save</button>
		</div>
	</div>
</div>

<script>
const API = window.location.origin;
let targets = [];
let prompts = [];
let providers = [];

// ── Navigation (with URL hash persistence) ──────────
function switchTab(tabName) {
	document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
	var btn = document.querySelector('.nav button[data-tab="' + tabName + '"]');
	if (btn) btn.classList.add('active');
	document.querySelectorAll('.main > div[id^="tab-"]').forEach(t => t.classList.add('hidden'));
	var tabEl = document.getElementById('tab-' + tabName);
	if (tabEl) tabEl.classList.remove('hidden');
	window.location.hash = tabName;
	if (tabName === 'targets') loadTargets();
	if (tabName === 'pipelines') loadPipelines();
	if (tabName === 'prompts') loadPrompts();
	if (tabName === 'llm') loadLLMProviders();
	if (tabName === 'evaluation') initEvalTab();
}

document.querySelectorAll('.nav button').forEach(btn => {
	btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ── Toast ────────────────────────────────────────────
function toast(msg, type = 'success') {
	const el = document.createElement('div');
	el.className = 'toast toast-' + type;
	el.style.whiteSpace = 'pre-line';
	el.textContent = msg;
	document.body.appendChild(el);
	const duration = type === 'error' ? 6000 : 3000;
	setTimeout(() => el.remove(), duration);
}

// ── API helpers ──────────────────────────────────────
async function api(path, opts = {}) {
	const res = await fetch(API + path, {
		headers: { 'Content-Type': 'application/json' },
		...opts,
		body: opts.body ? JSON.stringify(opts.body) : undefined,
	});
	if (!res.ok) {
		const err = await res.json().catch(() => ({ error: res.statusText }));
		let msg = err.error || 'Request failed';
		if (err.message) msg += ': ' + err.message;
		if (err.hint) msg += '\n' + err.hint;
		throw new Error(msg);
	}
	return res.json();
}

function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

// ── Health Check ─────────────────────────────────────
async function checkHealth() {
	try {
		const data = await api('/health');
		document.getElementById('connectionStatus').textContent = 'Connected';
		document.getElementById('connectionStatus').style.color = '#34D399';
	} catch {
		document.getElementById('connectionStatus').textContent = 'Disconnected';
		document.getElementById('connectionStatus').style.color = '#F87171';
	}
}

// ── Targets ──────────────────────────────────────────
async function loadTargets() {
	try {
		targets = await api('/api/targets');
		renderTargets();
	} catch (e) { toast(e.message, 'error'); }
}

function renderTargets() {
	const tbody = document.getElementById('targetsBody');
	if (!targets.length) {
		tbody.innerHTML = '<tr><td colspan="6" class="empty">No targets yet. Click "+ New Target" to add one.</td></tr>';
		return;
	}
	tbody.innerHTML = targets.map(t => `<tr>
		<td><strong>${esc(t.name)}</strong></td>
		<td style="color:var(--text-muted);font-size:12px;">${esc(t.url)}</td>
		<td><span class="badge badge-blue">${t.site_type || 'generic'}</span></td>
		<td><span class="badge ${t.is_active ? 'badge-green' : 'badge-gray'}">${t.is_active ? 'Active' : 'Inactive'}</span></td>
		<td style="color:var(--text-muted);font-size:12px;">${new Date(t.created_at).toLocaleDateString()}</td>
		<td style="text-align:right;">
			<button class="btn btn-ghost btn-sm" onclick="editTarget('${t.id}')">Edit</button>
			<button class="btn btn-danger btn-sm" onclick="deleteTarget('${t.id}','${esc(t.name)}')">Delete</button>
		</td>
	</tr>`).join('');
}

function showCreateTarget() {
	document.getElementById('targetModalTitle').textContent = 'New Target';
	document.getElementById('targetEditId').value = '';
	document.getElementById('targetName').value = '';
	document.getElementById('targetUrl').value = '';
	document.getElementById('targetSiteType').value = 'generic';
	document.getElementById('targetBrand').value = '';
	document.getElementById('targetTopics').value = '';
	document.getElementById('targetScore').value = '80';
	document.getElementById('targetModal').classList.remove('hidden');
}

function editTarget(id) {
	const t = targets.find(x => x.id === id);
	if (!t) return;
	document.getElementById('targetModalTitle').textContent = 'Edit Target';
	document.getElementById('targetEditId').value = id;
	document.getElementById('targetName').value = t.name;
	document.getElementById('targetUrl').value = t.url;
	document.getElementById('targetSiteType').value = t.site_type || 'generic';
	document.getElementById('targetBrand').value = t.brand || '';
	document.getElementById('targetTopics').value = (t.topics || []).join(', ');
	document.getElementById('targetScore').value = t.target_score || '';
	document.getElementById('targetModal').classList.remove('hidden');
}

async function saveTarget() {
	const id = document.getElementById('targetEditId').value;
	const topicsRaw = document.getElementById('targetTopics').value;
	const body = {
		name: document.getElementById('targetName').value,
		url: document.getElementById('targetUrl').value,
		site_type: document.getElementById('targetSiteType').value,
		brand: document.getElementById('targetBrand').value || undefined,
		topics: topicsRaw ? topicsRaw.split(',').map(s => s.trim()).filter(Boolean) : [],
		target_score: Number(document.getElementById('targetScore').value) || 80,
	};
	try {
		if (id) {
			await api('/api/targets/' + id, { method: 'PUT', body });
			toast('Target updated');
		} else {
			await api('/api/targets', { method: 'POST', body });
			toast('Target created');
		}
		closeModal('targetModal');
		loadTargets();
	} catch (e) { toast(e.message, 'error'); }
}

async function deleteTarget(id, name) {
	if (!confirm('Delete target "' + name + '"?')) return;
	try {
		await api('/api/targets/' + id, { method: 'DELETE' });
		toast('Target deleted');
		loadTargets();
	} catch (e) { toast(e.message, 'error'); }
}

// ── Pipelines ────────────────────────────────────────
let pipelineRefreshTimer = null;

async function loadPipelines() {
	const container = document.getElementById('pipelinesContent');
	if (!targets.length) {
		try { targets = await api('/api/targets'); } catch {}
	}
	if (!targets.length) {
		container.innerHTML = '<div class="empty">No targets. Add a target first.</div>';
		stopPipelineAutoRefresh();
		return;
	}
	let html = '';
	let hasRunning = false;
	for (const t of targets) {
		try {
			const status = await api('/api/targets/' + t.id + '/cycle/status');
			const isRunning = !status.is_terminal;
			if (isRunning) hasRunning = true;
			const promptPreview = status.current_prompt ? esc(status.current_prompt).slice(0, 120) : '';
			const resultPreview = status.current_result ? esc(status.current_result).slice(0, 120) : '';
			const runningIndicator = isRunning ? ' <span style="animation:stagePulse 1.5s infinite;color:var(--warning);font-size:12px;">⏳ Running...</span>' : '';
			// Show elapsed time or "completed X ago"
			let timeInfo = 'Started: ' + new Date(status.started_at).toLocaleString();
			if (status.completed_at) {
				const elapsedSec = Math.round((new Date(status.completed_at) - new Date(status.started_at)) / 1000);
				const agoSec = Math.round((Date.now() - new Date(status.completed_at)) / 1000);
				const agoLabel = agoSec < 60 ? agoSec + 's ago' : agoSec < 3600 ? Math.round(agoSec/60) + 'm ago' : Math.round(agoSec/3600) + 'h ago';
				timeInfo += ' | Completed: ' + agoLabel + ' (took ' + elapsedSec + 's)';
			} else if (isRunning) {
				const runningSec = Math.round((Date.now() - new Date(status.started_at)) / 1000);
				timeInfo += ' | Running: ' + runningSec + 's';
			}
			html += `<div class="card pipeline-card" onclick="togglePipeline(this, '${t.id}', '${status.pipeline_id}')">
				<div style="display:flex;justify-content:space-between;align-items:center;">
					<div style="display:flex;align-items:center;gap:4px;flex:1;min-width:0;">
						<span class="expand-icon">&#9654;</span>
						<div style="min-width:0;">
							<h2 style="font-size:15px;">${esc(t.name)}${runningIndicator}</h2>
							<div style="font-size:12px;color:var(--text-muted);">${esc(t.url)}</div>
						</div>
					</div>
					<div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
						<span class="stage-badge stage-${status.stage}">${status.stage}</span>
						${isRunning ? '<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();stopPipeline(\''+t.id+'\')">Stop</button>' : '<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();startPipeline(\''+t.id+'\')">Re-run</button>'}
						${status.is_terminal ? '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deletePipeline(\''+t.id+'\',\''+status.pipeline_id+'\',\''+esc(t.name)+'\')">🗑️</button>' : ''}
					</div>
				</div>
				<div style="margin-top:6px;font-size:12px;color:var(--text-muted);">
					${timeInfo} | Stages: ${status.stage_count || 0} | Retries: ${status.retry_count}
				</div>
				${promptPreview ? '<div class="current-prompt-preview">' + promptPreview + '</div>' : ''}
				${resultPreview && status.is_terminal ? '<div class="current-prompt-preview" style="color:var(--success);">' + resultPreview + '</div>' : ''}
				<div class="stage-list" data-pipeline="${status.pipeline_id}">
					<div style="color:var(--text-muted);font-size:12px;">Loading stages...</div>
				</div>
			</div>`;
		} catch {
			html += `<div class="card">
				<div style="display:flex;justify-content:space-between;align-items:center;">
					<div>
						<h2 style="font-size:15px;">${esc(t.name)}</h2>
						<div style="font-size:12px;color:var(--text-muted);">${esc(t.url)}</div>
					</div>
					<div>
						<span class="badge badge-gray">No Pipeline</span>
						<button class="btn btn-primary btn-sm" style="margin-left:8px;" onclick="startPipeline('${t.id}')">Start</button>
					</div>
				</div>
			</div>`;
		}
	}
	container.innerHTML = html;

	// Auto-refresh when any pipeline is running
	if (hasRunning) {
		startPipelineAutoRefresh();
	} else {
		stopPipelineAutoRefresh();
	}
}

function startPipelineAutoRefresh() {
	if (pipelineRefreshTimer) return; // already running
	pipelineRefreshTimer = setInterval(function() {
		// Only refresh if Pipelines tab is active
		var activeTab = document.querySelector('.nav button.active');
		if (activeTab && activeTab.dataset.tab === 'pipelines') {
			loadPipelines();
		} else {
			stopPipelineAutoRefresh();
		}
	}, 3000);
}

function stopPipelineAutoRefresh() {
	if (pipelineRefreshTimer) {
		clearInterval(pipelineRefreshTimer);
		pipelineRefreshTimer = null;
	}
}

async function deletePipeline(targetId, pipelineId, targetName) {
	if (!confirm('Delete pipeline results for "' + targetName + '"? This cannot be undone.')) return;
	try {
		await api('/api/targets/' + targetId + '/pipeline/' + pipelineId, { method: 'DELETE' });
		toast('Pipeline results deleted');
		loadPipelines();
	} catch (e) { toast(e.message, 'error'); }
}

async function togglePipeline(card, targetId, pipelineId) {
	card.classList.toggle('expanded');
	const stageList = card.querySelector('.stage-list');
	// Always reload stages when expanding (no caching - supports running pipelines)
	if (card.classList.contains('expanded')) {
		try {
			const stages = await api('/api/targets/' + targetId + '/pipeline/' + pipelineId + '/stages');
			if (!stages.length) {
				stageList.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:4px 0;">No stage details available (pipeline may not have started execution yet).</div>';
			} else {
				stageList.innerHTML = stages.map(function(s) {
					const dur = s.duration_ms ? (s.duration_ms / 1000).toFixed(1) + 's' : 'running...';
					const statusIcon = s.status === 'completed' ? '✅' : s.status === 'failed' ? '❌' : s.status === 'running' ? '🔄' : '⏳';
					const resultLines = (s.result_summary || '').split('\n').slice(0, 3).join('\n');
					return '<div class="stage-item">' +
						'<div class="stage-dot ' + s.status + '"></div>' +
						'<div style="flex:1;min-width:0;">' +
							'<div style="display:flex;justify-content:space-between;align-items:center;">' +
								'<strong>' + esc(s.stage) + (s.cycle > 0 ? ' (cycle ' + s.cycle + ')' : '') + ' ' + statusIcon + '</strong>' +
								'<span class="stage-timing">' + dur + '</span>' +
							'</div>' +
							'<div class="stage-prompt">' + esc(s.prompt_summary) + '</div>' +
							(resultLines ? '<div class="stage-result">' + esc(resultLines) + '</div>' : '') +
							(s.error_message ? '<div style="color:var(--danger);font-size:12px;margin-top:2px;">Error: ' + esc(s.error_message) + '</div>' : '') +
						'</div>' +
					'</div>';
				}).join('');
			}
		} catch (e) {
			stageList.innerHTML = '<div style="color:var(--danger);font-size:12px;">Failed to load stages: ' + esc(e.message) + '</div>';
		}
	}
}

async function startPipeline(targetId) {
	try {
		await api('/api/targets/' + targetId + '/pipeline?execute=true', { method: 'POST' });
		toast('Pipeline started — watching progress...');
		// Immediately start auto-refresh and load pipelines
		startPipelineAutoRefresh();
		loadPipelines();
	} catch (e) { toast(e.message, 'error'); }
}

async function stopPipeline(targetId) {
	try {
		await api('/api/targets/' + targetId + '/cycle/stop', { method: 'POST' });
		toast('Pipeline stopped');
		loadPipelines();
	} catch (e) { toast(e.message, 'error'); }
}

// ── Evaluation ───────────────────────────────────────
let evalInitialized = false;
let currentEvalData = null;
let activeEvalSubTab = 'overview';

async function initEvalTab() {
	const select = document.getElementById('evalTargetSelect');
	if (!evalInitialized) {
		if (!targets.length) { try { targets = await api('/api/targets'); } catch {} }
		select.innerHTML = '<option value="">Select a target...</option>' +
			targets.map(function(t) { return '<option value="' + t.id + '">' + esc(t.name) + ' (' + esc(t.url) + ')</option>'; }).join('');
		evalInitialized = true;
	}
}

async function onEvalTargetChange() {
	var targetId = document.getElementById('evalTargetSelect').value;
	var pipelineSelect = document.getElementById('evalPipelineSelect');
	var container = document.getElementById('evalContent');
	var subTabsContainer = document.getElementById('evalSubTabs');

	if (!targetId) {
		pipelineSelect.style.display = 'none';
		pipelineSelect.innerHTML = '';
		container.innerHTML = '<div class="empty">Select a target to view evaluation results.</div>';
		subTabsContainer.style.display = 'none';
		return;
	}

	// Load all pipelines for this target and populate the dropdown
	try {
		var pipelines = await api('/api/targets/' + targetId + '/pipeline');
		if (!pipelines || pipelines.length === 0) {
			pipelineSelect.style.display = 'none';
			container.innerHTML = '<div class="empty">No pipeline found. Run a pipeline first.</div>';
			subTabsContainer.style.display = 'none';
			return;
		}
		pipelines.sort(function(a, b) { return new Date(b.started_at) - new Date(a.started_at); });
		pipelineSelect.innerHTML = pipelines.map(function(p, i) {
			var label = (i === 0 ? '(Latest) ' : '') + p.pipeline_id.slice(0, 8) + '... · ' + new Date(p.started_at).toLocaleString() + ' · ' + p.stage;
			return '<option value="' + p.pipeline_id + '">' + label + '</option>';
		}).join('');
		pipelineSelect.style.display = 'inline-block';
		loadEvaluation();
	} catch (e) {
		pipelineSelect.style.display = 'none';
		container.innerHTML = '<div class="empty">No pipeline found. Run a pipeline first.</div>';
		subTabsContainer.style.display = 'none';
	}
}

async function loadEvaluation() {
	var targetId = document.getElementById('evalTargetSelect').value;
	var pipelineSelect = document.getElementById('evalPipelineSelect');
	var container = document.getElementById('evalContent');
	var subTabsContainer = document.getElementById('evalSubTabs');

	if (!targetId) {
		container.innerHTML = '<div class="empty">Select a target to view evaluation results.</div>';
		subTabsContainer.style.display = 'none';
		return;
	}

	var selectedPipelineId = pipelineSelect.value;
	if (!selectedPipelineId) {
		container.innerHTML = '<div class="empty">No pipeline selected.</div>';
		subTabsContainer.style.display = 'none';
		return;
	}

	container.innerHTML = '<div class="empty">Loading evaluation...</div>';
	subTabsContainer.style.display = 'none';

	try {
		// Fetch specific pipeline info
		var pipeline = await api('/api/targets/' + targetId + '/pipeline/' + selectedPipelineId);
		var isTerminal = ['COMPLETED', 'FAILED', 'PARTIAL_FAILURE'].includes(pipeline.stage);

		// Show pipeline status header
		var statusHtml = '<div class="card" style="padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">';
		statusHtml += '<div style="font-size:12px;color:var(--text-muted);">Pipeline: <code>' + pipeline.pipeline_id.slice(0, 8) + '...</code> · Started: ' + new Date(pipeline.started_at).toLocaleString() + '</div>';
		statusHtml += '<div style="display:flex;gap:8px;align-items:center;">';
		statusHtml += '<span class="stage-badge stage-' + pipeline.stage + '">' + pipeline.stage + '</span>';
		if (!isTerminal) {
			statusHtml += '<span style="font-size:12px;color:var(--warning);animation:stagePulse 1.5s infinite;">⏳ Pipeline still running — click Refresh for latest results</span>';
		}
		statusHtml += '</div></div>';

		try {
			var evalData = await api('/api/targets/' + targetId + '/pipeline/' + selectedPipelineId + '/evaluation');
			currentEvalData = evalData;
			buildEvalSubTabs(evalData);
			subTabsContainer.style.display = 'flex';
			container.innerHTML = statusHtml;
			var evalDiv = document.createElement('div');
			evalDiv.id = 'evalSubContent';
			container.appendChild(evalDiv);
			renderEvalSubTab(activeEvalSubTab, evalData, evalDiv);
		} catch (e2) {
			if (!isTerminal) {
				container.innerHTML = statusHtml + '<div class="empty">Pipeline is running (' + pipeline.stage + '). Evaluation data will be available after ANALYZING stage completes. Click Refresh to check.</div>';
			} else {
				container.innerHTML = statusHtml + '<div class="empty">No evaluation data available for this pipeline.</div>';
			}
		}
	} catch (e) {
		container.innerHTML = '<div class="empty">Failed to load pipeline: ' + esc(e.message) + '</div>';
	}
}

function buildEvalSubTabs(data) {
	var tabs = [
		{ id: 'overview', icon: '📊', label: '종합 개요' },
		{ id: 'crawlability', icon: '🤖', label: '크롤링 접근성' },
		{ id: 'structure', icon: '🏗️', label: '구조화 데이터' },
		{ id: 'products', icon: '📦', label: '제품 정보 인식' },
		{ id: 'brand', icon: '💬', label: '브랜드 메시지' },
		{ id: 'pages', icon: '🔍', label: '페이지별 분석' },
		{ id: 'recommendations', icon: '🎯', label: '개선 권고' },
		{ id: 'evidence', icon: '🔬', label: '실증 데이터' },
		{ id: 'roadmap', icon: '🗺️', label: '개선 로드맵' },
		{ id: 'probes', icon: '🧪', label: 'Synthetic Probes' },
		{ id: 'pipeline', icon: '⏱️', label: '실행 요약' },
	];
	var html = '';
	for (var i = 0; i < tabs.length; i++) {
		var t = tabs[i];
		var active = t.id === activeEvalSubTab ? 'color:var(--primary);border-bottom:2px solid var(--primary);' : 'color:var(--text-muted);border-bottom:2px solid transparent;';
		html += '<button onclick="switchEvalSubTab(\'' + t.id + '\')" style="background:none;border:none;cursor:pointer;padding:10px 16px;font-size:13px;white-space:nowrap;transition:all 0.2s;' + active + '">' + t.icon + ' ' + t.label + '</button>';
	}
	document.getElementById('evalSubTabs').innerHTML = html;
}

function switchEvalSubTab(tabId) {
	activeEvalSubTab = tabId;
	if (currentEvalData) {
		buildEvalSubTabs(currentEvalData);
		var target = document.getElementById('evalSubContent');
		if (target) renderEvalSubTab(tabId, currentEvalData, target);
	}
}

function scoreColor(score) {
	if (score >= 75) return 'var(--success)';
	if (score >= 55) return 'var(--warning)';
	return 'var(--danger)';
}

function deltaBadge(delta) {
	var cls = delta > 0 ? 'delta-positive' : delta < 0 ? 'delta-negative' : 'delta-zero';
	var sign = delta > 0 ? '+' : '';
	return '<span class="delta-badge ' + cls + '">' + sign + delta.toFixed(1) + '</span>';
}

function findingCard(icon, title, desc) {
	return '<div style="padding:12px;margin-bottom:8px;background:var(--surface2);border-radius:6px;display:flex;gap:10px;">' +
		'<span style="font-size:18px;flex-shrink:0;">' + icon + '</span>' +
		'<div><h4 style="font-size:13px;font-weight:700;margin-bottom:4px;">' + esc(title) + '</h4>' +
		'<p style="font-size:12px;color:var(--text-muted);line-height:1.5;">' + esc(desc) + '</p></div></div>';
}

function renderSprintGroup(label, color, items) {
	if (items.length === 0) return '';
	var h = '<div style="margin-bottom:16px;">';
	h += '<div style="font-size:11px;font-weight:700;color:' + color + ';text-transform:uppercase;letter-spacing:0.7px;margin-bottom:8px;">' + label + '</div>';
	for (var i = 0; i < items.length; i++) {
		var r = items[i];
		var impactBars = '';
		for (var j = 0; j < 5; j++) impactBars += j < r.impact ? '★' : '☆';
		var diffLabel = r.difficulty <= 1 ? 'Easy' : r.difficulty <= 2 ? 'Medium' : r.difficulty <= 3 ? 'Hard' : 'Very Hard';
		var diffColor = r.difficulty <= 1 ? 'var(--success)' : r.difficulty <= 2 ? 'var(--warning)' : 'var(--danger)';
		h += '<div style="padding:10px 14px;margin-bottom:8px;background:var(--surface2);border-radius:6px;border-left:3px solid ' + (r.impact >= 4 ? 'var(--danger)' : r.impact >= 3 ? 'var(--warning)' : 'var(--success)') + ';">';
		h += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;">';
		h += '<strong style="font-size:13px;">' + esc(r.id) + ' ' + esc(r.title) + '</strong>';
		h += '<div style="display:flex;gap:8px;align-items:center;font-size:11px;">';
		h += '<span style="color:var(--warning);">' + impactBars + '</span>';
		h += '<span style="color:' + diffColor + ';font-weight:600;">' + diffLabel + '</span>';
		h += '</div></div>';
		h += '<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">' + esc(r.description) + '</div>';
		h += '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">현재: ' + esc(r.current_state) + ' · 영향: ' + r.affected_dimensions.join(', ') + '</div>';
		h += '</div>';
	}
	h += '</div>';
	return h;
}

function renderEvalSubTab(tabId, data, container) {
	var ed = data.eval_data || {};
	var html = '';
	switch (tabId) {
	case 'overview':
		html = renderOverviewTab(data, ed);
		break;
	case 'crawlability':
		html = renderCrawlabilityTab(ed);
		break;
	case 'structure':
		html = renderStructureTab(ed);
		break;
	case 'products':
		html = renderProductsTab(ed);
		break;
	case 'brand':
		html = renderBrandTab(ed);
		break;
	case 'pages':
		html = renderPagesTab(data);
		break;
	case 'recommendations':
		html = renderRecommendationsTab(ed);
		break;
	case 'evidence':
		html = renderEvidenceTab(ed);
		break;
	case 'roadmap':
		html = renderRoadmapTab(ed);
		break;
	case 'probes':
		html = renderProbesTab(data);
		break;
	case 'pipeline':
		html = renderPipelineTab(data);
		break;
	default:
		html = '<div class="empty">Unknown tab</div>';
	}
	container.innerHTML = html;
}

// ── Tab 1: Overview ──────────────────────────────────
function renderOverviewTab(data, ed) {
	var html = '';
	var color = scoreColor(data.initial_score);
	var fColor = data.delta !== 0 ? scoreColor(data.final_score) : color;

	// Score display
	html += '<div class="card eval-score-card">';
	html += '<div class="score-circle" style="background:conic-gradient(' + color + ' 0% ' + data.initial_score + '%, var(--border) ' + data.initial_score + '%);">';
	html += '<span style="color:' + color + ';">' + Math.round(data.initial_score) + '</span></div>';
	html += '<div style="flex:1;">';
	html += '<div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;">GEO Score</div>';
	html += '<div style="font-size:24px;font-weight:800;color:' + color + ';">' + data.initial_score.toFixed(1) + '/100</div>';
	html += '<div style="font-size:13px;color:var(--text-muted);">' + esc(String(data.initial_grade)) + ' · ' + esc(String(data.site_type)) + '</div>';
	html += '</div>';
	if (data.delta !== 0) {
		html += '<div style="text-align:center;padding:0 16px;"><div style="font-size:20px;">→</div>' + deltaBadge(data.delta) + '</div>';
		html += '<div class="score-circle" style="background:conic-gradient(' + fColor + ' 0% ' + data.final_score + '%, var(--border) ' + data.final_score + '%);">';
		html += '<span style="color:' + fColor + ';">' + Math.round(data.final_score) + '</span></div>';
		html += '<div><div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;">Final</div>';
		html += '<div style="font-size:24px;font-weight:800;color:' + fColor + ';">' + data.final_score.toFixed(1) + '/100</div></div>';
	}
	html += '</div>';

	// 7-Dimension Scores
	if (data.dimensions && data.dimensions.length > 0) {
		html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">';
		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">📈 GEO 차원별 점수</h3>';
		for (var i = 0; i < data.dimensions.length; i++) {
			var d = data.dimensions[i];
			var c = scoreColor(d.score);
			html += '<div class="eval-dim-bar"><div class="bar-header"><span>' + esc(d.id + ' ' + d.label) + '</span><span style="color:' + c + ';font-weight:600;">' + d.score.toFixed(1) + '</span></div>';
			html += '<div class="bar-track"><div class="bar-fill" style="width:' + d.score + '%;background:' + c + ';"></div></div></div>';
		}
		html += '</div>';

		// Score summary cards (dimension highlights)
		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">📊 핵심 차원 요약</h3>';
		html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
		for (var i = 0; i < Math.min(data.dimensions.length, 4); i++) {
			var d = data.dimensions[i];
			var c = scoreColor(d.score);
			var cls = d.score >= 75 ? 'rgba(16,185,129,0.1)' : d.score >= 55 ? 'rgba(245,158,11,0.1)' : 'rgba(239,68,68,0.1)';
			html += '<div style="padding:12px;background:' + cls + ';border-radius:6px;text-align:center;">';
			html += '<div style="font-size:24px;font-weight:800;color:' + c + ';">' + Math.round(d.score) + '</div>';
			html += '<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">' + esc(d.label) + '</div></div>';
		}
		html += '</div></div></div>';
	}

	// Strengths / Weaknesses / Opportunities
	if (ed.strengths || ed.weaknesses || ed.opportunities) {
		html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">';
		// Strengths
		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">✅ 잘 된 점 (Strengths)</h3>';
		if (ed.strengths && ed.strengths.length > 0) {
			for (var i = 0; i < ed.strengths.length; i++) {
				html += findingCard(ed.strengths[i].icon, ed.strengths[i].title, ed.strengths[i].description);
			}
		} else {
			html += '<div class="empty" style="font-size:12px;">분석 완료 후 표시</div>';
		}
		html += '</div>';
		// Weaknesses
		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">⚠️ 취약점 (Weaknesses)</h3>';
		if (ed.weaknesses && ed.weaknesses.length > 0) {
			for (var i = 0; i < ed.weaknesses.length; i++) {
				html += findingCard(ed.weaknesses[i].icon, ed.weaknesses[i].title, ed.weaknesses[i].description);
			}
		} else {
			html += '<div class="empty" style="font-size:12px;">분석 완료 후 표시</div>';
		}
		html += '</div>';
		// Opportunities
		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🚀 핵심 기회 (Opportunities)</h3>';
		if (ed.opportunities && ed.opportunities.length > 0) {
			for (var i = 0; i < ed.opportunities.length; i++) {
				html += findingCard(ed.opportunities[i].icon, ed.opportunities[i].title, ed.opportunities[i].description);

}

// ── Tab 2: Crawlability ──────────────────────────────
function renderCrawlabilityTab(ed) {
	var html = '';
	if (!ed.bot_policies) return '<div class="empty">No crawlability data available.</div>';

	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🤖 robots.txt AI 봇 정책</h3>';
	html += '<div style="overflow-x:auto;"><table class="eval-page-table"><thead><tr><th>AI 봇 (User-Agent)</th><th>서비스</th><th>허용 상태</th><th>비고</th></tr></thead><tbody>';

		html += '<td style="' + statusStyle + ';font-weight:600;">' + statusLabel + '</td>';
		html += '<td style="font-size:11px;color:var(--text-muted);">' + (bot.disallowed_paths.length > 0 ? esc(bot.disallowed_paths.slice(0, 3).join(', ')) : '기본 크롤러 규칙 적용') + '</td></tr>';

	html += '</tbody></table></div></div>';

		for (var i = 0; i < Math.min(ed.blocked_paths.length, 8); i++) {
			html += findingCard('🚫', ed.blocked_paths[i], '이 경로가 AI 봇에 차단되어 있어 LLM이 해당 콘텐츠에 접근할 수 없습니다.');

		html += '<div class="empty" style="font-size:12px;">차단된 경로 없음</div>';

	// llms.txt status (full width)

	html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">';
	var llmsColor = ed.llms_txt && ed.llms_txt.exists ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)';
	var llmsBg = ed.llms_txt && ed.llms_txt.exists ? 'rgba(16,185,129,0.05)' : 'rgba(239,68,68,0.05)';
	html += '<div style="padding:16px;background:var(--surface2);border-radius:8px;border:1px solid ' + llmsColor + ';">';
	html += '<div style="font-size:24px;margin-bottom:8px;">' + (ed.llms_txt && ed.llms_txt.exists ? '✅' : '❌') + '</div>';
	html += '<div style="font-weight:700;color:' + (ed.llms_txt && ed.llms_txt.exists ? 'var(--success)' : 'var(--danger)') + ';margin-bottom:6px;">llms.txt</div>';
	html += '<div style="font-size:12px;color:var(--text-muted);line-height:1.5;">' + (ed.llms_txt && ed.llms_txt.exists ? 'llms.txt 파일 존재. LLM에게 사이트 정보 제공 중.' : 'llms.txt 미존재 (HTTP 404). LLM에게 사이트 구조를 안내하지 못함.') + '</div></div>';

	var partialBots = ed.bot_policies ? ed.bot_policies.filter(function(b) { return b.status === 'allowed' || b.status === 'partial'; }).length : 0;
	html += '<div style="padding:16px;background:var(--surface2);border-radius:8px;border:1px solid rgba(16,185,129,0.3);">';
	html += '<div style="font-size:24px;margin-bottom:8px;">ℹ️</div>';
	html += '<div style="font-weight:700;color:var(--success);margin-bottom:6px;">robots.txt AI 봇 대응</div>';
	html += '<div style="font-size:12px;color:var(--text-muted);line-height:1.5;">' + partialBots + '개 AI 봇에 대해 명시적 정책 등록. 최소한의 AI 봇 관리 정책 수립.</div></div>';

	var unspecBots = ed.bot_policies ? ed.bot_policies.filter(function(b) { return b.status === 'not_specified'; }) : [];
	if (unspecBots.length > 0) {
		html += '<div style="padding:16px;background:var(--surface2);border-radius:8px;border:1px solid rgba(245,158,11,0.3);">';
		html += '<div style="font-size:24px;margin-bottom:8px;">⚠️</div>';
		html += '<div style="font-weight:700;color:var(--warning);margin-bottom:6px;">미명시 봇 ' + unspecBots.length + '개</div>';
		html += '<div style="font-size:12px;color:var(--text-muted);line-height:1.5;">' + unspecBots.map(function(b) { return b.bot_name; }).join(', ') + ' 추가 권장.</div></div>';
	}
	html += '</div>';

	if (ed.llms_txt && ed.llms_txt.content_preview) {

	html += '</div>';
	return html;
}

// ── Tab 3: Structure ─────────────────────────────────
function renderStructureTab(ed) {
	var html = '';
	if (!ed.schema_coverage) return '<div class="empty">No structure data available.</div>';

	html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">';

	// Schema coverage table
	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🏗️ 스키마 타입별 구현 현황</h3>';
	html += '<div style="overflow-x:auto;"><table class="eval-page-table"><thead><tr><th>Schema Type</th><th>구현</th><th>품질</th><th>상세</th></tr></thead><tbody>';
	for (var i = 0; i < ed.schema_coverage.length; i++) {
		var sc = ed.schema_coverage[i];
		var qColor = sc.quality === 'excellent' ? 'var(--success)' : sc.quality === 'good' ? 'var(--success)' : sc.quality === 'partial' ? 'var(--warning)' : 'var(--danger)';
		var icon = sc.present ? '✅' : '❌';
		var qLabel = sc.quality === 'excellent' ? '우수' : sc.quality === 'good' ? '양호' : sc.quality === 'partial' ? '부분' : '없음';
		html += '<tr><td><strong>' + esc(sc.schema_type) + '</strong></td>';
		html += '<td>' + icon + '</td>';
		html += '<td style="color:' + qColor + ';font-weight:600;">' + qLabel + '</td>';
		html += '<td style="font-size:12px;color:var(--text-muted);">' + esc(sc.details) + '</td></tr>';
	}
	html += '</tbody></table></div></div>';

	// Schema implementation summary
	var present = ed.schema_coverage.filter(function(s) { return s.present; }).length;
	var total = ed.schema_coverage.length;
	var pct = Math.round(present / total * 100);
	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">📊 구조화 데이터 요약</h3>';
	html += '<div style="text-align:center;padding:20px;"><div style="font-size:48px;font-weight:800;color:' + scoreColor(pct) + ';">' + present + '/' + total + '</div>';
	html += '<div style="font-size:13px;color:var(--text-muted);">스키마 타입 구현 (' + pct + '%)</div></div>';

	// List missing critical schemas
	var missing = ed.schema_coverage.filter(function(s) { return !s.present; });
	if (missing.length > 0) {
		html += '<h3 style="font-size:13px;color:var(--danger);margin:12px 0 8px;">❌ 미구현 스키마</h3>';
		for (var i = 0; i < missing.length; i++) {
			html += '<div style="padding:6px 0;font-size:12px;border-bottom:1px solid rgba(55,65,81,0.3);"><code>' + esc(missing[i].schema_type) + '</code></div>';
		}
	}
	html += '</div></div>';

	// JS dependency
	if (ed.js_dependency) {
		var jd = ed.js_dependency;
		var depColor = jd.estimated_js_dependency > 0.6 ? 'var(--danger)' : jd.estimated_js_dependency > 0.3 ? 'var(--warning)' : 'var(--success)';
		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">⚙️ JavaScript 의존성 분석</h3>';
		html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">';
		html += '<div style="padding:12px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:24px;font-weight:800;">' + jd.script_count + '</div><div style="font-size:11px;color:var(--text-muted);">총 스크립트</div></div>';
		html += '<div style="padding:12px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:24px;font-weight:800;">' + jd.external_scripts + '</div><div style="font-size:11px;color:var(--text-muted);">외부 스크립트</div></div>';
		html += '<div style="padding:12px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:24px;font-weight:800;">' + jd.inline_scripts + '</div><div style="font-size:11px;color:var(--text-muted);">인라인 스크립트</div></div>';
		html += '<div style="padding:12px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:24px;font-weight:800;color:' + depColor + ';">' + Math.round(jd.estimated_js_dependency * 100) + '%</div><div style="font-size:11px;color:var(--text-muted);">JS 의존도</div></div>';
		html += '</div>';
		if (jd.frameworks_detected.length > 0) html += '<div style="margin-top:10px;font-size:12px;color:var(--text-muted);">감지된 프레임워크: ' + esc(jd.frameworks_detected.join(', ')) + '</div>';
		html += '</div>';
	}

	return html;
}

// ── Tab 4: Products ──────────────────────────────────
function renderProductsTab(ed) {
	var html = '';
	if (!ed.product_info || ed.product_info.length === 0) return '<div class="empty">No product information extracted.</div>';

	var hasProducts = ed.product_info.some(function(p) { return p.info.product_name || p.info.prices.length > 0 || p.info.specs_in_schema.length > 0; });
	if (!hasProducts) return '<div class="empty">No product data found on crawled pages. The site may rely on JavaScript rendering for product information.</div>';

	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">📦 제품 정보 인식 분석 (페이지별)</h3>';
	for (var i = 0; i < ed.product_info.length; i++) {
		var pi = ed.product_info[i];
		if (!pi.info.product_name && pi.info.prices.length === 0 && pi.info.specs_in_schema.length === 0 && pi.info.specs_in_html.length === 0) continue;

		html += '<div style="padding:14px;margin-bottom:12px;background:var(--surface2);border-radius:8px;">';
		html += '<div style="font-size:12px;color:var(--primary);font-family:monospace;margin-bottom:8px;">' + esc(pi.page_url.length > 80 ? '...' + pi.page_url.slice(-75) : pi.page_url) + '</div>';

		if (pi.info.product_name) html += '<div style="font-size:15px;font-weight:700;margin-bottom:6px;">' + esc(pi.info.product_name) + '</div>';

		html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">';

		// Price info
		html += '<div style="padding:10px;background:var(--bg);border-radius:6px;"><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">💰 가격</div>';
		if (pi.info.prices.length > 0) {
			html += '<div style="font-size:13px;color:var(--success);font-weight:600;">' + esc(pi.info.prices.slice(0, 3).join(' · ')) + '</div>';
		} else {
			html += '<div style="font-size:12px;color:var(--danger);">가격 데이터 없음</div>';
		}
		html += '</div>';

		// Rating
		html += '<div style="padding:10px;background:var(--bg);border-radius:6px;"><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">⭐ 평점</div>';
		if (pi.info.has_aggregate_rating) {
			html += '<div style="font-size:13px;color:var(--warning);font-weight:600;">' + esc(pi.info.rating_value || 'N/A') + ' (' + esc(pi.info.review_count || '0') + ' reviews)</div>';
		} else {
			html += '<div style="font-size:12px;color:var(--danger);">AggregateRating 없음</div>';
		}
		html += '</div>';

		// Schema specs
		html += '<div style="padding:10px;background:var(--bg);border-radius:6px;"><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">📐 Schema 스펙</div>';
		if (pi.info.specs_in_schema.length > 0) {
			html += '<div style="font-size:12px;color:var(--success);">' + esc(pi.info.specs_in_schema.slice(0, 5).join(', ')) + '</div>';
		} else {
			html += '<div style="font-size:12px;color:var(--danger);">additionalProperty 없음</div>';
		}
		html += '</div>';

		// HTML specs
		html += '<div style="padding:10px;background:var(--bg);border-radius:6px;"><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">📄 HTML 정적 스펙</div>';
		if (pi.info.specs_in_html.length > 0) {
			html += '<div style="font-size:12px;color:var(--text-muted);">' + esc(pi.info.specs_in_html.slice(0, 5).join(', ')) + '</div>';
		} else {
			html += '<div style="font-size:12px;color:var(--danger);">정적 스펙 없음 (JS-only?)</div>';
		}
		html += '</div></div></div>';
	}
	html += '</div>';
	return html;
}

// ── Tab 5: Brand ─────────────────────────────────────
function renderBrandTab(ed) {
	var html = '';
	if (!ed.marketing_claims || ed.marketing_claims.length === 0) return '<div class="empty">No marketing claims found. The site may use minimal marketing language.</div>';

	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">💬 마케팅 클레임 & 검증 가능성 분석</h3>';
	html += '<div style="overflow-x:auto;"><table class="eval-page-table"><thead><tr><th>클레임</th><th>위치</th><th>출처</th><th>검증성</th></tr></thead><tbody>';
	for (var i = 0; i < ed.marketing_claims.length; i++) {
		var cl = ed.marketing_claims[i];
		var vColor = cl.verifiability === 'verifiable' || cl.verifiability === 'factual' ? 'var(--success)' : cl.verifiability === 'partial' ? 'var(--warning)' : 'var(--danger)';
		var vLabel = cl.verifiability === 'verifiable' ? '검증 가능' : cl.verifiability === 'factual' ? '사실 기반' : cl.verifiability === 'partial' ? '부분 검증' : '검증 불가';
		var locShort = cl.location ? (cl.location.length > 40 ? '...' + cl.location.slice(-35) : cl.location) : '-';
		html += '<tr><td style="font-size:12px;max-width:350px;">' + esc(cl.text) + '</td>';
		html += '<td style="font-size:11px;color:var(--text-muted);font-family:monospace;">' + esc(locShort) + '</td>';
		html += '<td>' + (cl.has_source ? '✅' : '❌') + '</td>';
		html += '<td style="color:' + vColor + ';font-weight:600;">' + vLabel + '</td></tr>';
	}
	html += '</tbody></table></div>';

	// Summary stats
	var verified = ed.marketing_claims.filter(function(c) { return c.has_source; }).length;
	var total = ed.marketing_claims.length;
	html += '<div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">';
	html += '<div style="padding:10px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:20px;font-weight:700;">' + total + '</div><div style="font-size:11px;color:var(--text-muted);">총 클레임</div></div>';
	html += '<div style="padding:10px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:20px;font-weight:700;color:var(--success);">' + verified + '</div><div style="font-size:11px;color:var(--text-muted);">출처 있음</div></div>';
	html += '<div style="padding:10px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:20px;font-weight:700;color:var(--danger);">' + (total - verified) + '</div><div style="font-size:11px;color:var(--text-muted);">출처 없음</div></div>';
	html += '</div></div>';
	return html;
}

// ── Tab 6: Pages ─────────────────────────────────────
function renderPagesTab(data) {
	var html = '';
	if (!data.multi_page || !data.multi_page.pages || data.multi_page.pages.length === 0) {
		return '<div class="empty">Multi-page analysis not available. Only single-page analysis was performed.</div>';
	}
	var mp = data.multi_page;
	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🔍 페이지별 GEO 점수 (' + mp.page_count + ' pages)</h3>';
	html += '<div style="text-align:center;padding:16px;margin-bottom:12px;"><div style="font-size:36px;font-weight:800;color:' + scoreColor(mp.aggregate_score) + ';">' + mp.aggregate_score.toFixed(1) + '</div>';
	html += '<div style="font-size:13px;color:var(--text-muted);">가중 집계 점수 (' + esc(mp.aggregate_grade) + ')</div></div>';
	html += '<div style="overflow-x:auto;"><table class="eval-page-table"><thead><tr><th>Page URL</th><th>Score</th><th>Grade</th><th>상태</th></tr></thead><tbody>';
	for (var i = 0; i < mp.pages.length; i++) {
		var p = mp.pages[i];
		var pc = scoreColor(p.score);
		var urlShort = p.url ? (p.url.length > 60 ? '...' + p.url.slice(-55) : p.url) : p.filename;
		var tag = p.score >= 80 ? '<span style="font-size:11px;padding:2px 6px;background:rgba(16,185,129,0.15);color:var(--success);border-radius:3px;">Good</span>' :
				p.score >= 55 ? '<span style="font-size:11px;padding:2px 6px;background:rgba(245,158,11,0.15);color:var(--warning);border-radius:3px;">Needs Work</span>' :
				'<span style="font-size:11px;padding:2px 6px;background:rgba(239,68,68,0.15);color:var(--danger);border-radius:3px;">Critical</span>';
		html += '<tr><td style="font-family:monospace;font-size:12px;">' + esc(urlShort) + '</td>';
		html += '<td style="font-weight:700;color:' + pc + ';">' + p.score.toFixed(1) + '</td>';
		html += '<td>' + esc(p.grade) + '</td>';
		html += '<td>' + tag + '</td></tr>';
	}
	html += '</tbody></table></div></div>';
	return html;
}

// ── Tab 7: Recommendations ───────────────────────────
function renderRecommendationsTab(ed) {
	var html = '';
	if (!ed.improvements || ed.improvements.length === 0) return '<div class="empty">No recommendations generated.</div>';

	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🎯 개선 권고사항 (' + ed.improvements.length + '건)</h3>';
	html += '<div style="overflow-x:auto;"><table class="eval-page-table"><thead><tr><th>#</th><th>항목</th><th>영향</th><th>난이도</th><th>Sprint</th><th>영향 차원</th></tr></thead><tbody>';
	for (var i = 0; i < ed.improvements.length; i++) {
		var r = ed.improvements[i];
		var impactBars = '';
		for (var j = 0; j < 5; j++) impactBars += j < r.impact ? '★' : '☆';
		var diffLabel = r.difficulty <= 1 ? 'Easy' : r.difficulty <= 2 ? 'Medium' : r.difficulty <= 3 ? 'Hard' : 'Very Hard';
		var diffColor = r.difficulty <= 1 ? 'var(--success)' : r.difficulty <= 2 ? 'var(--warning)' : 'var(--danger)';
		var sprintLabel = r.sprint === 1 ? '즉시' : r.sprint === 2 ? '1~3개월' : '분기';
		html += '<tr><td><code>' + esc(r.id) + '</code></td>';
		html += '<td><strong>' + esc(r.title) + '</strong><div style="font-size:11px;color:var(--text-muted);margin-top:2px;">' + esc(r.description.slice(0, 100)) + '</div></td>';
		html += '<td style="color:var(--warning);">' + impactBars + '</td>';
		html += '<td style="color:' + diffColor + ';font-weight:600;">' + diffLabel + '</td>';
		html += '<td>' + sprintLabel + '</td>';
		html += '<td style="font-size:11px;">' + esc(r.affected_dimensions.join(', ')) + '</td></tr>';
	}
	html += '</tbody></table></div></div>';
	return html;
}

// ── Tab 8: Evidence ──────────────────────────────────
function renderEvidenceTab(ed) {
	var html = '';
	if (!ed.schema_coverage && !ed.js_dependency) return '<div class="empty">No evidence data available.</div>';

	// Schema comparison: implemented vs not
	if (ed.schema_coverage) {
		var implemented = ed.schema_coverage.filter(function(s) { return s.present; });
		var missing = ed.schema_coverage.filter(function(s) { return !s.present; });

		html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">';
		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">✅ 구현된 스키마 (실측)</h3>';
		for (var i = 0; i < implemented.length; i++) {
			var s = implemented[i];
			html += '<div style="padding:8px;margin-bottom:6px;background:rgba(16,185,129,0.05);border:1px solid rgba(16,185,129,0.2);border-radius:6px;">';
			html += '<div style="font-weight:700;font-size:13px;">' + esc(s.schema_type) + '</div>';
			html += '<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">' + esc(s.details) + ' · 품질: ' + esc(s.quality) + '</div></div>';
		}
		if (implemented.length === 0) html += '<div class="empty" style="font-size:12px;">구현된 스키마 없음</div>';
		html += '</div>';

		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">❌ 미구현 스키마 (실측)</h3>';
		for (var i = 0; i < missing.length; i++) {
			var s = missing[i];
			var critical = ['Product', 'Offer', 'AggregateRating'].indexOf(s.schema_type) >= 0;
			html += '<div style="padding:8px;margin-bottom:6px;background:' + (critical ? 'rgba(239,68,68,0.05)' : 'rgba(245,158,11,0.05)') + ';border:1px solid ' + (critical ? 'rgba(239,68,68,0.2)' : 'rgba(245,158,11,0.2)') + ';border-radius:6px;">';
			html += '<div style="font-weight:700;font-size:13px;color:' + (critical ? 'var(--danger)' : 'var(--warning)') + ';">' + esc(s.schema_type) + (critical ? ' (핵심)' : '') + '</div></div>';
		}
		if (missing.length === 0) html += '<div class="empty" style="font-size:12px;">모든 스키마 구현 완료</div>';
		html += '</div></div>';
	}

	// Product info evidence
	if (ed.product_info && ed.product_info.length > 0) {
		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🔬 제품 데이터 추출 실증</h3>';
		html += '<div style="overflow-x:auto;"><table class="eval-page-table"><thead><tr><th>페이지</th><th>제품명</th><th>가격</th><th>Schema 스펙</th><th>HTML 스펙</th><th>평점</th></tr></thead><tbody>';
		for (var i = 0; i < ed.product_info.length; i++) {
			var pi = ed.product_info[i];
			var fn = pi.filename.length > 30 ? '...' + pi.filename.slice(-25) : pi.filename;
			html += '<tr><td style="font-family:monospace;font-size:11px;">' + esc(fn) + '</td>';
			html += '<td>' + (pi.info.product_name ? '✅' : '❌') + '</td>';
			html += '<td>' + (pi.info.prices.length > 0 ? '✅ ' + pi.info.prices.length : '❌') + '</td>';
			html += '<td>' + (pi.info.specs_in_schema.length > 0 ? '✅ ' + pi.info.specs_in_schema.length : '❌') + '</td>';
			html += '<td>' + (pi.info.specs_in_html.length > 0 ? '⚠️ ' + pi.info.specs_in_html.length : '❌') + '</td>';
			html += '<td>' + (pi.info.has_aggregate_rating ? '✅' : '❌') + '</td></tr>';
		}
		html += '</tbody></table></div></div>';
	}

	return html;
}

// ── Tab 9: Roadmap ───────────────────────────────────
function renderRoadmapTab(ed) {
	var html = '';
	if (!ed.improvements || ed.improvements.length === 0) return '<div class="empty">No improvement roadmap available.</div>';

	var sprint1 = ed.improvements.filter(function(r) { return r.sprint === 1; });
	var sprint2 = ed.improvements.filter(function(r) { return r.sprint === 2; });
	var sprint3 = ed.improvements.filter(function(r) { return r.sprint === 3; });

	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🗺️ 개선 로드맵 (' + ed.improvements.length + ' recommendations)</h3>';
	html += renderSprintGroup('🔴 Sprint 1 — 즉시 실행 (1~2주)', 'var(--danger)', sprint1);
	html += renderSprintGroup('🟡 Sprint 2 — 1~3개월', 'var(--warning)', sprint2);
	html += renderSprintGroup('🟢 Sprint 3 — 분기 내', 'var(--success)', sprint3);
	html += '</div>';
	return html;
}

// ── Tab: Synthetic Probes ────────────────────────────
function renderProbesTab(data) {
	var probes = data.synthetic_probes;
	if (!probes || !probes.probes || probes.probes.length === 0) {
		return '<div class="card"><div class="empty">Synthetic Probe 결과 없음 — LLM API Key 설정 후 파이프라인 실행 시 프로브가 실행됩니다.</div></div>';
	}
	var html = '';
	// Summary card
	var s = probes.summary;
	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🧪 Synthetic Probes 요약</h3>';
	html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px;">';
	html += '<div style="text-align:center;padding:12px;background:var(--card-bg);border-radius:8px;border:1px solid var(--border);">';
	html += '<div style="font-size:24px;font-weight:700;color:var(--primary);">' + s.total + '</div><div style="font-size:11px;color:var(--text-muted);">Total</div></div>';
	html += '<div style="text-align:center;padding:12px;background:var(--card-bg);border-radius:8px;border:1px solid var(--border);">';
	html += '<div style="font-size:24px;font-weight:700;color:#22c55e;">' + s.pass + '</div><div style="font-size:11px;color:var(--text-muted);">PASS</div></div>';
	html += '<div style="text-align:center;padding:12px;background:var(--card-bg);border-radius:8px;border:1px solid var(--border);">';
	html += '<div style="font-size:24px;font-weight:700;color:#f59e0b;">' + s.partial + '</div><div style="font-size:11px;color:var(--text-muted);">PARTIAL</div></div>';
	html += '<div style="text-align:center;padding:12px;background:var(--card-bg);border-radius:8px;border:1px solid var(--border);">';
	html += '<div style="font-size:24px;font-weight:700;color:#ef4444;">' + s.fail + '</div><div style="font-size:11px;color:var(--text-muted);">FAIL</div></div>';
	html += '<div style="text-align:center;padding:12px;background:var(--card-bg);border-radius:8px;border:1px solid var(--border);">';
	html += '<div style="font-size:24px;font-weight:700;color:var(--primary);">' + Math.round(s.citation_rate * 100) + '%</div><div style="font-size:11px;color:var(--text-muted);">Citation Rate</div></div>';
	html += '<div style="text-align:center;padding:12px;background:var(--card-bg);border-radius:8px;border:1px solid var(--border);">';
	html += '<div style="font-size:24px;font-weight:700;color:var(--primary);">' + Math.round(s.average_accuracy * 100) + '%</div><div style="font-size:11px;color:var(--text-muted);">Avg Accuracy</div></div>';
	html += '</div></div>';

	// Individual probes table
	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">📋 프로브별 상세 결과</h3>';
	html += '<table class="eval-table"><thead><tr><th>ID</th><th>이름</th><th>카테고리</th><th>인용</th><th>정확도</th><th>판정</th><th>모델</th><th>지연(ms)</th></tr></thead><tbody>';
	for (var i = 0; i < probes.probes.length; i++) {
		var p = probes.probes[i];
		var vColor = p.verdict === 'PASS' ? '#22c55e' : p.verdict === 'PARTIAL' ? '#f59e0b' : '#ef4444';
		var vBg = p.verdict === 'PASS' ? 'rgba(34,197,94,0.1)' : p.verdict === 'PARTIAL' ? 'rgba(245,158,11,0.1)' : 'rgba(239,68,68,0.1)';
		html += '<tr>';
		html += '<td><code>' + escHtml(p.probe_id) + '</code></td>';
		html += '<td>' + escHtml(p.probe_name) + '</td>';
		html += '<td><span style="font-size:11px;padding:2px 6px;border-radius:4px;background:rgba(99,102,241,0.1);color:#818cf8;">' + escHtml(p.category) + '</span></td>';
		html += '<td>' + (p.cited ? '✅' : '❌') + '</td>';
		html += '<td>' + Math.round(p.accuracy * 100) + '%</td>';
		html += '<td><span style="font-size:11px;padding:2px 8px;border-radius:4px;background:' + vBg + ';color:' + vColor + ';font-weight:600;">' + p.verdict + '</span></td>';
		html += '<td style="font-size:11px;">' + escHtml(p.model || '-') + '</td>';
		html += '<td>' + (p.latency_ms || '-') + '</td>';
		html += '</tr>';
	}
	html += '</tbody></table></div>';

	// Query/Response details (expandable)
	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">💬 프로브 질의 & 응답</h3>';
	for (var j = 0; j < probes.probes.length; j++) {
		var pr = probes.probes[j];
		var vCol = pr.verdict === 'PASS' ? '#22c55e' : pr.verdict === 'PARTIAL' ? '#f59e0b' : '#ef4444';
		html += '<details style="margin-bottom:8px;border:1px solid var(--border);border-radius:8px;padding:0;">';
		html += '<summary style="padding:10px 14px;cursor:pointer;font-size:13px;"><span style="color:' + vCol + ';font-weight:600;">[' + pr.verdict + ']</span> ' + escHtml(pr.probe_id) + ' ' + escHtml(pr.probe_name) + '</summary>';
		html += '<div style="padding:10px 14px;border-top:1px solid var(--border);">';
		html += '<div style="margin-bottom:8px;"><strong style="font-size:12px;">질의:</strong><div style="background:var(--bg-primary);padding:8px;border-radius:4px;font-size:12px;margin-top:4px;">' + escHtml(pr.query) + '</div></div>';
		html += '<div><strong style="font-size:12px;">응답:</strong><div style="background:var(--bg-primary);padding:8px;border-radius:4px;font-size:12px;margin-top:4px;max-height:200px;overflow-y:auto;white-space:pre-wrap;">' + escHtml(pr.response) + '</div></div>';
		html += '</div></details>';
	}
	html += '</div>';
	return html;
}

// ── Tab 10: Pipeline ─────────────────────────────────
function renderPipelineTab(data) {
	var html = '';
	if (!data.stages || data.stages.length === 0) return '<div class="empty">No pipeline execution data.</div>';

	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">⏱️ 파이프라인 실행 요약</h3>';
	for (var i = 0; i < data.stages.length; i++) {
		var s = data.stages[i];
		var icon = s.status === 'completed' ? '✅' : s.status === 'failed' ? '❌' : s.status === 'running' ? '🔄' : '⏳';
		var dur = s.duration_ms ? ' (' + (s.duration_ms / 1000).toFixed(1) + 's)' : '';
		html += '<div style="padding:8px 0;border-bottom:1px solid rgba(55,65,81,0.3);font-size:13px;">';
		html += icon + ' <strong>' + esc(s.stage) + '</strong>' + dur;
		if (s.result_summary) html += '<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">' + esc(s.result_summary) + '</div>';
		html += '</div>';
	}
	html += '</div>';
	return html;
}

// ── Agent Prompts ────────────────────────────────────
async function loadPrompts() {
	try {
		prompts = await api('/api/settings/agents/prompts');
		renderPrompts();
	} catch (e) { toast(e.message, 'error'); }
}

function renderPrompts() {
	const container = document.getElementById('promptsContent');
	container.innerHTML = prompts.map(p => `<div class="card">
		<div style="display:flex;justify-content:space-between;align-items:center;">
			<div>
				<h2>${esc(p.agent_id)}</h2>
				<div style="font-size:12px;color:var(--text-muted);">
					${p.is_customized ? '<span class="badge badge-yellow">Customized</span>' : '<span class="badge badge-gray">Default</span>'}
					${p.last_modified ? ' | Last modified: ' + new Date(p.last_modified).toLocaleString() : ''}
				</div>
			</div>
			<button class="btn btn-ghost btn-sm" onclick="editPrompt('${p.agent_id}')">Edit</button>
		</div>
		<div style="margin-top:8px;font-size:12px;color:var(--text-muted);white-space:pre-wrap;max-height:60px;overflow:hidden;">${esc((p.system_instruction||'').slice(0,200))}...</div>
	</div>`).join('');
}

function editPrompt(agentId) {
	const p = prompts.find(x => x.agent_id === agentId);
	if (!p) return;
	document.getElementById('promptModalTitle').textContent = 'Edit: ' + agentId;
	document.getElementById('promptEditId').value = agentId;
	document.getElementById('promptText').value = p.system_instruction || '';
	document.getElementById('promptModal').classList.remove('hidden');
}

async function savePrompt() {
	const agentId = document.getElementById('promptEditId').value;
	try {
		await api('/api/settings/agents/prompts/' + agentId, {
			method: 'PUT',
			body: { system_instruction: document.getElementById('promptText').value },
		});
		toast('Prompt saved');
		closeModal('promptModal');
		loadPrompts();
	} catch (e) { toast(e.message, 'error'); }
}

async function resetPrompt() {
	const agentId = document.getElementById('promptEditId').value;
	try {
		await api('/api/settings/agents/prompts/' + agentId + '/reset', { method: 'POST' });
		toast('Prompt reset to default');
		closeModal('promptModal');
		loadPrompts();
	} catch (e) { toast(e.message, 'error'); }
}

async function resetAllPrompts() {
	if (!confirm('Reset all agent prompts to defaults?')) return;
	try {
		await api('/api/settings/agents/prompts/reset-all', { method: 'POST' });
		toast('All prompts reset');
		loadPrompts();
	} catch (e) { toast(e.message, 'error'); }
}

// ── LLM Providers ────────────────────────────────────
async function loadLLMProviders() {
	try {
		providers = await api('/api/settings/llm-providers');
		renderLLMProviders();
	} catch (e) { toast(e.message, 'error'); }
}

function renderLLMProviders() {
	const container = document.getElementById('llmContent');
	container.innerHTML = providers.map(p => `<div class="card">
		<div style="display:flex;justify-content:space-between;align-items:center;">
			<div>
				<h2>${esc(p.display_name)}</h2>
				<div style="font-size:12px;color:var(--text-muted);">
					Model: ${esc(p.default_model)} | Auth: ${p.auth_method}
					${p.api_key ? ' | Key: ' + p.api_key.slice(0,8) + '...' : ''}
				</div>
			</div>
			<div style="display:flex;gap:8px;align-items:center;">
				<label class="toggle">
					<input type="checkbox" ${p.enabled ? 'checked' : ''} onchange="toggleProvider('${p.provider_id}', this.checked)">
					<span class="slider"></span>
				</label>
				<button class="btn btn-ghost btn-sm" onclick="editLLMProvider('${p.provider_id}')">Edit</button>
			</div>
		</div>
	</div>`).join('');
}

async function toggleProvider(id, enabled) {
	try {
		await api('/api/settings/llm-providers/' + id + '/' + (enabled ? 'enable' : 'disable'), { method: 'POST' });
		toast(id + ' ' + (enabled ? 'enabled' : 'disabled'));
		loadLLMProviders();
	} catch (e) { toast(e.message, 'error'); }
}

function editLLMProvider(id) {
	const p = providers.find(x => x.provider_id === id);
	if (!p) return;
	document.getElementById('llmModalTitle').textContent = 'Edit: ' + p.display_name;
	document.getElementById('llmEditId').value = id;
	document.getElementById('llmApiKey').value = '';
	document.getElementById('llmModel').value = p.default_model || '';
	document.getElementById('llmMaxTokens').value = p.max_tokens || '';
	document.getElementById('llmTemp').value = p.temperature ?? '';
	document.getElementById('llmModal').classList.remove('hidden');
}

async function saveLLMProvider() {
	const id = document.getElementById('llmEditId').value;
	const body = {
		default_model: document.getElementById('llmModel').value,
		max_tokens: Number(document.getElementById('llmMaxTokens').value) || undefined,
		temperature: Number(document.getElementById('llmTemp').value) || undefined,
	};
	const apiKey = document.getElementById('llmApiKey').value;
	if (apiKey) body.api_key = apiKey;
	try {
		await api('/api/settings/llm-providers/' + id, { method: 'PUT', body });
		toast('Provider saved');
		closeModal('llmModal');
		loadLLMProviders();
	} catch (e) { toast(e.message, 'error'); }
}

async function resetAllProviders() {
	if (!confirm('Reset all LLM providers to defaults?')) return;
	try {
		await api('/api/settings/llm-providers/reset-all', { method: 'POST' });
		toast('All providers reset');
		loadLLMProviders();
	} catch (e) { toast(e.message, 'error'); }
}

// ── Utils ────────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// ── Init ─────────────────────────────────────────────
checkHealth();

// Restore active tab from URL hash, default to 'targets'
var initTab = (window.location.hash || '').replace('#', '') || 'targets';
var validTabs = ['targets', 'pipelines', 'prompts', 'evaluation', 'llm'];
if (validTabs.indexOf(initTab) === -1) initTab = 'targets';
switchTab(initTab);
</script>
</body>
</html>
