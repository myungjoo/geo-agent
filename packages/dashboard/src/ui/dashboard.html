<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO Agent Dashboard</title>
<style>
:root {
	--bg: #0A0E1A;
	--surface: #111827;
	--surface2: #1F2937;
	--border: #374151;
	--primary: #3B82F6;
	--primary-hover: #2563EB;
	--danger: #EF4444;
	--danger-hover: #DC2626;
	--success: #10B981;
	--warning: #F59E0B;
	--text: #F3F4F6;
	--text-muted: #9CA3AF;
	--radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
	font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
	background: var(--bg);
	color: var(--text);
	min-height: 100vh;
}
.header {
	background: var(--surface);
	border-bottom: 1px solid var(--border);
	padding: 12px 24px;
	display: flex;
	align-items: center;
	justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header .status { font-size: 12px; color: var(--text-muted); }
.nav {
	background: var(--surface);
	border-bottom: 1px solid var(--border);
	display: flex;
	gap: 0;
}
.nav button {
	background: none;
	border: none;
	color: var(--text-muted);
	padding: 12px 24px;
	cursor: pointer;
	font-size: 14px;
	border-bottom: 2px solid transparent;
	transition: all 0.2s;
}
.nav button:hover { color: var(--text); background: var(--surface2); }
.nav button.active { color: var(--primary); border-bottom-color: var(--primary); }
.main { padding: 24px; max-width: 1200px; margin: 0 auto; }
.card {
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	padding: 20px;
	margin-bottom: 16px;
}
.card h2 { font-size: 16px; margin-bottom: 12px; }
.card h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
.btn {
	padding: 8px 16px;
	border: none;
	border-radius: var(--radius);
	cursor: pointer;
	font-size: 13px;
	font-weight: 500;
	transition: background 0.2s;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: var(--danger-hover); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
input, textarea, select {
	background: var(--surface2);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	color: var(--text);
	padding: 8px 12px;
	font-size: 13px;
	width: 100%;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); }
textarea { resize: vertical; min-height: 80px; font-family: monospace; }
label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.form-group { margin-bottom: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
th { color: var(--text-muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
tr:hover td { background: var(--surface2); }
.badge {
	display: inline-block;
	padding: 2px 8px;
	border-radius: 12px;
	font-size: 11px;
	font-weight: 600;
}
.badge-blue { background: #1E3A5F; color: #60A5FA; }
.badge-green { background: #064E3B; color: #34D399; }
.badge-yellow { background: #78350F; color: #FBBF24; }
.badge-red { background: #7F1D1D; color: #F87171; }
.badge-gray { background: #374151; color: #9CA3AF; }
.empty { text-align: center; color: var(--text-muted); padding: 40px; }
.actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
.modal-overlay {
	position: fixed;
	inset: 0;
	background: rgba(0,0,0,0.6);
	display: flex;
	align-items: center;
	justify-content: center;
	z-index: 100;
}
.modal {
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	padding: 24px;
	width: 560px;
	max-height: 80vh;
	overflow-y: auto;
}
.modal h2 { margin-bottom: 16px; }
.hidden { display: none !important; }
.toast {
	position: fixed;
	bottom: 24px;
	right: 24px;
	padding: 12px 20px;
	border-radius: var(--radius);
	font-size: 13px;
	z-index: 200;
	animation: fadeIn 0.3s;
}
.toast-success { background: #064E3B; color: #34D399; border: 1px solid #065F46; }
.toast-error { background: #7F1D1D; color: #F87171; border: 1px solid #991B1B; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.stage-badge { font-size: 12px; padding: 3px 10px; border-radius: 4px; font-weight: 600; }
.stage-INIT { background: #374151; color: #D1D5DB; }
.stage-ANALYZING { background: #1E3A5F; color: #60A5FA; }
.stage-CLONING { background: #312E81; color: #A5B4FC; }
.stage-STRATEGIZING { background: #78350F; color: #FBBF24; }
.stage-OPTIMIZING { background: #064E3B; color: #34D399; }
.stage-VALIDATING { background: #701A75; color: #E879F9; }
.stage-REPORTING { background: #1E3A5F; color: #67E8F9; }
.stage-COMPLETED { background: #064E3B; color: #6EE7B7; }
.stage-FAILED { background: #7F1D1D; color: #FCA5A5; }
.stage-PARTIAL_FAILURE { background: #7F1D1D; color: #FCA5A5; }
/* Pipeline expandable cards */
.pipeline-card { cursor: pointer; transition: border-color 0.2s; }
.pipeline-card:hover { border-color: var(--primary); }
.pipeline-card .expand-icon { display: inline-block; transition: transform 0.2s; font-size: 10px; margin-right: 6px; color: var(--text-muted); }
.pipeline-card.expanded .expand-icon { transform: rotate(90deg); }
.stage-list { display: none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
.pipeline-card.expanded .stage-list { display: block; }
.stage-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(55,65,81,0.4); font-size: 13px; }
.stage-item:last-child { border-bottom: none; }
.stage-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.stage-dot.completed { background: var(--success); }
.stage-dot.running { background: var(--warning); animation: stagePulse 1.5s infinite; }
.stage-dot.failed { background: var(--danger); }
.stage-dot.pending { background: var(--border); }
@keyframes stagePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.stage-prompt { color: var(--text-muted); font-size: 12px; margin-top: 2px; font-family: monospace; white-space: pre-wrap; max-height: 40px; overflow: hidden; text-overflow: ellipsis; }
.stage-result { color: var(--text); font-size: 12px; margin-top: 4px; background: var(--surface2); padding: 6px 8px; border-radius: 4px; white-space: pre-wrap; max-height: 60px; overflow: hidden; }
.stage-timing { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
.current-prompt-preview { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 600px; }
/* Evaluation styles */
.eval-score-card { display: flex; align-items: center; gap: 24px; padding: 20px; flex-wrap: wrap; }
.score-circle { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; position: relative; flex-shrink: 0; }
.score-circle::before { content: ''; position: absolute; width: 80px; height: 80px; background: var(--bg); border-radius: 50%; }
.score-circle span { position: relative; z-index: 1; }
.eval-dim-bar { margin-bottom: 10px; }
.eval-dim-bar .bar-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; }
.eval-dim-bar .bar-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; position: relative; }
.eval-dim-bar .bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
.eval-page-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.eval-page-table th { text-align: left; padding: 8px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
.eval-page-table td { padding: 8px; border-bottom: 1px solid rgba(55,65,81,0.3); }
.eval-page-table tr:hover td { background: rgba(255,255,255,0.02); }
.delta-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 700; }
.delta-positive { background: rgba(16,185,129,0.15); color: var(--success); }
.delta-negative { background: rgba(239,68,68,0.15); color: var(--danger); }
.delta-zero { background: rgba(156,163,175,0.15); color: var(--text-muted); }
.toggle { position: relative; width: 40px; height: 22px; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider {
	position: absolute; inset: 0; background: var(--border);
	border-radius: 11px; transition: 0.3s;
}
.toggle .slider::before {
	content: ''; position: absolute; width: 16px; height: 16px;
	left: 3px; bottom: 3px; background: white;
	border-radius: 50%; transition: 0.3s;
}
.toggle input:checked + .slider { background: var(--primary); }
.toggle input:checked + .slider::before { transform: translateX(18px); }
</style>
</head>
<body>
<div class="header">
	<h1>GEO Agent Dashboard</h1>
	<div class="status" id="connectionStatus">Connecting...</div>
</div>
<div class="nav">
	<button class="active" data-tab="targets">Targets</button>
	<button data-tab="pipelines">Pipelines</button>
	<button data-tab="prompts">Agent Prompts</button>
	<button data-tab="evaluation">Evaluation</button>
	<button data-tab="llm">LLM Providers</button>
</div>
<div class="main">
	<!-- Targets Tab -->
	<div id="tab-targets">
		<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
			<h2 style="font-size:18px;">Targets</h2>
			<button class="btn btn-primary" onclick="showCreateTarget()">+ New Target</button>
		</div>
		<div class="card" style="padding:0;">
			<table>
				<thead><tr><th>Name</th><th>URL</th><th>Type</th><th>Status</th><th>Created</th><th></th></tr></thead>
				<tbody id="targetsBody"></tbody>
			</table>
		</div>
	</div>

	<!-- Pipelines Tab -->
	<div id="tab-pipelines" class="hidden">
		<h2 style="font-size:18px; margin-bottom:16px;">Pipeline Status</h2>
		<div id="pipelinesContent"></div>
	</div>

	<!-- Agent Prompts Tab -->
	<div id="tab-prompts" class="hidden">
		<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
			<h2 style="font-size:18px;">Agent Prompts</h2>
			<button class="btn btn-ghost" onclick="resetAllPrompts()">Reset All</button>
		</div>
		<div id="promptsContent"></div>
	</div>

	<!-- Evaluation Tab -->
	<div id="tab-evaluation" class="hidden">
		<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px;">
			<h2 style="font-size:18px;">GEO Evaluation Results</h2>
			<select id="evalTargetSelect" onchange="loadEvaluation()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:var(--radius);font-size:13px;">
				<option value="">Select a target...</option>
			</select>
		</div>
		<div id="evalContent">
			<div class="empty">Select a target to view evaluation results.</div>
		</div>
	</div>

	<!-- LLM Providers Tab -->
	<div id="tab-llm" class="hidden">
		<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
			<h2 style="font-size:18px;">LLM Providers</h2>
			<button class="btn btn-ghost" onclick="resetAllProviders()">Reset All</button>
		</div>
		<div id="llmContent"></div>
	</div>
</div>

<!-- Create/Edit Target Modal -->
<div id="targetModal" class="modal-overlay hidden">
	<div class="modal">
		<h2 id="targetModalTitle">New Target</h2>
		<input type="hidden" id="targetEditId">
		<div class="form-group">
			<label>Name *</label>
			<input type="text" id="targetName" placeholder="e.g., Samsung Galaxy S25">
		</div>
		<div class="form-group">
			<label>URL *</label>
			<input type="url" id="targetUrl" placeholder="https://www.samsung.com/smartphones/galaxy-s25/">
		</div>
		<div class="form-row">
			<div class="form-group">
				<label>Site Type</label>
				<select id="targetSiteType">
					<option value="generic">Generic</option>
					<option value="manufacturer">Manufacturer</option>
					<option value="research">Research</option>
				</select>
			</div>
			<div class="form-group">
				<label>Brand</label>
				<input type="text" id="targetBrand" placeholder="Samsung">
			</div>
		</div>
		<div class="form-group">
			<label>Topics (comma-separated)</label>
			<input type="text" id="targetTopics" placeholder="smartphones, galaxy, 5G">
		</div>
		<div class="form-group">
			<label>Target Score</label>
			<input type="number" id="targetScore" placeholder="80" min="0" max="100">
		</div>
		<div class="actions">
			<button class="btn btn-ghost" onclick="closeModal('targetModal')">Cancel</button>
			<button class="btn btn-primary" onclick="saveTarget()">Save</button>
		</div>
	</div>
</div>

<!-- Edit Prompt Modal -->
<div id="promptModal" class="modal-overlay hidden">
	<div class="modal">
		<h2 id="promptModalTitle">Edit Prompt</h2>
		<input type="hidden" id="promptEditId">
		<div class="form-group">
			<label>System Prompt</label>
			<textarea id="promptText" rows="12"></textarea>
		</div>
		<div class="actions">
			<button class="btn btn-ghost" onclick="closeModal('promptModal')">Cancel</button>
			<button class="btn btn-danger" onclick="resetPrompt()" style="margin-right:auto;">Reset to Default</button>
			<button class="btn btn-primary" onclick="savePrompt()">Save</button>
		</div>
	</div>
</div>

<!-- Edit LLM Provider Modal -->
<div id="llmModal" class="modal-overlay hidden">
	<div class="modal">
		<h2 id="llmModalTitle">Edit Provider</h2>
		<input type="hidden" id="llmEditId">
		<div class="form-group">
			<label>API Key</label>
			<input type="password" id="llmApiKey" placeholder="sk-...">
		</div>
		<div class="form-group">
			<label>Default Model</label>
			<input type="text" id="llmModel" placeholder="gpt-4o">
		</div>
		<div class="form-row">
			<div class="form-group">
				<label>Max Tokens</label>
				<input type="number" id="llmMaxTokens" placeholder="4096">
			</div>
			<div class="form-group">
				<label>Temperature</label>
				<input type="number" id="llmTemp" placeholder="0.7" step="0.1" min="0" max="2">
			</div>
		</div>
		<div class="actions">
			<button class="btn btn-ghost" onclick="closeModal('llmModal')">Cancel</button>
			<button class="btn btn-primary" onclick="saveLLMProvider()">Save</button>
		</div>
	</div>
</div>

<script>
const API = window.location.origin;
let targets = [];
let prompts = [];
let providers = [];

// ── Navigation ──────────────────────────────────────
document.querySelectorAll('.nav button').forEach(btn => {
	btn.addEventListener('click', () => {
		document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
		btn.classList.add('active');
		document.querySelectorAll('.main > div[id^="tab-"]').forEach(t => t.classList.add('hidden'));
		document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
		if (btn.dataset.tab === 'targets') loadTargets();
		if (btn.dataset.tab === 'pipelines') loadPipelines();
		if (btn.dataset.tab === 'prompts') loadPrompts();
		if (btn.dataset.tab === 'llm') loadLLMProviders();
		if (btn.dataset.tab === 'evaluation') initEvalTab();
	});
});

// ── Toast ────────────────────────────────────────────
function toast(msg, type = 'success') {
	const el = document.createElement('div');
	el.className = 'toast toast-' + type;
	el.style.whiteSpace = 'pre-line';
	el.textContent = msg;
	document.body.appendChild(el);
	const duration = type === 'error' ? 6000 : 3000;
	setTimeout(() => el.remove(), duration);
}

// ── API helpers ──────────────────────────────────────
async function api(path, opts = {}) {
	const res = await fetch(API + path, {
		headers: { 'Content-Type': 'application/json' },
		...opts,
		body: opts.body ? JSON.stringify(opts.body) : undefined,
	});
	if (!res.ok) {
		const err = await res.json().catch(() => ({ error: res.statusText }));
		let msg = err.error || 'Request failed';
		if (err.message) msg += ': ' + err.message;
		if (err.hint) msg += '\n' + err.hint;
		throw new Error(msg);
	}
	return res.json();
}

function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

// ── Health Check ─────────────────────────────────────
async function checkHealth() {
	try {
		const data = await api('/health');
		document.getElementById('connectionStatus').textContent = 'Connected';
		document.getElementById('connectionStatus').style.color = '#34D399';
	} catch {
		document.getElementById('connectionStatus').textContent = 'Disconnected';
		document.getElementById('connectionStatus').style.color = '#F87171';
	}
}

// ── Targets ──────────────────────────────────────────
async function loadTargets() {
	try {
		targets = await api('/api/targets');
		renderTargets();
	} catch (e) { toast(e.message, 'error'); }
}

function renderTargets() {
	const tbody = document.getElementById('targetsBody');
	if (!targets.length) {
		tbody.innerHTML = '<tr><td colspan="6" class="empty">No targets yet. Click "+ New Target" to add one.</td></tr>';
		return;
	}
	tbody.innerHTML = targets.map(t => `<tr>
		<td><strong>${esc(t.name)}</strong></td>
		<td style="color:var(--text-muted);font-size:12px;">${esc(t.url)}</td>
		<td><span class="badge badge-blue">${t.site_type || 'generic'}</span></td>
		<td><span class="badge ${t.is_active ? 'badge-green' : 'badge-gray'}">${t.is_active ? 'Active' : 'Inactive'}</span></td>
		<td style="color:var(--text-muted);font-size:12px;">${new Date(t.created_at).toLocaleDateString()}</td>
		<td style="text-align:right;">
			<button class="btn btn-ghost btn-sm" onclick="editTarget('${t.id}')">Edit</button>
			<button class="btn btn-danger btn-sm" onclick="deleteTarget('${t.id}','${esc(t.name)}')">Delete</button>
		</td>
	</tr>`).join('');
}

function showCreateTarget() {
	document.getElementById('targetModalTitle').textContent = 'New Target';
	document.getElementById('targetEditId').value = '';
	document.getElementById('targetName').value = '';
	document.getElementById('targetUrl').value = '';
	document.getElementById('targetSiteType').value = 'generic';
	document.getElementById('targetBrand').value = '';
	document.getElementById('targetTopics').value = '';
	document.getElementById('targetScore').value = '80';
	document.getElementById('targetModal').classList.remove('hidden');
}

function editTarget(id) {
	const t = targets.find(x => x.id === id);
	if (!t) return;
	document.getElementById('targetModalTitle').textContent = 'Edit Target';
	document.getElementById('targetEditId').value = id;
	document.getElementById('targetName').value = t.name;
	document.getElementById('targetUrl').value = t.url;
	document.getElementById('targetSiteType').value = t.site_type || 'generic';
	document.getElementById('targetBrand').value = t.brand || '';
	document.getElementById('targetTopics').value = (t.topics || []).join(', ');
	document.getElementById('targetScore').value = t.target_score || '';
	document.getElementById('targetModal').classList.remove('hidden');
}

async function saveTarget() {
	const id = document.getElementById('targetEditId').value;
	const topicsRaw = document.getElementById('targetTopics').value;
	const body = {
		name: document.getElementById('targetName').value,
		url: document.getElementById('targetUrl').value,
		site_type: document.getElementById('targetSiteType').value,
		brand: document.getElementById('targetBrand').value || undefined,
		topics: topicsRaw ? topicsRaw.split(',').map(s => s.trim()).filter(Boolean) : [],
		target_score: Number(document.getElementById('targetScore').value) || 80,
	};
	try {
		if (id) {
			await api('/api/targets/' + id, { method: 'PUT', body });
			toast('Target updated');
		} else {
			await api('/api/targets', { method: 'POST', body });
			toast('Target created');
		}
		closeModal('targetModal');
		loadTargets();
	} catch (e) { toast(e.message, 'error'); }
}

async function deleteTarget(id, name) {
	if (!confirm('Delete target "' + name + '"?')) return;
	try {
		await api('/api/targets/' + id, { method: 'DELETE' });
		toast('Target deleted');
		loadTargets();
	} catch (e) { toast(e.message, 'error'); }
}

// ── Pipelines ────────────────────────────────────────
async function loadPipelines() {
	const container = document.getElementById('pipelinesContent');
	if (!targets.length) {
		try { targets = await api('/api/targets'); } catch {}
	}
	if (!targets.length) {
		container.innerHTML = '<div class="empty">No targets. Add a target first.</div>';
		return;
	}
	let html = '';
	for (const t of targets) {
		try {
			const status = await api('/api/targets/' + t.id + '/cycle/status');
			const promptPreview = status.current_prompt ? esc(status.current_prompt).slice(0, 120) : '';
			const resultPreview = status.current_result ? esc(status.current_result).slice(0, 120) : '';
			html += `<div class="card pipeline-card" onclick="togglePipeline(this, '${t.id}', '${status.pipeline_id}')">
				<div style="display:flex;justify-content:space-between;align-items:center;">
					<div style="display:flex;align-items:center;gap:4px;flex:1;min-width:0;">
						<span class="expand-icon">&#9654;</span>
						<div style="min-width:0;">
							<h2 style="font-size:15px;">${esc(t.name)}</h2>
							<div style="font-size:12px;color:var(--text-muted);">${esc(t.url)}</div>
						</div>
					</div>
					<div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
						<span class="stage-badge stage-${status.stage}">${status.stage}</span>
						${!status.is_terminal ? '<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();stopPipeline(\''+t.id+'\')">Stop</button>' : '<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();startPipeline(\''+t.id+'\')">Re-run</button>'}
					</div>
				</div>
				<div style="margin-top:6px;font-size:12px;color:var(--text-muted);">
					Started: ${new Date(status.started_at).toLocaleString()} | Stages: ${status.stage_count || 0} | Retries: ${status.retry_count}
				</div>
				${promptPreview ? '<div class="current-prompt-preview">' + promptPreview + '</div>' : ''}
				${resultPreview && status.is_terminal ? '<div class="current-prompt-preview" style="color:var(--success);">' + resultPreview + '</div>' : ''}
				<div class="stage-list" data-pipeline="${status.pipeline_id}">
					<div style="color:var(--text-muted);font-size:12px;">Loading stages...</div>
				</div>
			</div>`;
		} catch {
			html += `<div class="card">
				<div style="display:flex;justify-content:space-between;align-items:center;">
					<div>
						<h2 style="font-size:15px;">${esc(t.name)}</h2>
						<div style="font-size:12px;color:var(--text-muted);">${esc(t.url)}</div>
					</div>
					<div>
						<span class="badge badge-gray">No Pipeline</span>
						<button class="btn btn-primary btn-sm" style="margin-left:8px;" onclick="startPipeline('${t.id}')">Start</button>
					</div>
				</div>
			</div>`;
		}
	}
	container.innerHTML = html;
}

async function togglePipeline(card, targetId, pipelineId) {
	card.classList.toggle('expanded');
	const stageList = card.querySelector('.stage-list');
	if (card.classList.contains('expanded') && stageList.dataset.loaded !== 'true') {
		try {
			const stages = await api('/api/targets/' + targetId + '/pipeline/' + pipelineId + '/stages');
			if (!stages.length) {
				stageList.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:4px 0;">No stage details available (pipeline may not have started execution yet).</div>';
			} else {
				stageList.innerHTML = stages.map(function(s) {
					const dur = s.duration_ms ? (s.duration_ms / 1000).toFixed(1) + 's' : 'running...';
					const statusIcon = s.status === 'completed' ? '✅' : s.status === 'failed' ? '❌' : s.status === 'running' ? '🔄' : '⏳';
					const resultLines = (s.result_summary || '').split('\n').slice(0, 3).join('\n');
					return '<div class="stage-item">' +
						'<div class="stage-dot ' + s.status + '"></div>' +
						'<div style="flex:1;min-width:0;">' +
							'<div style="display:flex;justify-content:space-between;align-items:center;">' +
								'<strong>' + esc(s.stage) + (s.cycle > 0 ? ' (cycle ' + s.cycle + ')' : '') + ' ' + statusIcon + '</strong>' +
								'<span class="stage-timing">' + dur + '</span>' +
							'</div>' +
							'<div class="stage-prompt">' + esc(s.prompt_summary) + '</div>' +
							(resultLines ? '<div class="stage-result">' + esc(resultLines) + '</div>' : '') +
							(s.error_message ? '<div style="color:var(--danger);font-size:12px;margin-top:2px;">Error: ' + esc(s.error_message) + '</div>' : '') +
						'</div>' +
					'</div>';
				}).join('');
			}
			stageList.dataset.loaded = 'true';
		} catch (e) {
			stageList.innerHTML = '<div style="color:var(--danger);font-size:12px;">Failed to load stages: ' + esc(e.message) + '</div>';
		}
	}
}

async function startPipeline(targetId) {
	try {
		await api('/api/targets/' + targetId + '/pipeline?execute=true', { method: 'POST' });
		toast('Pipeline started');
		loadPipelines();
	} catch (e) { toast(e.message, 'error'); }
}

async function stopPipeline(targetId) {
	try {
		await api('/api/targets/' + targetId + '/cycle/stop', { method: 'POST' });
		toast('Pipeline stopped');
		loadPipelines();
	} catch (e) { toast(e.message, 'error'); }
}

// ── Evaluation ───────────────────────────────────────
let evalInitialized = false;
async function initEvalTab() {
	const select = document.getElementById('evalTargetSelect');
	if (!evalInitialized) {
		if (!targets.length) { try { targets = await api('/api/targets'); } catch {} }
		select.innerHTML = '<option value="">Select a target...</option>' +
			targets.map(function(t) { return '<option value="' + t.id + '">' + esc(t.name) + ' (' + esc(t.url) + ')</option>'; }).join('');
		evalInitialized = true;
	}
}

async function loadEvaluation() {
	const select = document.getElementById('evalTargetSelect');
	const container = document.getElementById('evalContent');
	const targetId = select.value;
	if (!targetId) {
		container.innerHTML = '<div class="empty">Select a target to view evaluation results.</div>';
		return;
	}
	container.innerHTML = '<div class="empty">Loading evaluation...</div>';
	try {
		const latest = await api('/api/targets/' + targetId + '/pipeline/latest');
		const evalData = await api('/api/targets/' + targetId + '/pipeline/' + latest.pipeline_id + '/evaluation');
		renderEvaluation(evalData, container);
	} catch (e) {
		container.innerHTML = '<div class="empty">No evaluation data. Run a pipeline first.</div>';
	}
}

function scoreColor(score) {
	if (score >= 75) return 'var(--success)';
	if (score >= 55) return 'var(--warning)';
	return 'var(--danger)';
}

function deltaBadge(delta) {
	const cls = delta > 0 ? 'delta-positive' : delta < 0 ? 'delta-negative' : 'delta-zero';
	const sign = delta > 0 ? '+' : '';
	return '<span class="delta-badge ' + cls + '">' + sign + delta.toFixed(1) + '</span>';
}

function renderEvaluation(data, container) {
	let html = '';

	// ── Score Overview ──────────────────────────────────────
	const color = scoreColor(data.initial_score);
	const fColor = data.delta !== 0 ? scoreColor(data.final_score) : color;
	html += '<div class="card eval-score-card">';
	html += '<div class="score-circle" style="background:conic-gradient(' + color + ' 0% ' + data.initial_score + '%, var(--border) ' + data.initial_score + '%);">';
	html += '<span style="color:' + color + ';">' + Math.round(data.initial_score) + '</span></div>';
	html += '<div style="flex:1;">';
	html += '<div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;">GEO Score</div>';
	html += '<div style="font-size:24px;font-weight:800;color:' + color + ';">' + data.initial_score.toFixed(1) + '/100</div>';
	html += '<div style="font-size:13px;color:var(--text-muted);">' + esc(String(data.initial_grade)) + ' · ' + esc(String(data.site_type)) + '</div>';
	html += '</div>';
	if (data.delta !== 0) {
		html += '<div style="text-align:center;padding:0 16px;"><div style="font-size:20px;">→</div>' + deltaBadge(data.delta) + '</div>';
		html += '<div class="score-circle" style="background:conic-gradient(' + fColor + ' 0% ' + data.final_score + '%, var(--border) ' + data.final_score + '%);">';
		html += '<span style="color:' + fColor + ';">' + Math.round(data.final_score) + '</span></div>';
		html += '<div><div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;">Final</div>';
		html += '<div style="font-size:24px;font-weight:800;color:' + fColor + ';">' + data.final_score.toFixed(1) + '/100</div></div>';
	}
	html += '</div>';

	// ── 7-Dimension Scores ──────────────────────────────────
	if (data.dimensions && data.dimensions.length > 0) {
		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">📈 7-Dimension GEO Scores</h3>';
		for (const d of data.dimensions) {
			const c = scoreColor(d.score);
			html += '<div class="eval-dim-bar"><div class="bar-header"><span>' + esc(d.id + ' ' + d.label) + '</span><span style="color:' + c + ';font-weight:600;">' + d.score.toFixed(1) + '</span></div>';
			html += '<div class="bar-track"><div class="bar-fill" style="width:' + d.score + '%;background:' + c + ';"></div></div></div>';
		}
		html += '</div>';
	}

	// ── eval_data sections (detailed GEO evaluation) ────────
	const ed = data.eval_data;
	if (ed) {
		// ── Crawlability: Bot Policy Table ──────────────────
		if (ed.bot_policies && ed.bot_policies.length > 0) {
			html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🤖 AI Bot Access Policy (robots.txt)</h3>';
			html += '<div style="overflow-x:auto;"><table class="eval-page-table"><thead><tr><th>Bot</th><th>Service</th><th>Status</th><th>Blocked Paths</th></tr></thead><tbody>';
			for (const bot of ed.bot_policies) {
				const statusStyle = bot.status === 'allowed' ? 'color:var(--success)' : bot.status === 'blocked' ? 'color:var(--danger)' : bot.status === 'partial' ? 'color:var(--warning)' : 'color:var(--text-muted)';
				const statusLabel = bot.status === 'allowed' ? '✅ Allowed' : bot.status === 'blocked' ? '🚫 Blocked' : bot.status === 'partial' ? '⚠️ Partial' : 'ℹ️ Not specified';
				html += '<tr><td><code>' + esc(bot.bot_name) + '</code></td><td>' + esc(bot.service) + '</td>';
				html += '<td style="' + statusStyle + ';font-weight:600;">' + statusLabel + '</td>';
				html += '<td style="font-size:11px;color:var(--text-muted);">' + (bot.disallowed_paths.length > 0 ? esc(bot.disallowed_paths.slice(0, 3).join(', ')) : '-') + '</td></tr>';
			}
			html += '</tbody></table></div>';

			// llms.txt status
			html += '<div style="margin-top:12px;padding:10px 14px;border-radius:6px;border:1px solid ' + (ed.llms_txt.exists ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)') + ';background:' + (ed.llms_txt.exists ? 'rgba(16,185,129,0.05)' : 'rgba(239,68,68,0.05)') + ';">';
			html += '<span style="font-weight:700;color:' + (ed.llms_txt.exists ? 'var(--success)' : 'var(--danger)') + ';">' + (ed.llms_txt.exists ? '✅ llms.txt exists' : '❌ llms.txt not found (HTTP 404)') + '</span>';
			if (ed.llms_txt.content_preview) html += '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;font-family:monospace;white-space:pre-wrap;max-height:60px;overflow:hidden;">' + esc(ed.llms_txt.content_preview.slice(0, 200)) + '</div>';
			html += '</div></div>';
		}

		// ── Schema Coverage Matrix ──────────────────────────
		if (ed.schema_coverage && ed.schema_coverage.length > 0) {
			html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🏗️ Schema.org Coverage Matrix</h3>';
			html += '<div style="overflow-x:auto;"><table class="eval-page-table"><thead><tr><th>Schema Type</th><th>Present</th><th>Quality</th><th>Details</th></tr></thead><tbody>';
			for (const sc of ed.schema_coverage) {
				const qColor = sc.quality === 'excellent' ? 'var(--success)' : sc.quality === 'good' ? 'var(--success)' : sc.quality === 'partial' ? 'var(--warning)' : 'var(--danger)';
				const icon = sc.present ? '✅' : '❌';
				html += '<tr><td><strong>' + esc(sc.schema_type) + '</strong></td>';
				html += '<td>' + icon + '</td>';
				html += '<td style="color:' + qColor + ';font-weight:600;text-transform:capitalize;">' + esc(sc.quality) + '</td>';
				html += '<td style="font-size:12px;color:var(--text-muted);">' + esc(sc.details) + '</td></tr>';
			}
			html += '</tbody></table></div></div>';
		}

		// ── Product Info Per Page ────────────────────────────
		if (ed.product_info && ed.product_info.length > 0) {
			const hasProducts = ed.product_info.some(function(p) { return p.info.product_name || p.info.prices.length > 0 || p.info.specs_in_schema.length > 0; });
			if (hasProducts) {
				html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">📦 Product Information Extracted</h3>';
				for (const pi of ed.product_info) {
					if (!pi.info.product_name && pi.info.prices.length === 0 && pi.info.specs_in_schema.length === 0 && pi.info.specs_in_html.length === 0) continue;
					html += '<div style="padding:10px 0;border-bottom:1px solid rgba(55,65,81,0.3);">';
					html += '<div style="font-size:12px;color:var(--primary);font-family:monospace;">' + esc(pi.page_url.length > 70 ? '...' + pi.page_url.slice(-65) : pi.page_url) + '</div>';
					if (pi.info.product_name) html += '<div style="font-weight:700;margin-top:4px;">' + esc(pi.info.product_name) + '</div>';
					if (pi.info.prices.length > 0) html += '<div style="font-size:12px;color:var(--success);margin-top:2px;">💰 ' + esc(pi.info.prices.slice(0, 5).join(' · ')) + '</div>';
					if (pi.info.has_aggregate_rating) html += '<div style="font-size:12px;color:var(--warning);margin-top:2px;">⭐ ' + esc(pi.info.rating_value || '') + ' (' + esc(pi.info.review_count || '0') + ' reviews)</div>';
					if (pi.info.specs_in_schema.length > 0) html += '<div style="font-size:12px;color:var(--success);margin-top:2px;">📐 Schema specs: ' + esc(pi.info.specs_in_schema.slice(0, 5).join(', ')) + '</div>';
					if (pi.info.specs_in_html.length > 0) html += '<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">📄 HTML specs: ' + esc(pi.info.specs_in_html.slice(0, 5).join(', ')) + '</div>';
					html += '</div>';
				}
				html += '</div>';
			}
		}

		// ── Marketing Claims ────────────────────────────────
		if (ed.marketing_claims && ed.marketing_claims.length > 0) {
			html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">💬 Marketing Claims & Verifiability</h3>';
			html += '<div style="overflow-x:auto;"><table class="eval-page-table"><thead><tr><th>Claim</th><th>Source?</th><th>Verifiability</th></tr></thead><tbody>';
			for (const cl of ed.marketing_claims) {
				const vColor = cl.verifiability === 'verifiable' || cl.verifiability === 'factual' ? 'var(--success)' : cl.verifiability === 'partial' ? 'var(--warning)' : 'var(--danger)';
				html += '<tr><td style="font-size:12px;max-width:400px;">' + esc(cl.text) + '</td>';
				html += '<td>' + (cl.has_source ? '✅' : '❌') + '</td>';
				html += '<td style="color:' + vColor + ';font-weight:600;text-transform:capitalize;">' + esc(cl.verifiability) + '</td></tr>';
			}
			html += '</tbody></table></div></div>';
		}

		// ── JS Dependency ───────────────────────────────────
		if (ed.js_dependency) {
			const jd = ed.js_dependency;
			const depColor = jd.estimated_js_dependency > 0.6 ? 'var(--danger)' : jd.estimated_js_dependency > 0.3 ? 'var(--warning)' : 'var(--success)';
			html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">⚙️ JavaScript Dependency Analysis</h3>';
			html += '<div style="display:flex;gap:16px;flex-wrap:wrap;">';
			html += '<div style="flex:1;min-width:150px;padding:12px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:24px;font-weight:800;">' + jd.script_count + '</div><div style="font-size:11px;color:var(--text-muted);">Total Scripts</div></div>';
			html += '<div style="flex:1;min-width:150px;padding:12px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:24px;font-weight:800;">' + jd.external_scripts + '</div><div style="font-size:11px;color:var(--text-muted);">External</div></div>';
			html += '<div style="flex:1;min-width:150px;padding:12px;background:var(--surface2);border-radius:6px;text-align:center;"><div style="font-size:24px;font-weight:800;color:' + depColor + ';">' + Math.round(jd.estimated_js_dependency * 100) + '%</div><div style="font-size:11px;color:var(--text-muted);">JS Dependency Est.</div></div>';
			html += '</div>';
			if (jd.frameworks_detected.length > 0) html += '<div style="margin-top:8px;font-size:12px;color:var(--text-muted);">Frameworks: ' + esc(jd.frameworks_detected.join(', ')) + '</div>';
			html += '</div>';
		}

		// ── Blocked Paths ───────────────────────────────────
		if (ed.blocked_paths && ed.blocked_paths.length > 0) {
			html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🚫 Blocked Paths (AI Bots)</h3>';
			html += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
			for (const path of ed.blocked_paths.slice(0, 15)) {
				html += '<span style="font-family:monospace;font-size:11px;padding:3px 8px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:4px;color:var(--danger);">' + esc(path) + '</span>';
			}
			html += '</div></div>';
		}
	}

	// ── Multi-page breakdown ────────────────────────────────
	if (data.multi_page && data.multi_page.pages && data.multi_page.pages.length > 0) {
		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">🔍 Per-Page GEO Scores (' + data.multi_page.page_count + ' pages, aggregate: ' + data.multi_page.aggregate_score + ')</h3>';
		html += '<div style="overflow-x:auto;"><table class="eval-page-table"><thead><tr><th>Page</th><th>Score</th><th>Grade</th></tr></thead><tbody>';
		for (const p of data.multi_page.pages) {
			const pc = scoreColor(p.score);
			const urlShort = p.url ? (p.url.length > 60 ? '...' + p.url.slice(-55) : p.url) : p.filename;
			html += '<tr><td style="font-family:monospace;font-size:12px;">' + esc(urlShort) + '</td>';
			html += '<td style="font-weight:700;color:' + pc + ';">' + p.score.toFixed(1) + '</td>';
			html += '<td>' + esc(p.grade) + '</td></tr>';
		}
		html += '</tbody></table></div></div>';
	}

	// ── Stage Execution Summary ─────────────────────────────
	if (data.stages && data.stages.length > 0) {
		html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">⏱️ Pipeline Execution Summary</h3>';
		for (const s of data.stages) {
			const icon = s.status === 'completed' ? '✅' : s.status === 'failed' ? '❌' : s.status === 'running' ? '🔄' : '⏳';
			const dur = s.duration_ms ? ' (' + (s.duration_ms / 1000).toFixed(1) + 's)' : '';
			html += '<div style="padding:6px 0;border-bottom:1px solid rgba(55,65,81,0.3);font-size:13px;">';
			html += icon + ' <strong>' + esc(s.stage) + '</strong>' + dur;
			if (s.result_summary) html += '<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">' + esc(s.result_summary) + '</div>';
			html += '</div>';
		}
		html += '</div>';
	}

	container.innerHTML = html;
}

// ── Agent Prompts ────────────────────────────────────
async function loadPrompts() {
	try {
		prompts = await api('/api/settings/agents/prompts');
		renderPrompts();
	} catch (e) { toast(e.message, 'error'); }
}

function renderPrompts() {
	const container = document.getElementById('promptsContent');
	container.innerHTML = prompts.map(p => `<div class="card">
		<div style="display:flex;justify-content:space-between;align-items:center;">
			<div>
				<h2>${esc(p.agent_id)}</h2>
				<div style="font-size:12px;color:var(--text-muted);">
					${p.is_customized ? '<span class="badge badge-yellow">Customized</span>' : '<span class="badge badge-gray">Default</span>'}
					${p.last_modified ? ' | Last modified: ' + new Date(p.last_modified).toLocaleString() : ''}
				</div>
			</div>
			<button class="btn btn-ghost btn-sm" onclick="editPrompt('${p.agent_id}')">Edit</button>
		</div>
		<div style="margin-top:8px;font-size:12px;color:var(--text-muted);white-space:pre-wrap;max-height:60px;overflow:hidden;">${esc((p.system_instruction||'').slice(0,200))}...</div>
	</div>`).join('');
}

function editPrompt(agentId) {
	const p = prompts.find(x => x.agent_id === agentId);
	if (!p) return;
	document.getElementById('promptModalTitle').textContent = 'Edit: ' + agentId;
	document.getElementById('promptEditId').value = agentId;
	document.getElementById('promptText').value = p.system_instruction || '';
	document.getElementById('promptModal').classList.remove('hidden');
}

async function savePrompt() {
	const agentId = document.getElementById('promptEditId').value;
	try {
		await api('/api/settings/agents/prompts/' + agentId, {
			method: 'PUT',
			body: { system_instruction: document.getElementById('promptText').value },
		});
		toast('Prompt saved');
		closeModal('promptModal');
		loadPrompts();
	} catch (e) { toast(e.message, 'error'); }
}

async function resetPrompt() {
	const agentId = document.getElementById('promptEditId').value;
	try {
		await api('/api/settings/agents/prompts/' + agentId + '/reset', { method: 'POST' });
		toast('Prompt reset to default');
		closeModal('promptModal');
		loadPrompts();
	} catch (e) { toast(e.message, 'error'); }
}

async function resetAllPrompts() {
	if (!confirm('Reset all agent prompts to defaults?')) return;
	try {
		await api('/api/settings/agents/prompts/reset-all', { method: 'POST' });
		toast('All prompts reset');
		loadPrompts();
	} catch (e) { toast(e.message, 'error'); }
}

// ── LLM Providers ────────────────────────────────────
async function loadLLMProviders() {
	try {
		providers = await api('/api/settings/llm-providers');
		renderLLMProviders();
	} catch (e) { toast(e.message, 'error'); }
}

function renderLLMProviders() {
	const container = document.getElementById('llmContent');
	container.innerHTML = providers.map(p => `<div class="card">
		<div style="display:flex;justify-content:space-between;align-items:center;">
			<div>
				<h2>${esc(p.display_name)}</h2>
				<div style="font-size:12px;color:var(--text-muted);">
					Model: ${esc(p.default_model)} | Auth: ${p.auth_method}
					${p.api_key ? ' | Key: ' + p.api_key.slice(0,8) + '...' : ''}
				</div>
			</div>
			<div style="display:flex;gap:8px;align-items:center;">
				<label class="toggle">
					<input type="checkbox" ${p.enabled ? 'checked' : ''} onchange="toggleProvider('${p.provider_id}', this.checked)">
					<span class="slider"></span>
				</label>
				<button class="btn btn-ghost btn-sm" onclick="editLLMProvider('${p.provider_id}')">Edit</button>
			</div>
		</div>
	</div>`).join('');
}

async function toggleProvider(id, enabled) {
	try {
		await api('/api/settings/llm-providers/' + id + '/' + (enabled ? 'enable' : 'disable'), { method: 'POST' });
		toast(id + ' ' + (enabled ? 'enabled' : 'disabled'));
		loadLLMProviders();
	} catch (e) { toast(e.message, 'error'); }
}

function editLLMProvider(id) {
	const p = providers.find(x => x.provider_id === id);
	if (!p) return;
	document.getElementById('llmModalTitle').textContent = 'Edit: ' + p.display_name;
	document.getElementById('llmEditId').value = id;
	document.getElementById('llmApiKey').value = '';
	document.getElementById('llmModel').value = p.default_model || '';
	document.getElementById('llmMaxTokens').value = p.max_tokens || '';
	document.getElementById('llmTemp').value = p.temperature ?? '';
	document.getElementById('llmModal').classList.remove('hidden');
}

async function saveLLMProvider() {
	const id = document.getElementById('llmEditId').value;
	const body = {
		default_model: document.getElementById('llmModel').value,
		max_tokens: Number(document.getElementById('llmMaxTokens').value) || undefined,
		temperature: Number(document.getElementById('llmTemp').value) || undefined,
	};
	const apiKey = document.getElementById('llmApiKey').value;
	if (apiKey) body.api_key = apiKey;
	try {
		await api('/api/settings/llm-providers/' + id, { method: 'PUT', body });
		toast('Provider saved');
		closeModal('llmModal');
		loadLLMProviders();
	} catch (e) { toast(e.message, 'error'); }
}

async function resetAllProviders() {
	if (!confirm('Reset all LLM providers to defaults?')) return;
	try {
		await api('/api/settings/llm-providers/reset-all', { method: 'POST' });
		toast('All providers reset');
		loadLLMProviders();
	} catch (e) { toast(e.message, 'error'); }
}

// ── Utils ────────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// ── Init ─────────────────────────────────────────────
checkHealth();
loadTargets();
</script>
</body>
</html>
