<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO Agent Dashboard</title>
<style>
:root {
	--bg: #0A0E1A;
	--surface: #111827;
	--surface2: #1a2235;
	--border: #1F2E4A;
	--primary: #2F80ED;
	--primary-hover: #1E6FD9;
	--accent: #00B4D8;
	--danger: #EF4444;
	--danger-hover: #DC2626;
	--success: #10B981;
	--warning: #F59E0B;
	--orange: #F97316;
	--purple: #8B5CF6;
	--text: #F0F4FF;
	--text-muted: #9BA3AF;
	--radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
	font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
	background: var(--bg);
	color: var(--text);
	min-height: 100vh;
}
.header {
	background: var(--surface);
	border-bottom: 1px solid var(--border);
	padding: 12px 24px;
	display: flex;
	align-items: center;
	justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header .status { font-size: 12px; color: var(--text-muted); }
.nav {
	background: var(--surface);
	border-bottom: 1px solid var(--border);
	display: flex;
	gap: 0;
}
.nav button {
	background: none;
	border: none;
	color: var(--text-muted);
	padding: 12px 24px;
	cursor: pointer;
	font-size: 14px;
	border-bottom: 2px solid transparent;
	transition: all 0.2s;
}
.nav button:hover { color: var(--text); background: var(--surface2); }
.nav button.active { color: var(--primary); border-bottom-color: var(--primary); }
.main { padding: 28px 40px; max-width: 1400px; margin: 0 auto; }
.card {
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	padding: 20px;
	margin-bottom: 20px;
}
.card h2 { font-size: 16px; margin-bottom: 12px; }
.card h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
.btn {
	padding: 8px 16px;
	border: none;
	border-radius: var(--radius);
	cursor: pointer;
	font-size: 13px;
	font-weight: 500;
	transition: background 0.2s;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: var(--danger-hover); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
input, textarea, select {
	background: var(--surface2);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	color: var(--text);
	padding: 8px 12px;
	font-size: 13px;
	width: 100%;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); }
textarea { resize: vertical; min-height: 80px; font-family: monospace; }
label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.form-group { margin-bottom: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid rgba(31,46,74,0.6); }
th { color: var(--text-muted); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; background: rgba(47,128,237,0.12); }
tr:hover td { background: rgba(255,255,255,0.02); }
.badge {
	display: inline-block;
	padding: 2px 8px;
	border-radius: 12px;
	font-size: 11px;
	font-weight: 600;
}
.badge-blue { background: #1E3A5F; color: #60A5FA; }
.badge-green { background: #064E3B; color: #34D399; }
.badge-yellow { background: #78350F; color: #FBBF24; }
.badge-red { background: #7F1D1D; color: #F87171; }
.badge-gray { background: #374151; color: #9CA3AF; }
.empty { text-align: center; color: var(--text-muted); padding: 40px; }
.actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
.modal-overlay {
	position: fixed;
	inset: 0;
	background: rgba(0,0,0,0.6);
	display: flex;
	align-items: center;
	justify-content: center;
	z-index: 100;
}
.modal {
	background: var(--surface);
	border: 1px solid var(--border);
	border-radius: var(--radius);
	padding: 24px;
	width: 560px;
	max-height: 80vh;
	overflow-y: auto;
}
.modal h2 { margin-bottom: 16px; }
.hidden { display: none !important; }
.toast {
	position: fixed;
	bottom: 24px;
	right: 24px;
	padding: 12px 20px;
	border-radius: var(--radius);
	font-size: 13px;
	z-index: 200;
	animation: fadeIn 0.3s;
}
.toast-success { background: #064E3B; color: #34D399; border: 1px solid #065F46; }
.toast-error { background: #7F1D1D; color: #F87171; border: 1px solid #991B1B; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.stage-badge { font-size: 12px; padding: 3px 10px; border-radius: 4px; font-weight: 600; }
.stage-INIT { background: #374151; color: #D1D5DB; }
.stage-ANALYZING { background: #1E3A5F; color: #60A5FA; }
.stage-CLONING { background: #312E81; color: #A5B4FC; }
.stage-STRATEGIZING { background: #78350F; color: #FBBF24; }
.stage-OPTIMIZING { background: #064E3B; color: #34D399; }
.stage-VALIDATING { background: #701A75; color: #E879F9; }
.stage-REPORTING { background: #1E3A5F; color: #67E8F9; }
.stage-COMPLETED { background: #064E3B; color: #6EE7B7; }
.stage-FAILED { background: #7F1D1D; color: #FCA5A5; }
.stage-PARTIAL_FAILURE { background: #7F1D1D; color: #FCA5A5; }
.stage-STOPPED { background: #78350F; color: #FBBF24; }
/* Pipeline expandable cards */
.pipeline-card { cursor: pointer; transition: border-color 0.2s; }
.pipeline-card:hover { border-color: var(--primary); }
.pipeline-card .expand-icon { display: inline-block; transition: transform 0.2s; font-size: 10px; margin-right: 6px; color: var(--text-muted); }
.pipeline-card.expanded .expand-icon { transform: rotate(90deg); }
.stage-list { display: none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
.pipeline-card.expanded .stage-list { display: block; }
.stage-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(55,65,81,0.4); font-size: 13px; }
.stage-item:last-child { border-bottom: none; }
.stage-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.stage-dot.completed { background: var(--success); }
.stage-dot.running { background: var(--warning); animation: stagePulse 1.5s infinite; }
.stage-dot.failed { background: var(--danger); }
.stage-dot.pending { background: var(--border); }
@keyframes stagePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.stage-prompt { color: var(--text-muted); font-size: 12px; margin-top: 2px; font-family: monospace; white-space: pre-wrap; max-height: 40px; overflow: hidden; text-overflow: ellipsis; }
.stage-result { color: var(--text); font-size: 12px; margin-top: 4px; background: var(--surface2); padding: 6px 8px; border-radius: 4px; white-space: pre-wrap; max-height: 60px; overflow: hidden; }
.stage-timing { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
.current-prompt-preview { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 600px; }
/* Evaluation styles */
.eval-score-card { display: flex; align-items: center; gap: 24px; padding: 20px; flex-wrap: wrap; }
.score-circle { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; position: relative; flex-shrink: 0; }
.score-circle::before { content: ''; position: absolute; width: 80px; height: 80px; background: var(--bg); border-radius: 50%; }
.score-circle span { position: relative; z-index: 1; }
.eval-dim-bar { margin-bottom: 10px; }
.eval-dim-bar .bar-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; }
.eval-dim-bar .bar-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; position: relative; }
.eval-dim-bar .bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
.eval-page-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.eval-page-table th { text-align: left; padding: 8px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
.eval-page-table td { padding: 8px; border-bottom: 1px solid rgba(55,65,81,0.3); }
.eval-page-table tr:hover td { background: rgba(255,255,255,0.02); }
.delta-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 700; }
.delta-positive { background: rgba(16,185,129,0.15); color: var(--success); }
.delta-negative { background: rgba(239,68,68,0.15); color: var(--danger); }
.delta-zero { background: rgba(156,163,175,0.15); color: var(--text-muted); }
.toggle { position: relative; width: 40px; height: 22px; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider {
	position: absolute; inset: 0; background: var(--border);
	border-radius: 11px; transition: 0.3s;
}
.toggle .slider::before {
	content: ''; position: absolute; width: 16px; height: 16px;
	left: 3px; bottom: 3px; background: white;
	border-radius: 50%; transition: 0.3s;
}
.toggle input:checked + .slider { background: var(--primary); }
.toggle input:checked + .slider::before { transform: translateX(18px); }
/* Evaluation grouped tabs */
/* ── Samsung-level Evaluation Styles ── */
.eval-section-title {
	font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 16px;
	padding-bottom: 8px; border-bottom: 1px solid var(--border);
	display: flex; align-items: center; gap: 8px;
}
.eval-section-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.eval-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.eval-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.eval-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
@media (max-width: 1100px) { .eval-grid-4 { grid-template-columns: 1fr 1fr; } .eval-grid-3 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 700px) { .eval-grid-2, .eval-grid-3, .eval-grid-4 { grid-template-columns: 1fr; } }
.score-card-geo {
	background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
	padding: 20px; position: relative; overflow: hidden;
}
.score-card-geo::after {
	content: ''; position: absolute; bottom: 0; left: 0; height: 3px; width: 100%;
}
.score-card-geo .sc-label {
	font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase;
	letter-spacing: 0.7px; margin-bottom: 10px;
}
.score-card-geo .sc-value { font-size: 36px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.score-card-geo .sc-desc { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
.finding-card-geo {
	background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
	padding: 16px; margin-bottom: 12px; display: flex; gap: 14px; align-items: flex-start;
}
.finding-card-geo .fc-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
.finding-card-geo .fc-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.finding-card-geo .fc-desc { font-size: 12px; color: var(--text-muted); line-height: 1.55; }
.geo-table-pro { width: 100%; border-collapse: collapse; font-size: 13px; }
.geo-table-pro th {
	background: rgba(47,128,237,0.2); padding: 10px 14px; text-align: left;
	font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px;
	color: var(--text-muted); border-bottom: 1px solid var(--border);
}
.geo-table-pro td { padding: 10px 14px; border-bottom: 1px solid rgba(31,46,74,0.6); color: var(--text); vertical-align: middle; }
.geo-table-pro tr:hover td { background: rgba(255,255,255,0.02); }
.geo-table-pro tr:last-child td { border-bottom: none; }
.pill { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.pill-green { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
.pill-yellow { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
.pill-red { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
.pill-blue { background: rgba(47,128,237,0.15); color: var(--primary); border: 1px solid rgba(47,128,237,0.3); }
/* Sticky GEO Score Header */
.eval-sticky-header {
	position: sticky; top: 0; z-index: 50;
	background: linear-gradient(135deg, #060A14 0%, #0D1B3E 50%, #1a2860 100%);
	border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px;
	box-shadow: 0 4px 32px rgba(0,0,0,0.4);
	overflow: hidden;
}
.eval-sticky-score {
	display: flex; align-items: center; justify-content: center; gap: 32px; padding: 24px 32px;
	border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.eval-sticky-score .geo-gauge {
	position: relative; width: 144px; height: 144px; flex-shrink: 0;
}
.eval-sticky-score .geo-gauge canvas { width: 144px; height: 144px; }
.eval-sticky-score .geo-gauge .gauge-value {
	position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
	font-size: 42px; font-weight: 900; letter-spacing: -1px;
}
.eval-sticky-score .score-meta { flex-shrink: 0; }
.eval-sticky-score .score-meta .score-label {
	font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
	color: var(--text-muted); font-weight: 700; margin-bottom: 2px;
}
.eval-sticky-score .score-meta .score-value {
	font-size: 36px; font-weight: 900; line-height: 1.1;
}
.eval-sticky-score .score-meta .score-grade {
	font-size: 13px; color: var(--text-muted); margin-top: 3px;
}
.eval-sticky-score .sticky-divider {
	width: 1px; height: 96px; background: var(--border); flex-shrink: 0;
}
.eval-sticky-score .dim-mini-bars {
	display: flex; gap: 10px; flex-shrink: 0;
}
.eval-sticky-score .dim-mini-bar {
	text-align: center; width: 48px;
}
.eval-sticky-score .dim-mini-bar .mini-bar-track {
	height: 64px; width: 100%; background: var(--surface2); border-radius: 4px;
	position: relative; overflow: hidden;
}
.eval-sticky-score .dim-mini-bar .mini-bar-fill {
	position: absolute; bottom: 0; width: 100%; border-radius: 4px;
	transition: height 0.8s ease;
}
.eval-sticky-score .dim-mini-bar .mini-label {
	font-size: 11px; color: var(--text-muted); margin-top: 3px; white-space: nowrap;
}
.eval-sticky-score .dim-mini-bar .mini-score {
	font-size: 13px; font-weight: 700; margin-top: 2px;
}
/* Executive Summary */
.exec-summary {
	padding: 16px 24px; display: flex; gap: 20px; align-items: flex-start;
}
.exec-summary .exec-verdict {
	flex: 1; min-width: 0;
}
.exec-summary .exec-catchphrase {
	font-size: 18px; font-weight: 800; margin-bottom: 6px; line-height: 1.3;
}
.exec-summary .exec-text {
	font-size: 13px; color: var(--text-muted); line-height: 1.6;
}
.exec-summary .exec-priorities {
	width: 340px; flex-shrink: 0;
}
.exec-summary .exec-priorities h4 {
	font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
	color: var(--text-muted); font-weight: 700; margin-bottom: 8px;
}
.exec-priority-item {
	display: flex; gap: 10px; padding: 8px 10px; margin-bottom: 6px;
	background: var(--surface2); border-radius: 6px; border-left: 3px solid var(--primary);
}
.exec-priority-item .pri-num {
	font-size: 16px; font-weight: 900; color: var(--primary); flex-shrink: 0; width: 22px;
}
.exec-priority-item .pri-title {
	font-size: 12px; font-weight: 700; margin-bottom: 2px;
}
.exec-priority-item .pri-desc {
	font-size: 11px; color: var(--text-muted); line-height: 1.4;
}
.exec-risk-badge {
	display: inline-block; padding: 3px 10px; border-radius: 12px;
	font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
	margin-left: 8px; vertical-align: middle;
}
.exec-risk-critical { background: rgba(239,68,68,0.2); color: #F87171; }
.exec-risk-warning { background: rgba(245,158,11,0.2); color: #FBBF24; }
.exec-risk-moderate { background: rgba(59,130,246,0.2); color: #60A5FA; }
.exec-risk-good { background: rgba(16,185,129,0.2); color: #34D399; }
.exec-risk-excellent { background: rgba(16,185,129,0.3); color: #6EE7B7; }
.exec-summary-loading {
	padding: 16px 24px; text-align: center; color: var(--text-muted); font-size: 12px;
}
.exec-summary-loading .loading-dots::after {
	content: ''; animation: loadDots 1.5s infinite;
}
@keyframes loadDots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
.eval-tab-groups { display: flex; gap: 0; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--surface); }
.eval-tab-group { display: flex; align-items: stretch; border-right: 1px solid var(--border); }
.eval-tab-group:last-child { border-right: none; }
.eval-tab-group-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; padding: 6px 10px 0; align-self: center; opacity: 0.6; font-weight: 700; }
.eval-tab-btn { background: none; border: none; color: var(--text-muted); padding: 8px 12px; cursor: pointer; font-size: 12px; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
.eval-tab-btn:hover { color: var(--text); background: var(--surface2); }
.eval-tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
/* Collapsible sections */
details.collapsible { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; }
details.collapsible > summary { padding: 12px 16px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); background: var(--surface2); border-radius: var(--radius); list-style: none; display: flex; align-items: center; gap: 8px; }
details.collapsible > summary::before { content: '\25B6'; font-size: 10px; transition: transform 0.2s; }
details.collapsible[open] > summary::before { transform: rotate(90deg); }
details.collapsible > summary::-webkit-details-marker { display: none; }
details.collapsible > .collapsible-content { padding: 16px; }
/* Verdict badges */
.verdict-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
.verdict-much_better { background: rgba(16,185,129,0.2); color: #34D399; }
.verdict-better { background: rgba(16,185,129,0.15); color: #6EE7B7; }
.verdict-marginally_better { background: rgba(245,158,11,0.15); color: #FBBF24; }
.verdict-no_change { background: rgba(156,163,175,0.15); color: #9CA3AF; }
.verdict-worse { background: rgba(239,68,68,0.15); color: #F87171; }
/* Rich data cards */
.rich-metric-card { padding: 14px; background: var(--surface2); border-radius: 8px; text-align: center; }
.rich-metric-card .metric-value { font-size: 24px; font-weight: 800; }
.rich-metric-card .metric-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
<div class="header">
	<h1>GEO Agent Dashboard</h1>
	<div style="display:flex;align-items:center;gap:12px;">
		<span id="versionInfo" style="font-size:10px;color:var(--text-muted);font-family:monospace;"></span>
		<div class="status" id="connectionStatus">Connecting...</div>
	</div>
</div>
<div class="nav">
	<button class="active" data-tab="targets">Targets</button>
	<button data-tab="pipelines">Pipelines</button>
	<button data-tab="prompts">Agent Prompts</button>
	<button data-tab="evaluation">Evaluation</button>
	<button data-tab="llm">LLM Providers</button>
</div>
<div class="main">
	<!-- Targets Tab -->
	<div id="tab-targets">
		<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
			<h2 style="font-size:18px;">Targets</h2>
			<button class="btn btn-primary" onclick="showCreateTarget()">+ New Target</button>
		</div>
		<div class="card" style="padding:0;">
			<table>
				<thead><tr><th>Name</th><th>URL</th><th>Type</th><th>Status</th><th>Created</th><th></th></tr></thead>
				<tbody id="targetsBody"></tbody>
			</table>
		</div>
	</div>

	<!-- Pipelines Tab -->
	<div id="tab-pipelines" class="hidden">
		<h2 style="font-size:18px; margin-bottom:16px;">Pipeline Status</h2>
		<div id="pipelinesContent"></div>
	</div>

	<!-- Agent Prompts Tab -->
	<div id="tab-prompts" class="hidden">
		<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
			<h2 style="font-size:18px;">Agent Prompts</h2>
			<button class="btn btn-ghost" onclick="resetAllPrompts()">Reset All</button>
		</div>
		<div id="promptsContent"></div>
	</div>

<script>
const API = window.location.origin;
let targets = [];
let prompts = [];
let providers = [];

// ── Navigation (with URL hash persistence) ──────────
function switchTab(tabName) {
	document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
	var btn = document.querySelector('.nav button[data-tab="' + tabName + '"]');
	if (btn) btn.classList.add('active');
	document.querySelectorAll('.main > div[id^="tab-"]').forEach(t => t.classList.add('hidden'));
	var tabEl = document.getElementById('tab-' + tabName);
	if (tabEl) tabEl.classList.remove('hidden');
	window.location.hash = tabName;
	if (tabName === 'targets') loadTargets();
	if (tabName === 'pipelines') loadPipelines();
	if (tabName === 'prompts') loadPrompts();
	if (tabName === 'llm') loadLLMProviders();
	if (tabName === 'evaluation') initEvalTab();
}

document.querySelectorAll('.nav button').forEach(btn => {
	btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ── Toast ────────────────────────────────────────────
function toast(msg, type = 'success') {
	const el = document.createElement('div');
	el.className = 'toast toast-' + type;
	el.style.whiteSpace = 'pre-line';
	el.textContent = msg;
	document.body.appendChild(el);
	const duration = type === 'error' ? 6000 : 3000;
	setTimeout(() => el.remove(), duration);
}

// ── LLM Error Modal ─────────────────────────────────
function showLLMErrorModal(errorMsg) {
	// Remove existing modal if any
	var existing = document.getElementById('llm-error-modal');
	if (existing) existing.remove();

	var overlay = document.createElement('div');
	overlay.id = 'llm-error-modal';
	overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:center;justify-content:center;';

	var modal = document.createElement('div');
	modal.style.cssText = 'background:#1F2937;border:2px solid #DC2626;border-radius:12px;padding:32px;max-width:560px;width:90%;color:#F3F4F6;box-shadow:0 20px 60px rgba(0,0,0,0.5);';

	modal.innerHTML = '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">'
		+ '<span style="font-size:32px;">&#10060;</span>'
		+ '<h2 style="margin:0;font-size:20px;color:#F87171;">Pipeline 실행 중단</h2>'
		+ '</div>'
		+ '<div style="background:#7F1D1D;border:1px solid #991B1B;border-radius:8px;padding:16px;margin-bottom:20px;">'
		+ '<p style="margin:0 0 8px 0;font-weight:bold;color:#FCA5A5;">LLM API 인증 오류</p>'
		+ '<p style="margin:0;font-size:13px;color:#FDA4AF;word-break:break-all;">' + escapeHtmlStr(errorMsg) + '</p>'
		+ '</div>'
		+ '<div style="background:#1E293B;border-radius:8px;padding:16px;margin-bottom:20px;">'
		+ '<p style="margin:0 0 8px 0;font-weight:bold;color:#93C5FD;">해결 방법</p>'
		+ '<ol style="margin:0;padding-left:20px;color:#CBD5E1;font-size:13px;line-height:1.8;">'
		+ '<li><strong>LLM Providers</strong> 탭으로 이동</li>'
		+ '<li>사용할 Provider의 <strong>API Key</strong>를 확인/재입력</li>'
		+ '<li>Provider가 <strong>활성화(Enabled)</strong> 상태인지 확인</li>'
		+ '<li>파이프라인을 다시 실행 (Re-run)</li>'
		+ '</ol>'
		+ '</div>'
		+ '<div style="display:flex;gap:12px;justify-content:flex-end;">'
		+ '<button onclick="document.getElementById(\'llm-error-modal\').remove();switchTab(\'llm\');" style="padding:8px 20px;background:#2563EB;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">LLM Providers 설정</button>'
		+ '<button onclick="document.getElementById(\'llm-error-modal\').remove();" style="padding:8px 20px;background:#374151;color:#D1D5DB;border:1px solid #4B5563;border-radius:6px;cursor:pointer;font-size:14px;">닫기</button>'
		+ '</div>';

	overlay.appendChild(modal);
	overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
	document.body.appendChild(overlay);
}

function escapeHtmlStr(str) {
	var div = document.createElement('div');
	div.textContent = str;
	return div.innerHTML;
}

// ── API helpers ──────────────────────────────────────
async function api(path, opts = {}) {
	const res = await fetch(API + path, {
		headers: { 'Content-Type': 'application/json' },
		...opts,
		body: opts.body ? JSON.stringify(opts.body) : undefined,
	});
	if (!res.ok) {
		const err = await res.json().catch(() => ({ error: res.statusText }));
		let msg = err.error || 'Request failed';
		if (err.message) msg += ': ' + err.message;
		if (err.hint) msg += '\n' + err.hint;
		throw new Error(msg);
	}
	return res.json();
}

function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

// ── Health Check ─────────────────────────────────────
async function checkHealth() {
	try {
		const data = await api('/health');
		document.getElementById('connectionStatus').textContent = 'Connected';
		document.getElementById('connectionStatus').style.color = '#34D399';
	} catch {
		document.getElementById('connectionStatus').textContent = 'Disconnected';
		document.getElementById('connectionStatus').style.color = '#F87171';
	}
}

// ── Targets ──────────────────────────────────────────
async function loadTargets() {
	try {
		targets = await api('/api/targets');
		renderTargets();
	} catch (e) { toast(e.message, 'error'); }
}

function renderTargets() {
	const tbody = document.getElementById('targetsBody');
	if (!targets.length) {
		tbody.innerHTML = '<tr><td colspan="6" class="empty">No targets yet. Click "+ New Target" to add one.</td></tr>';
		return;
	}
	tbody.innerHTML = targets.map(t => `<tr>
		<td><strong>${esc(t.name)}</strong></td>
		<td style="color:var(--text-muted);font-size:12px;">${esc(t.url)}</td>
		<td><span class="badge badge-blue">${t.site_type || 'generic'}</span></td>
		<td><span class="badge ${t.status === 'active' ? 'badge-green' : t.status === 'paused' ? 'badge-yellow' : 'badge-gray'}">${t.status || 'active'}</span></td>
		<td style="color:var(--text-muted);font-size:12px;">${new Date(t.created_at).toLocaleDateString()}</td>
		<td style="text-align:right;">
			<button class="btn btn-ghost btn-sm" onclick="editTarget('${t.id}')">Edit</button>
			<button class="btn btn-danger btn-sm" onclick="deleteTarget('${t.id}','${esc(t.name)}')">Delete</button>
		</td>
	</tr>`).join('');
}

function showCreateTarget() {
	document.getElementById('targetModalTitle').textContent = 'New Target';
	document.getElementById('targetEditId').value = '';
	document.getElementById('targetName').value = '';
	document.getElementById('targetUrl').value = '';
	document.getElementById('targetSiteType').value = 'generic';
	document.getElementById('targetBrand').value = '';
	document.getElementById('targetTopics').value = '';
	document.getElementById('targetScore').value = '80';
	document.getElementById('targetModal').classList.remove('hidden');
}

function editTarget(id) {
	const t = targets.find(x => x.id === id);
	if (!t) return;
	document.getElementById('targetModalTitle').textContent = 'Edit Target';
	document.getElementById('targetEditId').value = id;
	document.getElementById('targetName').value = t.name;
	document.getElementById('targetUrl').value = t.url;
	document.getElementById('targetSiteType').value = t.site_type || 'generic';
	document.getElementById('targetBrand').value = t.brand || '';
	document.getElementById('targetTopics').value = (t.topics || []).join(', ');
	document.getElementById('targetScore').value = t.target_score || '';
	document.getElementById('targetModal').classList.remove('hidden');
}

async function saveTarget() {
	const id = document.getElementById('targetEditId').value;
	const topicsRaw = document.getElementById('targetTopics').value;
	const body = {
		name: document.getElementById('targetName').value,
		url: document.getElementById('targetUrl').value,
		site_type: document.getElementById('targetSiteType').value,
		brand: document.getElementById('targetBrand').value || undefined,
		topics: topicsRaw ? topicsRaw.split(',').map(s => s.trim()).filter(Boolean) : [],
		target_score: Number(document.getElementById('targetScore').value) || 80,
	};
	try {
		if (id) {
			await api('/api/targets/' + id, { method: 'PUT', body });
			toast('Target updated');
		} else {
			await api('/api/targets', { method: 'POST', body });
			toast('Target created');
		}
		closeModal('targetModal');
		loadTargets();
	} catch (e) { toast(e.message, 'error'); }
}

async function deleteTarget(id, name) {
	if (!confirm('Delete target "' + name + '"?')) return;
	try {
		await api('/api/targets/' + id, { method: 'DELETE' });
		toast('Target deleted');
		loadTargets();
	} catch (e) { toast(e.message, 'error'); }
}

// ── Pipelines ────────────────────────────────────────
let pipelineRefreshTimer = null;

async function loadPipelines() {
	const container = document.getElementById('pipelinesContent');
	if (!targets.length) {
		try { targets = await api('/api/targets'); } catch {}
	}
	if (!targets.length) {
		container.innerHTML = '<div class="empty">No targets. Add a target first.</div>';
		stopPipelineAutoRefresh();
		return;
	}
	let html = '';
	let hasRunning = false;
	for (const t of targets) {
		try {
			const status = await api('/api/targets/' + t.id + '/cycle/status');
			const isRunning = !status.is_terminal;
			if (isRunning) hasRunning = true;
			const promptPreview = status.current_prompt ? esc(status.current_prompt).slice(0, 120) : '';
			const resultPreview = status.current_result ? esc(status.current_result).slice(0, 120) : '';
			const runningIndicator = isRunning ? ' <span style="animation:stagePulse 1.5s infinite;color:var(--warning);font-size:12px;">⏳ Running...</span>' : '';
			// Show elapsed time or "completed X ago"
			let timeInfo = 'Started: ' + new Date(status.started_at).toLocaleString();
			if (status.completed_at) {
				const elapsedSec = Math.round((new Date(status.completed_at) - new Date(status.started_at)) / 1000);
				const agoSec = Math.round((Date.now() - new Date(status.completed_at)) / 1000);
				const agoLabel = agoSec < 60 ? agoSec + 's ago' : agoSec < 3600 ? Math.round(agoSec/60) + 'm ago' : Math.round(agoSec/3600) + 'h ago';
				timeInfo += ' | Completed: ' + agoLabel + ' (took ' + elapsedSec + 's)';
			} else if (isRunning) {
				const runningSec = Math.round((Date.now() - new Date(status.started_at)) / 1000);
				timeInfo += ' | Running: ' + runningSec + 's';
			}
			html += `<div class="card pipeline-card" onclick="togglePipeline(this, '${t.id}', '${status.pipeline_id}')">
				<div style="display:flex;justify-content:space-between;align-items:center;">
					<div style="display:flex;align-items:center;gap:4px;flex:1;min-width:0;">
						<span class="expand-icon">&#9654;</span>
						<div style="min-width:0;">
							<h2 style="font-size:15px;">${esc(t.name)}${runningIndicator}</h2>
							<div style="font-size:12px;color:var(--text-muted);">${esc(t.url)}</div>
						</div>
					</div>
					<div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
						<span class="stage-badge stage-${status.stage}">${status.stage}</span>
						${isRunning ? '<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();stopPipeline(\''+t.id+'\')">Stop</button>' : '<span class="probe-mode-group" style="display:inline-flex;border-radius:6px;overflow:hidden;border:1px solid var(--primary);">' +
							'<button class="btn btn-primary btn-sm" style="border-radius:0;border:none;padding:4px 10px;" onclick="event.stopPropagation();startPipeline(\''+t.id+'\',\'single\')" title="Single provider probe">Single</button>' +
							'<button class="btn btn-sm" style="border-radius:0;border:none;border-left:1px solid rgba(255,255,255,0.2);padding:4px 10px;background:var(--primary-dark,#1d4ed8);color:#fff;" onclick="event.stopPropagation();startPipeline(\''+t.id+'\',\'multi\')" title="Multi provider probe (all active providers)">Multi</button>' +
						'</span>'}
						${status.is_terminal ? '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deletePipeline(\''+t.id+'\',\''+status.pipeline_id+'\',\''+esc(t.name)+'\')">🗑️</button>' : ''}
					</div>
				</div>
				<div style="margin-top:6px;font-size:12px;color:var(--text-muted);">
					${timeInfo} | Stages: ${status.stage_count || 0} | Retries: ${status.retry_count} | ${(() => {
						const mode = status.llm_mode || 'unknown';
						const usedModels = status.llm_models_used && status.llm_models_used.length > 0 ? status.llm_models_used : [];
						const configuredProviders = status.configured_providers && status.configured_providers.length > 0 ? status.configured_providers : [];
						if (usedModels.length > 0) {
							return 'LLM: <code>' + esc(usedModels.join(', ')) + '</code>';
						} else if (configuredProviders.length > 0) {
							return 'LLM: <code>' + esc(configuredProviders.join(', ')) + '</code>' + (status.is_terminal ? '' : ' <span style="color:var(--text-muted)">(설정됨)</span>');
						} else if (mode === 'rule-based') {
							return '<span style="color:var(--warning);">규칙 기반 (LLM 미설정)</span>';
						} else {
							return 'LLM: -';
						}
					})()}
				</div>
				${promptPreview ? '<div class="current-prompt-preview">' + promptPreview + '</div>' : ''}
				${resultPreview && status.is_terminal ? '<div class="current-prompt-preview" style="color:var(--success);">' + resultPreview + '</div>' : ''}
				<div class="stage-list" data-pipeline="${status.pipeline_id}">
					<div style="color:var(--text-muted);font-size:12px;">Loading stages...</div>
				</div>
			</div>`;
		} catch {
			html += `<div class="card">
				<div style="display:flex;justify-content:space-between;align-items:center;">
					<div>
						<h2 style="font-size:15px;">${esc(t.name)}</h2>
						<div style="font-size:12px;color:var(--text-muted);">${esc(t.url)}</div>
					</div>
					<div style="display:flex;gap:8px;align-items:center;">
						<span class="badge badge-gray">No Pipeline</span>
						<span class="probe-mode-group" style="display:inline-flex;border-radius:6px;overflow:hidden;border:1px solid var(--primary);">
							<button class="btn btn-primary btn-sm" style="border-radius:0;border:none;padding:4px 10px;" onclick="startPipeline('${t.id}','single')" title="Single provider probe">Single</button>
							<button class="btn btn-sm" style="border-radius:0;border:none;border-left:1px solid rgba(255,255,255,0.2);padding:4px 10px;background:var(--primary-dark,#1d4ed8);color:#fff;" onclick="startPipeline('${t.id}','multi')" title="Multi provider probe (all active providers)">Multi</button>
						</span>
					</div>
				</div>
			</div>`;
		}
	}
	container.innerHTML = html;

	// Auto-refresh when any pipeline is running (SSE preferred, polling fallback)
	if (hasRunning && !sseSource) {
		startPipelineAutoRefresh();
	} else if (!hasRunning) {
		stopPipelineAutoRefresh();
	}
}

// ── SSE Real-time Events ────────────────────────────────
var sseSource = null;

function initSSE() {
	if (sseSource) return;
	try {
		sseSource = new EventSource('/events');

		sseSource.addEventListener('pipeline:started', function(e) {
			var data = JSON.parse(e.data);
			var probeLabel = data.probe_mode === 'multi' ? ' [Multi-Provider]' : ' [Single]';
			var modeLabel = data.llm_mode === 'llm' ? 'LLM: ' + (data.configured_providers || []).join(', ') : '규칙 기반 (LLM 미설정)';
			toast('Pipeline 시작 — ' + modeLabel + probeLabel, 'success');
			loadPipelines();
		});

		sseSource.addEventListener('pipeline:stage', function(e) {
			var data = JSON.parse(e.data);
			console.log('🔄 Stage:', data.stage, data.status);
			// Refresh pipelines tab if active
			var activeTab = document.querySelector('.nav button.active');
			if (activeTab && activeTab.dataset.tab === 'pipelines') {
				loadPipelines();
			}
		});

		sseSource.addEventListener('pipeline:stage-complete', function(e) {
			var data = JSON.parse(e.data);
			console.log('✅ Stage complete:', data.result_summary);
			var activeTab = document.querySelector('.nav button.active');
			if (activeTab && activeTab.dataset.tab === 'pipelines') {
				loadPipelines();
			}
		});

		sseSource.addEventListener('pipeline:completed', function(e) {
			var data = JSON.parse(e.data);
			toast('Pipeline completed: ' + data.initial_score + ' → ' + data.final_score + ' (+' + data.delta + ')', 'success');
			loadPipelines();
			// Also refresh evaluation if on that tab
			var activeTab = document.querySelector('.nav button.active');
			if (activeTab && activeTab.dataset.tab === 'evaluation') {
				loadEvaluation();
			}
		});

		sseSource.addEventListener('pipeline:failed', function(e) {
			var data = JSON.parse(e.data);
			var errorMsg = data.error || 'Unknown error';
			var isLLMError = /401|403|unauthorized|forbidden|invalid.*key|access.*denied|authentication|invalid_api_key|incorrect.*api.*key|LLM.*인증|API.*인증|API.*Key.*설정|LLM.*초기화/i.test(errorMsg);
			if (isLLMError) {
				showLLMErrorModal(errorMsg);
			} else {
				toast('Pipeline failed: ' + errorMsg, 'error');
			}
			loadPipelines();
		});

		sseSource.addEventListener('pipeline:stage-fail', function(e) {
			var data = JSON.parse(e.data);
			console.log('❌ Stage failed:', data.error);
			loadPipelines();
		});

		sseSource.addEventListener('pipeline:llm-warning', function(e) {
			var data = JSON.parse(e.data);
			var errMsg = '⚠️ LLM errors (' + data.errors.length + '): ' + data.errors[0].slice(0, 100);
			if (data.errors.length > 1) errMsg += ' (+' + (data.errors.length - 1) + ' more)';
			toast(errMsg, 8000);
		});

		sseSource.onerror = function() {
			// SSE disconnected — fall back to polling
			console.warn('SSE disconnected, falling back to polling');
			sseSource.close();
			sseSource = null;
			startPipelineAutoRefresh();
		};
	} catch(err) {
		console.warn('SSE not available, using polling fallback');
		startPipelineAutoRefresh();
	}
}

function startPipelineAutoRefresh() {
	if (pipelineRefreshTimer) return; // already running
	pipelineRefreshTimer = setInterval(function() {
		// Only refresh if Pipelines tab is active
		var activeTab = document.querySelector('.nav button.active');
		if (activeTab && activeTab.dataset.tab === 'pipelines') {
			loadPipelines();
		} else {
			stopPipelineAutoRefresh();
		}
	}, 3000);
}

function stopPipelineAutoRefresh() {
	if (pipelineRefreshTimer) {
		clearInterval(pipelineRefreshTimer);
		pipelineRefreshTimer = null;
	}
}

async function deletePipeline(targetId, pipelineId, targetName) {
	if (!confirm('Delete pipeline results for "' + targetName + '"? This cannot be undone.')) return;
	try {
		await api('/api/targets/' + targetId + '/pipeline/' + pipelineId, { method: 'DELETE' });
		toast('Pipeline results deleted');
		loadPipelines();
	} catch (e) { toast(e.message, 'error'); }
}

async function togglePipeline(card, targetId, pipelineId) {
	card.classList.toggle('expanded');
	const stageList = card.querySelector('.stage-list');
	// Always reload stages when expanding (no caching - supports running pipelines)
	if (card.classList.contains('expanded')) {
		try {
			const stages = await api('/api/targets/' + targetId + '/pipeline/' + pipelineId + '/stages');
			if (!stages.length) {
				stageList.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:4px 0;">No stage details available (pipeline may not have started execution yet).</div>';
			} else {
				stageList.innerHTML = stages.map(function(s) {
					const dur = s.duration_ms ? (s.duration_ms / 1000).toFixed(1) + 's' : 'running...';
					const statusIcon = s.status === 'completed' ? '✅' : s.status === 'failed' ? '❌' : s.status === 'running' ? '🔄' : '⏳';
					const resultLines = (s.result_summary || '').split('\n').slice(0, 3).join('\n');
					return '<div class="stage-item">' +
						'<div class="stage-dot ' + s.status + '"></div>' +
						'<div style="flex:1;min-width:0;">' +
							'<div style="display:flex;justify-content:space-between;align-items:center;">' +
								'<strong>' + esc(s.stage) + (s.cycle > 0 ? ' (cycle ' + s.cycle + ')' : '') + ' ' + statusIcon + '</strong>' +
								'<span class="stage-timing">' + dur + '</span>' +
							'</div>' +
							'<div class="stage-prompt">' + esc(s.prompt_summary) + '</div>' +
							(resultLines ? '<div class="stage-result">' + esc(resultLines) + '</div>' : '') +
							(s.error_message ? '<div style="color:var(--danger);font-size:12px;margin-top:2px;">Error: ' + esc(s.error_message) + '</div>' : '') +
						'</div>' +
					'</div>';
				}).join('');
			}
		} catch (e) {
			stageList.innerHTML = '<div style="color:var(--danger);font-size:12px;">Failed to load stages: ' + esc(e.message) + '</div>';
		}
	}
}

async function startPipeline(targetId, probeMode) {
	probeMode = probeMode || 'single';
	try {
		await api('/api/targets/' + targetId + '/pipeline?execute=true&probe_mode=' + probeMode, { method: 'POST' });
		var modeLabel = probeMode === 'multi' ? 'Multi-Provider' : 'Single-Provider';
		toast('Pipeline started (' + modeLabel + ') — watching progress...');
		// Immediately start auto-refresh and load pipelines
		startPipelineAutoRefresh();
		loadPipelines();
	} catch (e) { toast(e.message, 'error'); }
}

async function stopPipeline(targetId) {
	try {
		await api('/api/targets/' + targetId + '/cycle/stop', { method: 'POST' });
		toast('Pipeline stopped');
		loadPipelines();
	} catch (e) { toast(e.message, 'error'); }
}

// ── Evaluation ───────────────────────────────────────
let evalInitialized = false;
let currentEvalData = null;
let activeEvalSubTab = 'overview';

async function initEvalTab() {
	const select = document.getElementById('evalTargetSelect');
	if (!evalInitialized) {
		if (!targets.length) { try { targets = await api('/api/targets'); } catch {} }
		select.innerHTML = '<option value="">Select a target...</option>' +
			targets.map(function(t) { return '<option value="' + t.id + '">' + esc(t.name) + ' (' + esc(t.url) + ')</option>'; }).join('');
		evalInitialized = true;
	}
}

async function onEvalTargetChange() {
	var targetId = document.getElementById('evalTargetSelect').value;
	var pipelineSelect = document.getElementById('evalPipelineSelect');
	var container = document.getElementById('evalContent');
	var subTabsContainer = document.getElementById('evalSubTabs');

	var stickyHeader = document.getElementById('evalStickyHeader');

	if (!targetId) {
		pipelineSelect.style.display = 'none';
		pipelineSelect.innerHTML = '';
		container.innerHTML = '<div class="empty">Select a target to view evaluation results.</div>';
		subTabsContainer.classList.add('hidden');
		stickyHeader.classList.add('hidden');
		return;
	}

	// Load all pipelines for this target and populate the dropdown
	try {
		var pipelines = await api('/api/targets/' + targetId + '/pipeline');
		if (!pipelines || pipelines.length === 0) {
			pipelineSelect.style.display = 'none';
			container.innerHTML = '<div class="empty">No pipeline found. Run a pipeline first.</div>';
			subTabsContainer.classList.add('hidden');
			return;
		}
		pipelines.sort(function(a, b) { return new Date(b.started_at) - new Date(a.started_at); });
		pipelineSelect.innerHTML = pipelines.map(function(p, i) {
			var label = (i === 0 ? '(Latest) ' : '') + p.pipeline_id.slice(0, 8) + '... · ' + new Date(p.started_at).toLocaleString() + ' · ' + p.stage;
			return '<option value="' + p.pipeline_id + '">' + label + '</option>';
		}).join('');
		pipelineSelect.style.display = 'inline-block';
		loadEvaluation();
	} catch (e) {
		pipelineSelect.style.display = 'none';
		container.innerHTML = '<div class="empty">No pipeline found. Run a pipeline first.</div>';
		subTabsContainer.classList.add('hidden');
	}
}

async function loadEvaluation() {
	var targetId = document.getElementById('evalTargetSelect').value;
	var pipelineSelect = document.getElementById('evalPipelineSelect');
	var container = document.getElementById('evalContent');
	var subTabsContainer = document.getElementById('evalSubTabs');

	if (!targetId) {
		container.innerHTML = '<div class="empty">Select a target to view evaluation results.</div>';
		subTabsContainer.classList.add('hidden');
		return;
	}

	var selectedPipelineId = pipelineSelect.value;
	var stickyEl = document.getElementById('evalStickyHeader');
	if (!selectedPipelineId) {
		container.innerHTML = '<div class="empty">No pipeline selected.</div>';
		subTabsContainer.classList.add('hidden');
		stickyEl.classList.add('hidden');
		return;
	}

	container.innerHTML = '<div class="empty">Loading evaluation...</div>';
	subTabsContainer.classList.add('hidden');
	stickyEl.classList.add('hidden');

	try {
		// Fetch specific pipeline info
		var pipeline = await api('/api/targets/' + targetId + '/pipeline/' + selectedPipelineId);
		var isTerminal = ['COMPLETED', 'FAILED', 'PARTIAL_FAILURE', 'STOPPED'].includes(pipeline.stage);

		// Show pipeline status header
		var statusHtml = '<div class="card" style="padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">';
		statusHtml += '<div style="font-size:12px;color:var(--text-muted);">Pipeline: <code>' + pipeline.pipeline_id.slice(0, 8) + '...</code> · Started: ' + new Date(pipeline.started_at).toLocaleString() + '</div>';
		statusHtml += '<div style="display:flex;gap:8px;align-items:center;">';
		statusHtml += '<span class="stage-badge stage-' + pipeline.stage + '">' + pipeline.stage + '</span>';
		if (!isTerminal) {
			statusHtml += '<span style="font-size:12px;color:var(--warning);animation:stagePulse 1.5s infinite;">⏳ Pipeline still running — click Refresh for latest results</span>';
		}
		statusHtml += '</div></div>';

		try {
			var evalData = await api('/api/targets/' + targetId + '/pipeline/' + selectedPipelineId + '/evaluation');
			currentEvalData = evalData;
			buildEvalSubTabs(evalData);
			subTabsContainer.classList.remove('hidden');
			// Render sticky score header
			var stickyEl = document.getElementById('evalStickyHeader');
			stickyEl.classList.remove('hidden');
			stickyEl.innerHTML = renderStickyScoreHeader(evalData);
			drawGaugeCanvas(evalData.initial_score);
			// Load executive summary: use cached if available, otherwise fetch
			if (evalData.executive_summary && evalData.executive_summary.catchphrase) {
				renderExecutiveSummary(evalData.executive_summary);
			} else {
				loadExecutiveSummary(targetId, selectedPipelineId);
			}
			// Add LLM models info to status header
			if (evalData.llm_models_used && evalData.llm_models_used.length > 0) {
				statusHtml = statusHtml.replace('</div></div>', ' · LLM: <code>' + esc(evalData.llm_models_used.join(', ')) + '</code></div></div>');
			}
			// Show LLM errors prominently
			if (evalData.llm_errors && evalData.llm_errors.length > 0) {
				var errHtml = '<div class="card" style="padding:12px 16px;margin-bottom:16px;border:1px solid var(--danger);background:rgba(239,68,68,0.1);">';
				errHtml += '<div style="color:var(--danger);font-weight:600;margin-bottom:4px;">LLM Errors (' + evalData.llm_errors.length + ')</div>';
				errHtml += '<div style="font-size:12px;color:var(--text-muted);">LLM calls failed — results are rule-based only. Check model name and API key settings.</div>';
				errHtml += '<ul style="margin:8px 0 0 16px;font-size:12px;">';
				evalData.llm_errors.slice(0, 3).forEach(function(e) { errHtml += '<li>' + esc(e.slice(0, 150)) + '</li>'; });
				if (evalData.llm_errors.length > 3) errHtml += '<li>... +' + (evalData.llm_errors.length - 3) + ' more</li>';
				errHtml += '</ul></div>';
				statusHtml += errHtml;
			}
			container.innerHTML = statusHtml;
			var evalDiv = document.createElement('div');
			evalDiv.id = 'evalSubContent';
			container.appendChild(evalDiv);
			renderEvalSubTab(activeEvalSubTab, evalData, evalDiv);
		} catch (e2) {
			if (!isTerminal) {
				container.innerHTML = statusHtml + '<div class="empty">Pipeline is running (' + pipeline.stage + '). Evaluation data will be available after ANALYZING stage completes. Click Refresh to check.</div>';
			} else {
				container.innerHTML = statusHtml + '<div class="empty">No evaluation data available for this pipeline.</div>';
			}
		}
	} catch (e) {
		container.innerHTML = '<div class="empty">Failed to load pipeline: ' + esc(e.message) + '</div>';
	}
}

function buildEvalSubTabs(data) {
	var tabGroups = [
		{ label: '종합', tabs: [{id:'overview', icon:'📊', label:'종합 개요'}] },
		{ label: '분석', tabs: [
			{id:'crawlability', icon:'🤖', label:'크롤링'},
			{id:'structure', icon:'🏗️', label:'구조화'},
			{id:'products', icon:'📦', label:'제품'},
			{id:'brand', icon:'💬', label:'브랜드'},
			{id:'pages', icon:'🔍', label:'페이지'},
			{id:'evidence', icon:'🔬', label:'실증'},
			{id:'recommendations', icon:'🎯', label:'권고'},
			{id:'probes', icon:'🧪', label:'Probes'}
		]},
		{ label: '보고서', tabs: [
			{id:'initial-report', icon:'📋', label:'Initial'},
			{id:'validation-report', icon:'✅', label:'Validation'},
			{id:'final-report', icon:'📊', label:'Final'}
		]},
		{ label: '기술', tabs: [
			{id:'pipeline', icon:'⏱️', label:'실행'},
			{id:'llmlog', icon:'🔎', label:'LLM Log'},
			{id:'raw-data', icon:'💾', label:'Raw'}
		]}
	];
	var html = '';
	for (var g = 0; g < tabGroups.length; g++) {
		var grp = tabGroups[g];
		html += '<div class="eval-tab-group">';
		html += '<span class="eval-tab-group-label">' + grp.label + '</span>';
		for (var i = 0; i < grp.tabs.length; i++) {
			var t = grp.tabs[i];
			var cls = t.id === activeEvalSubTab ? 'eval-tab-btn active' : 'eval-tab-btn';
			html += '<button class="' + cls + '" onclick="switchEvalSubTab(\'' + t.id + '\')">' + t.icon + ' ' + t.label + '</button>';
		}
		html += '</div>';
	}
	document.getElementById('evalSubTabs').innerHTML = html;
}

function switchEvalSubTab(tabId) {
	activeEvalSubTab = tabId;
	if (currentEvalData) {
		buildEvalSubTabs(currentEvalData);
		var target = document.getElementById('evalSubContent');
		if (target) renderEvalSubTab(tabId, currentEvalData, target);
	}
}

function scoreColor(score) {
	if (score >= 80) return '#10B981';
	if (score >= 60) return '#3B82F6';
	if (score >= 40) return '#F59E0B';
	return '#EF4444';
}

function scoreColorRgba(score, alpha) {
	if (score >= 80) return 'rgba(16,185,129,' + alpha + ')';
	if (score >= 60) return 'rgba(59,130,246,' + alpha + ')';
	if (score >= 40) return 'rgba(245,158,11,' + alpha + ')';
	return 'rgba(239,68,68,' + alpha + ')';
}

function renderStickyScoreHeader(data) {
	var score = data.initial_score || 0;
	var color = scoreColor(score);
	var dims = data.dimensions || [];
	var html = '<div class="eval-sticky-header">';
	html += '<div class="eval-sticky-score">';
	// Gauge
	html += '<div class="geo-gauge"><canvas id="geoGaugeCanvas" width="288" height="288"></canvas>';
	html += '<div class="gauge-value" style="color:' + color + ';">' + Math.round(score) + '</div></div>';
	// Score meta
	html += '<div class="score-meta">';
	html += '<div class="score-label">GEO Readiness</div>';
	html += '<div class="score-value" style="color:' + color + ';">' + score.toFixed(1) + '<span style="font-size:12px;color:var(--text-muted);font-weight:400;"> / 100</span></div>';
	html += '<div class="score-grade">' + esc(String(data.initial_grade || '')) + ' · ' + esc(String(data.site_type || '')) + '</div>';
	html += '</div>';
	// Delta if exists
	if (data.delta && data.delta !== 0) {
		var fScore = data.final_score || score;
		var fColor = scoreColor(fScore);
		html += '<div style="display:flex;align-items:center;gap:12px;">';
		html += '<div style="font-size:28px;color:var(--text-muted);">&#8594;</div>';
		html += deltaBadge(data.delta);
		html += '<div style="font-size:32px;font-weight:900;color:' + fColor + ';">' + Math.round(fScore) + '</div>';
		html += '</div>';
	}
	// Divider + Mini dimension bars
	if (dims.length > 0) {
		html += '<div class="sticky-divider"></div>';
		html += '<div class="dim-mini-bars">';
		for (var i = 0; i < dims.length; i++) {
			var d = dims[i];
			var dc = scoreColor(d.score);
			html += '<div class="dim-mini-bar">';
			html += '<div class="mini-bar-track"><div class="mini-bar-fill" style="height:' + d.score + '%;background:' + dc + ';"></div></div>';
			html += '<div class="mini-label">' + esc(d.id) + '</div>';
			html += '<div class="mini-score" style="color:' + dc + ';">' + Math.round(d.score) + '</div>';
			html += '</div>';
		}
		html += '</div>';
	}
	html += '</div>';
	// Executive summary placeholder
	html += '<div id="execSummaryArea" class="exec-summary-loading"><span>AI &#48516;&#49437; &#51473;</span><span class="loading-dots"></span></div>';
	html += '</div>';
	return html;
}

function drawGaugeCanvas(score) {
	var canvas = document.getElementById('geoGaugeCanvas');
	if (!canvas) return;
	var ctx = canvas.getContext('2d');
	var size = 288;
	var cx = size / 2, cy = size / 2, r = 120;
	var startAngle = 0.75 * Math.PI;
	var endAngle = 2.25 * Math.PI;
	var scoreAngle = startAngle + (endAngle - startAngle) * (score / 100);
	var color = scoreColor(score);
	ctx.clearRect(0, 0, size, size);
	// Background arc
	ctx.beginPath();
	ctx.arc(cx, cy, r, startAngle, endAngle);
	ctx.strokeStyle = 'rgba(55,65,81,0.5)';
	ctx.lineWidth = 16;
	ctx.lineCap = 'round';
	ctx.stroke();
	// Score arc
	if (score > 0) {
		ctx.beginPath();
		ctx.arc(cx, cy, r, startAngle, scoreAngle);
		ctx.strokeStyle = color;
		ctx.lineWidth = 16;
		ctx.lineCap = 'round';
		ctx.stroke();
	}
}

function renderExecutiveSummary(summary) {
	var area = document.getElementById('execSummaryArea');
	if (!area) return;
	if (!summary || !summary.catchphrase) {
		area.innerHTML = '';
		area.className = '';
		return;
	}
	var riskCls = 'exec-risk-' + (summary.risk_level || 'moderate');
	var riskLabel = {critical:'CRITICAL',warning:'WARNING',moderate:'MODERATE',good:'GOOD',excellent:'EXCELLENT'}[summary.risk_level] || 'UNKNOWN';
	var html = '<div class="exec-summary">';
	html += '<div class="exec-verdict">';
	html += '<div class="exec-catchphrase">' + esc(summary.catchphrase || '') + ' <span class="exec-risk-badge ' + riskCls + '">' + riskLabel + '</span></div>';
	html += '<div class="exec-text">' + esc(summary.verdict || '') + '</div>';
	html += '</div>';
	if (summary.top_priorities && summary.top_priorities.length > 0) {
		html += '<div class="exec-priorities"><h4>\uC6B0\uC120 \uAC1C\uC120 \uACFC\uC81C</h4>';
		for (var i = 0; i < summary.top_priorities.length; i++) {
			var p = summary.top_priorities[i];
			var borderColor = i === 0 ? '#EF4444' : i === 1 ? '#F59E0B' : '#3B82F6';
			html += '<div class="exec-priority-item" style="border-left-color:' + borderColor + ';">';
			html += '<div class="pri-num">' + (i + 1) + '</div>';
			html += '<div><div class="pri-title">' + esc(p.title || '') + '</div>';
			html += '<div class="pri-desc">' + esc(p.description || '') + '</div></div></div>';
		}
		html += '</div>';
	}
	html += '</div>';
	area.className = '';
	area.innerHTML = html;
}

async function loadExecutiveSummary(targetId, pipelineId) {
	var area = document.getElementById('execSummaryArea');
	if (!area) return;
	try {
		var summary = await api('/api/targets/' + targetId + '/pipeline/' + pipelineId + '/executive-summary');
		if (summary.error) {
			area.innerHTML = '';
			area.className = '';
			return;
		}
		renderExecutiveSummary(summary);
	} catch (e) {
		area.innerHTML = '';
		area.className = '';
	}
}

function deltaBadge(delta) {
	var cls = delta > 0 ? 'delta-positive' : delta < 0 ? 'delta-negative' : 'delta-zero';
	var sign = delta > 0 ? '+' : '';
	return '<span class="delta-badge ' + cls + '">' + sign + delta.toFixed(1) + '</span>';
}

function findingCard(icon, title, desc) {
	return '<div style="padding:12px;margin-bottom:8px;background:var(--surface2);border-radius:6px;display:flex;gap:10px;">' +
		'<span style="font-size:18px;flex-shrink:0;">' + icon + '</span>' +
		'<div><h4 style="font-size:13px;font-weight:700;margin-bottom:4px;">' + esc(title) + '</h4>' +
		'<p style="font-size:12px;color:var(--text-muted);line-height:1.5;">' + esc(desc) + '</p></div></div>';
}

function renderSprintGroup(label, color, items) {
	if (items.length === 0) return '';
	var h = '<div style="margin-bottom:16px;">';
	h += '<div style="font-size:11px;font-weight:700;color:' + color + ';text-transform:uppercase;letter-spacing:0.7px;margin-bottom:8px;">' + label + '</div>';
	for (var i = 0; i < items.length; i++) {
		var r = items[i];
		var impactBars = '';
		for (var j = 0; j < 5; j++) impactBars += j < r.impact ? '★' : '☆';
		var diffLabel = r.difficulty <= 1 ? '\uC27D\uC74C' : r.difficulty <= 2 ? '\uBCF4\uD1B5' : r.difficulty <= 3 ? '\uB09C\uC774\uB3C4 \uB192\uC74C' : '\uB9E4\uC6B0 \uB09C\uD574';
		var diffColor = r.difficulty <= 1 ? 'var(--success)' : r.difficulty <= 2 ? 'var(--warning)' : 'var(--danger)';
		h += '<div style="padding:10px 14px;margin-bottom:8px;background:var(--surface2);border-radius:6px;border-left:3px solid ' + (r.impact >= 4 ? 'var(--danger)' : r.impact >= 3 ? 'var(--warning)' : 'var(--success)') + ';">';
		h += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;">';
		h += '<strong style="font-size:13px;">' + esc(r.id) + ' ' + esc(r.title) + '</strong>';
		h += '<div style="display:flex;gap:8px;align-items:center;font-size:11px;">';
		h += '<span style="color:var(--warning);">' + impactBars + '</span>';
		h += '<span style="color:' + diffColor + ';font-weight:600;">' + diffLabel + '</span>';
		h += '</div></div>';
		h += '<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">' + esc(r.description) + '</div>';
		h += '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">현재: ' + esc(r.current_state) + ' · 영향: ' + r.affected_dimensions.join(', ') + '</div>';
		h += '</div>';
	}
	h += '</div>';
	return h;
}

function renderEvalSubTab(tabId, data, container) {
	var ed = data.eval_data || {};
	var rr = data.rich_report || null;
	var html = '';
	switch (tabId) {
	case 'overview':
		html = renderOverviewTab(data, ed, rr);
		break;
	case 'crawlability':
		html = renderCrawlabilityTab(data, ed, rr);
		break;
	case 'structure':
		html = renderStructureTab(data, ed, rr);
		break;
	case 'products':
		html = renderProductsTab(data, ed, rr);
		break;
	case 'brand':
		html = renderBrandTab(data, ed, rr);
		break;
	case 'pages':
		html = renderPagesTab(data, rr);
		break;
	case 'recommendations':
		html = renderRecommendationsTab(data, ed, rr);
		break;
	case 'evidence':
		html = renderEvidenceTab(data, ed, rr);
		break;
	case 'probes':
		html = renderProbesTab(data, rr);
		break;
	case 'initial-report':
		html = renderInitialReportTab(data);
		break;
	case 'validation-report':
		html = renderValidationReportTab(data);
		break;
	case 'final-report':
		html = renderFinalReportTab(data);
		break;
	case 'pipeline':
		html = renderPipelineTab(data);
		break;
	case 'llmlog':
		html = buildLLMLogTab(data);
		break;
	case 'raw-data':
		html = renderRawDataTab(data);
		break;
	default:
		html = '<div class="empty">Unknown tab</div>';
	}
	container.innerHTML = html;
}

// ── Tab 1: Overview ──────────────────────────────────
function renderOverviewTab(data, ed, rr) {

			html += '<span style="font-size:12px;font-weight:700;flex:1;">' + esc(d.label) + '</span>';

			if (d.details && d.details.length > 0) {

					var isNegative = detail.indexOf('-') >= 0 || detail.indexOf('No ') >= 0 || detail.indexOf('not ') >= 0 || detail.indexOf('blocked') >= 0 || detail.indexOf('Missing') >= 0 || detail.indexOf('Slow') >= 0 || detail.indexOf('penalty') >= 0;

			html += '<div class="bar-track" style="height:8px;"><div class="bar-fill" style="width:' + citRate + '%;background:' + scoreColor(citRate) + ';"></div></div>';

			// Accuracy
			html += '<div style="margin-bottom:4px;">';

			html += '</div>';

		html += '<div style="padding:24px;text-align:center;">';

			html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">\uD604\uC7AC \uB2E8\uC77C \uD504\uB85C\uBC14\uC774\uB354 \uBAA8\uB4DC</div>';
			for (var mi = 0; mi < data.llm_models_used.length; mi++) {

			html += '<div style="font-size:11px;color:var(--text-muted);margin-top:16px;line-height:1.6;">\uBA40\uD2F0 \uD504\uB85C\uBC14\uC774\uB354 \uD504\uB85C\uBE0C\uB97C \uD65C\uC131\uD654\uD558\uBA74<br>LLM\uBCC4 \uC778\uC6A9\uB960/\uC815\uD655\uB3C4\uB97C \uBE44\uAD50\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.</div>';

	// Explanation footer

		html += '<div class="card" style="border-top:3px solid var(--accent);">';
		html += '<div class="eval-section-title" style="border-bottom:none;margin-bottom:12px;"><div class="dot"></div> \uD575\uC2EC \uAE30\uD68C</div>';
