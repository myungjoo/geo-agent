		var pr = probes.probes[j];
		var vCol = pr.verdict === 'PASS' ? '#22c55e' : pr.verdict === 'PARTIAL' ? '#f59e0b' : '#ef4444';
		html += '<details style="margin-bottom:8px;border:1px solid var(--border);border-radius:8px;padding:0;">';
		html += '<summary style="padding:10px 14px;cursor:pointer;font-size:13px;"><span style="color:' + vCol + ';font-weight:600;">[' + pr.verdict + ']</span> ' + escHtml(pr.probe_id) + ' ' + escHtml(pr.probe_name) + '</summary>';
		html += '<div style="padding:10px 14px;border-top:1px solid var(--border);">';
		html += '<div style="margin-bottom:8px;"><strong style="font-size:12px;">질의:</strong><div style="background:var(--bg-primary);padding:8px;border-radius:4px;font-size:12px;margin-top:4px;">' + escHtml(pr.query) + '</div></div>';
		if (pr.error) {
			html += '<div style="margin-bottom:8px;"><strong style="font-size:12px;color:var(--danger);">❌ 에러:</strong><div style="background:rgba(239,68,68,0.1);padding:8px;border-radius:4px;font-size:12px;margin-top:4px;color:var(--danger);">' + escHtml(pr.error) + '</div></div>';
		}
		html += '<div><strong style="font-size:12px;">응답:</strong><div style="background:var(--bg-primary);padding:8px;border-radius:4px;font-size:12px;margin-top:4px;max-height:200px;overflow-y:auto;white-space:pre-wrap;">' + escHtml(pr.response || '(응답 없음)') + '</div></div>';
		html += '</div></details>';
	}
	html += '</div>';
	return html;
}

// (renderAnalysisReportTab replaced by renderInitialReportTab above)

// ── Tab: Initial Report ──────────────────────────────
function renderInitialReportTab(data) {
	var report = data.analysis_report || {};
	var html = '';

	// Score + grade + site type
	html += '<div class="card" style="padding:16px;">';
	html += '<h3 style="font-size:16px;margin-bottom:12px;">Initial Analysis Report (ANALYZING Stage)</h3>';
	html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;">';
	html += '<div class="rich-metric-card"><div class="metric-value" style="color:' + scoreColor(report.score || 0) + ';">' + (report.score || 0) + '</div><div class="metric-label">Overall Score</div></div>';
	html += '<div class="rich-metric-card"><div class="metric-value" style="font-size:16px;">' + esc(report.grade || 'N/A') + '</div><div class="metric-label">Grade</div></div>';
	html += '<div class="rich-metric-card"><div class="metric-value" style="font-size:16px;">' + esc(report.site_type || 'N/A') + '</div><div class="metric-label">Site Type</div></div>';
	html += '</div></div>';

	// Dimensions
	if (report.dimensions && report.dimensions.length > 0) {
		html += '<div class="card" style="padding:16px;">';
		html += '<h3 style="font-size:14px;margin-bottom:12px;">7-Dimension Scores</h3>';
		for (var i = 0; i < report.dimensions.length; i++) {
			var d = report.dimensions[i];
			html += '<div style="margin-bottom:10px;">';
			html += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">';
			html += '<span>' + esc(d.id + ': ' + d.label) + ' <span style="color:var(--text-muted);">(w:' + (d.weight || 0) + ')</span></span>';
			html += '<span style="font-weight:600;color:' + scoreColor(d.score) + ';">' + d.score + '</span></div>';
			html += '<div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;">';
			html += '<div style="height:100%;width:' + Math.min(d.score, 100) + '%;background:' + scoreColor(d.score) + ';border-radius:3px;"></div></div>';
			if (d.details && d.details.length > 0) {
				html += '<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">' + d.details.map(esc).join(' · ') + '</div>';
			}
			html += '</div>';
		}
		html += '</div>';
	}

	// Multi-page summary
	if (report.multi_page && report.multi_page.pages) {
		var mp = report.multi_page;
		html += '<div class="card" style="padding:16px;">';
		html += '<h3 style="font-size:14px;margin-bottom:12px;">Multi-Page Analysis (' + (mp.page_count || mp.pages.length || 0) + ' pages)</h3>';
		if (mp.aggregate_score !== undefined) {
			html += '<div style="font-size:13px;margin-bottom:8px;">Aggregate Score: <strong style="color:' + scoreColor(mp.aggregate_score) + ';">' + mp.aggregate_score + '</strong> (' + esc(mp.aggregate_grade || '') + ')</div>';
		}
		html += '<table class="eval-page-table" style="font-size:11px;"><thead><tr><th>Page</th><th>Score</th><th>Grade</th></tr></thead><tbody>';
		for (var j = 0; j < mp.pages.length; j++) {
			var p = mp.pages[j];
			html += '<tr><td>' + esc(p.filename || p.url || '') + '</td>';
			html += '<td style="color:' + scoreColor(p.score) + ';font-weight:600;">' + p.score + '</td>';
			html += '<td>' + esc(p.grade || '') + '</td></tr>';
		}
		html += '</tbody></table></div>';
	}

	// Key Findings (from eval_data)
	var ed = report.eval_data || data.eval_data || {};
	if (ed.strengths || ed.weaknesses || ed.opportunities) {
		html += '<div class="card" style="padding:16px;">';
		html += '<h3 style="font-size:14px;margin-bottom:12px;">Key Findings</h3>';
		html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;">';
		if (ed.strengths && ed.strengths.length > 0) {
			html += '<div><h4 style="font-size:12px;color:var(--success);margin-bottom:8px;">Strengths (' + ed.strengths.length + ')</h4>';
			ed.strengths.forEach(function(s) { html += findingCard('✅', s.title || s.category || '', s.description || s.detail || ''); });
			html += '</div>';
		}
		if (ed.weaknesses && ed.weaknesses.length > 0) {
			html += '<div><h4 style="font-size:12px;color:var(--danger);margin-bottom:8px;">Weaknesses (' + ed.weaknesses.length + ')</h4>';
			ed.weaknesses.forEach(function(s) { html += findingCard('⚠️', s.title || s.category || '', s.description || s.detail || ''); });
			html += '</div>';
		}
		if (ed.opportunities && ed.opportunities.length > 0) {
			html += '<div><h4 style="font-size:12px;color:var(--primary);margin-bottom:8px;">Opportunities (' + ed.opportunities.length + ')</h4>';
			ed.opportunities.forEach(function(s) { html += findingCard('🎯', s.title || s.category || '', s.description || s.detail || ''); });
			html += '</div>';
		}
		html += '</div></div>';
	}

	// LLM Assessment
	if (report.llm_assessment) {
		html += '<div class="card" style="padding:16px;">';
		html += '<h3 style="font-size:14px;margin-bottom:12px;">LLM Quality Assessment</h3>';
		var la = report.llm_assessment;
		if (la.brand_recognition) {
			html += '<div style="margin-bottom:8px;font-size:12px;"><strong>Brand Recognition:</strong> ' + (la.brand_recognition.score || 0) + '/100';
			if (la.brand_recognition.identified_brand) html += ' — ' + esc(la.brand_recognition.identified_brand);
			html += '</div>';
		}
		if (la.content_quality) {
			html += '<div style="margin-bottom:8px;font-size:12px;"><strong>Content Quality:</strong> ' + (la.content_quality.score || 0) + '/100 (clarity: ' + (la.content_quality.clarity || 0) + ', completeness: ' + (la.content_quality.completeness || 0) + ')</div>';
		}
		if (la.overall_assessment) {
			html += '<div style="font-size:12px;color:var(--text-muted);padding:8px;background:var(--surface2);border-radius:6px;">' + esc(la.overall_assessment) + '</div>';
		}
		html += '</div>';
	}

	// Raw data collapsible
	html += collapsible('Full ANALYZING stage result (JSON)', jsonBlock(report));

	return html;
}

// ── Tab: Validation Report ───────────────────────────
function renderValidationReportTab(data) {
	var v = data.validation;
	if (!v) {
		return '<div class="card"><div class="empty">Validation 미실행 — 파이프라인이 VALIDATING 단계까지 진행되지 않았습니다.</div></div>';
	}

	var html = '';

	// Before/After Score comparison
	html += '<div class="card eval-score-card">';
	var beforeScore = data.initial_score || 0;
	var afterScore = v.after || v.after_score || data.final_score || beforeScore;
	var delta = (v.delta !== undefined) ? v.delta : (afterScore - beforeScore);
	var bColor = scoreColor(beforeScore);
	var aColor = scoreColor(afterScore);

	html += '<div style="text-align:center;"><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Before</div>';
	html += '<div class="score-circle" style="background:conic-gradient(' + bColor + ' 0% ' + beforeScore + '%, var(--border) ' + beforeScore + '%);">';
	html += '<span style="color:' + bColor + ';">' + Math.round(beforeScore) + '</span></div>';
	html += '<div style="font-size:20px;font-weight:800;color:' + bColor + ';margin-top:4px;">' + beforeScore.toFixed(1) + '</div></div>';

	html += '<div style="text-align:center;padding:0 20px;align-self:center;">';
	html += '<div style="font-size:24px;margin-bottom:4px;">→</div>' + deltaBadge(delta) + '</div>';

	html += '<div style="text-align:center;"><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">After</div>';
	html += '<div class="score-circle" style="background:conic-gradient(' + aColor + ' 0% ' + afterScore + '%, var(--border) ' + afterScore + '%);">';
	html += '<span style="color:' + aColor + ';">' + Math.round(afterScore) + '</span></div>';
	html += '<div style="font-size:20px;font-weight:800;color:' + aColor + ';margin-top:4px;">' + afterScore.toFixed(1) + '</div></div>';
	html += '</div>';

	// Stop reason
	if (v.stop_reason) {
		html += '<div class="card" style="padding:12px 16px;font-size:13px;">Stop Reason: <strong>' + esc(v.stop_reason) + '</strong></div>';
	}

	// Dimension deltas
	if (v.dimension_deltas && v.dimension_deltas.length > 0) {
		html += '<div class="card" style="padding:16px;">';
		html += '<h3 style="font-size:14px;margin-bottom:12px;">차원별 변화</h3>';
		html += '<table class="eval-page-table"><thead><tr><th>차원</th><th>Before</th><th>After</th><th>Delta</th></tr></thead><tbody>';
		for (var i = 0; i < v.dimension_deltas.length; i++) {
			var dd = v.dimension_deltas[i];
			var ddColor = dd.delta > 0 ? 'var(--success)' : dd.delta < 0 ? 'var(--danger)' : 'var(--text-muted)';
			var ddSign = dd.delta > 0 ? '+' : '';
			html += '<tr><td><strong>' + esc(dd.id || '') + '</strong> ' + esc(dd.label || '') + '</td>';
			html += '<td>' + (dd.before !== undefined ? dd.before.toFixed(1) : '-') + '</td>';
			html += '<td style="color:' + scoreColor(dd.after || 0) + ';font-weight:600;">' + (dd.after !== undefined ? dd.after.toFixed(1) : '-') + '</td>';
			html += '<td style="color:' + ddColor + ';font-weight:600;">' + ddSign + (dd.delta !== undefined ? dd.delta.toFixed(1) : '-') + '</td></tr>';
		}
		html += '</tbody></table>';

		// Visual bars
		html += '<div style="margin-top:16px;">';
		for (var i = 0; i < v.dimension_deltas.length; i++) {
			var dd = v.dimension_deltas[i];
			html += '<div style="margin-bottom:8px;">';
			html += '<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px;">';
			html += '<span>' + esc(dd.id || '') + ' ' + esc(dd.label || '') + '</span>';
			html += '<span>' + (dd.before !== undefined ? dd.before.toFixed(1) : '-') + ' → ' + (dd.after !== undefined ? dd.after.toFixed(1) : '-') + '</span></div>';
			html += '<div style="height:6px;background:var(--surface2);border-radius:3px;position:relative;">';
			html += '<div style="position:absolute;height:100%;width:' + Math.min(dd.before || 0, 100) + '%;background:var(--border);border-radius:3px;opacity:0.5;"></div>';
			html += '<div style="position:absolute;height:100%;width:' + Math.min(dd.after || 0, 100) + '%;background:' + scoreColor(dd.after || 0) + ';border-radius:3px;"></div>';
			html += '</div></div>';
		}
		html += '</div></div>';
	}

	// LLM Verdict
	if (v.llm_verdict) {
		var lv = v.llm_verdict;
		html += '<div class="card" style="padding:16px;">';
		html += '<h3 style="font-size:14px;margin-bottom:12px;">LLM Quality Verdict</h3>';
		if (lv.llm_friendliness_verdict) {
			html += '<div style="margin-bottom:12px;"><span class="verdict-badge verdict-' + lv.llm_friendliness_verdict + '">' + esc(lv.llm_friendliness_verdict.replace(/_/g, ' ').toUpperCase()) + '</span>';
			if (lv.confidence !== undefined) html += ' <span style="font-size:11px;color:var(--text-muted);">Confidence: ' + Math.round(lv.confidence * 100) + '%</span>';
			html += '</div>';
		}
		if (lv.improved_aspects && lv.improved_aspects.length > 0) {
			html += '<div style="margin-bottom:10px;"><strong style="font-size:12px;color:var(--success);">Improved Aspects:</strong><ul style="margin:4px 0 0 16px;font-size:12px;">';
			lv.improved_aspects.forEach(function(a) { html += '<li>' + esc(a) + '</li>'; });
			html += '</ul></div>';
		}
		if (lv.remaining_issues && lv.remaining_issues.length > 0) {
			html += '<div style="margin-bottom:10px;"><strong style="font-size:12px;color:var(--danger);">Remaining Issues:</strong><ul style="margin:4px 0 0 16px;font-size:12px;">';
			lv.remaining_issues.forEach(function(a) { html += '<li>' + esc(a) + '</li>'; });
			html += '</ul></div>';
		}
		if (lv.specific_recommendations && lv.specific_recommendations.length > 0) {
			html += '<div><strong style="font-size:12px;color:var(--primary);">Recommendations:</strong><ul style="margin:4px 0 0 16px;font-size:12px;">';
			lv.specific_recommendations.forEach(function(a) { html += '<li>' + esc(a) + '</li>'; });
			html += '</ul></div>';
		}
		html += '</div>';
	}

	// After dimensions
	if (v.after_dimensions && v.after_dimensions.length > 0) {
		html += collapsible('After Dimensions (상세)', (function() {
			var h = '<table class="eval-page-table"><thead><tr><th>ID</th><th>Label</th><th>Score</th><th>Weight</th><th>Details</th></tr></thead><tbody>';
			v.after_dimensions.forEach(function(d) {
				h += '<tr><td>' + esc(d.id || '') + '</td><td>' + esc(d.label || '') + '</td>';
				h += '<td style="color:' + scoreColor(d.score || 0) + ';font-weight:600;">' + (d.score || 0) + '</td>';
				h += '<td>' + (d.weight || 0) + '</td>';
				h += '<td style="font-size:11px;">' + (d.details ? d.details.map(esc).join(', ') : '-') + '</td></tr>';
			});
			h += '</tbody></table>';
			return h;
		})());
	}

	// Page deltas
	if (v.page_deltas && v.page_deltas.length > 0) {
		html += collapsible('Page Deltas (멀티페이지)', (function() {
			var h = '<table class="eval-page-table"><thead><tr><th>URL</th><th>Before</th><th>After</th><th>Delta</th></tr></thead><tbody>';
			v.page_deltas.forEach(function(pd) {
				var pdColor = pd.delta > 0 ? 'var(--success)' : pd.delta < 0 ? 'var(--danger)' : 'var(--text-muted)';
				h += '<tr><td style="font-family:monospace;font-size:11px;">' + esc(pd.url || pd.filename || '') + '</td>';
				h += '<td>' + (pd.before !== undefined ? pd.before.toFixed(1) : '-') + '</td>';
				h += '<td style="color:' + scoreColor(pd.after || 0) + ';font-weight:600;">' + (pd.after !== undefined ? pd.after.toFixed(1) : '-') + '</td>';
				h += '<td style="color:' + pdColor + ';font-weight:600;">' + (pd.delta > 0 ? '+' : '') + (pd.delta !== undefined ? pd.delta.toFixed(1) : '-') + '</td></tr>';
			});
			h += '</tbody></table>';
			return h;
		})());
	}

	// Raw validation data
	html += collapsible('Raw Validation Data (JSON)', jsonBlock(v));

	return html;
}

// ── Tab: Final Report ────────────────────────────────
function renderFinalReportTab(data) {
	var html = '';
	var v = data.validation;

	// Pipeline summary
	html += '<div class="card" style="padding:16px;">';
	html += '<h3 style="font-size:16px;margin-bottom:16px;">Pipeline Final Report</h3>';

	// Score summary
	var iScore = data.initial_score || 0;
	var fScore = data.final_score || iScore;
	var delta = data.delta || 0;
	html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;">';
	html += '<div class="rich-metric-card"><div class="metric-value" style="color:' + scoreColor(iScore) + ';">' + iScore.toFixed(1) + '</div><div class="metric-label">Initial Score</div></div>';
	html += '<div class="rich-metric-card"><div class="metric-value" style="color:' + scoreColor(fScore) + ';">' + fScore.toFixed(1) + '</div><div class="metric-label">Final Score</div></div>';
	html += '<div class="rich-metric-card"><div class="metric-value">' + deltaBadge(delta) + '</div><div class="metric-label">Delta</div></div>';
	html += '<div class="rich-metric-card"><div class="metric-value" style="font-size:16px;">' + esc(data.initial_grade || 'N/A') + '</div><div class="metric-label">Grade</div></div>';
	html += '<div class="rich-metric-card"><div class="metric-value" style="font-size:16px;">' + esc(data.site_type || 'N/A') + '</div><div class="metric-label">Site Type</div></div>';
	html += '</div>';

	// LLM Models
	if (data.llm_models_used && data.llm_models_used.length > 0) {
		html += '<div style="margin-bottom:12px;font-size:12px;"><strong>LLM Models:</strong> ';
		data.llm_models_used.forEach(function(m) {
			html += '<code style="background:rgba(59,130,246,0.15);color:#93C5FD;padding:2px 8px;border-radius:4px;margin-right:6px;">' + esc(m) + '</code>';
		});
		html += '</div>';
	}
	html += '</div>';

	// Validation verdict summary
	if (v && v.llm_verdict) {
		html += '<div class="card" style="padding:16px;">';
		html += '<h3 style="font-size:14px;margin-bottom:12px;">Validation Verdict</h3>';
		html += '<span class="verdict-badge verdict-' + (v.llm_verdict.llm_friendliness_verdict || 'no_change') + '">' + esc((v.llm_verdict.llm_friendliness_verdict || 'N/A').replace(/_/g, ' ').toUpperCase()) + '</span>';
		if (v.stop_reason) html += ' <span style="font-size:12px;color:var(--text-muted);">(' + esc(v.stop_reason) + ')</span>';
		html += '</div>';
	}

	// Stage timeline
	if (data.stages && data.stages.length > 0) {
		html += '<div class="card" style="padding:16px;">';
		html += '<h3 style="font-size:14px;margin-bottom:12px;">Stage Timeline</h3>';
		var totalDuration = 0;
		for (var i = 0; i < data.stages.length; i++) {
			var s = data.stages[i];
			var icon = s.status === 'completed' ? '✅' : s.status === 'failed' ? '❌' : s.status === 'running' ? '🔄' : '⏳';
			var dur = s.duration_ms ? ' (' + (s.duration_ms / 1000).toFixed(1) + 's)' : '';
			if (s.duration_ms) totalDuration += s.duration_ms;
			html += '<div style="padding:6px 0;border-bottom:1px solid rgba(55,65,81,0.3);font-size:13px;">';
			html += icon + ' <strong>' + esc(s.stage) + '</strong>' + dur;
			if (s.result_summary) html += '<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">' + esc(s.result_summary) + '</div>';
			html += '</div>';
		}
		html += '<div style="margin-top:10px;font-size:12px;color:var(--text-muted);">Total: ' + (totalDuration / 1000).toFixed(1) + 's | Stages: ' + data.stages.length + '</div>';
		html += '</div>';
	}

	// LLM Errors
	if (data.llm_errors && data.llm_errors.length > 0) {
		html += '<div class="card" style="padding:16px;border-color:var(--danger);">';
		html += '<h3 style="font-size:14px;color:var(--danger);margin-bottom:8px;">LLM Errors (' + data.llm_errors.length + ')</h3>';
		html += '<ul style="margin-left:16px;font-size:12px;">';
		data.llm_errors.forEach(function(e) { html += '<li style="color:var(--text-muted);margin-bottom:4px;">' + esc(e) + '</li>'; });
		html += '</ul></div>';
	}

	return html;
}

// ── Tab: Raw Data ────────────────────────────────────
function renderRawDataTab(data) {
	var html = '<div class="card" style="padding:16px;">';
	html += '<h3 style="font-size:14px;margin-bottom:12px;">Raw Data (Debugging)</h3>';
	html += '<p style="font-size:12px;color:var(--text-muted);margin-bottom:16px;">파이프라인에서 수집된 모든 데이터를 JSON으로 확인할 수 있습니다.</p>';

	if (data.rich_report) html += collapsible('Rich Report (LLM 10-Tab)', jsonBlock(data.rich_report));
	if (data.analysis_report) html += collapsible('Analysis Report (ANALYZING result_full)', jsonBlock(data.analysis_report));
	if (data.validation) html += collapsible('Validation Report (VALIDATING result_full)', jsonBlock(data.validation));
	if (data.synthetic_probes) html += collapsible('Synthetic Probes', jsonBlock(data.synthetic_probes));
	if (data.multi_provider_probes) html += collapsible('Multi-Provider Probes (A-0)', jsonBlock(data.multi_provider_probes));
	if (data.probe_mode) html += collapsible('Probe Mode', jsonBlock({ probe_mode: data.probe_mode }));
	if (data.eval_data) html += collapsible('Eval Data (정적 추출)', jsonBlock(data.eval_data));
	if (data.dimensions) html += collapsible('Dimensions', jsonBlock(data.dimensions));

	html += '</div>';
	return html;
}

// ── Tab 10: Pipeline ─────────────────────────────────
function renderPipelineTab(data) {
	var html = '';
	if (!data.stages || data.stages.length === 0) return '<div class="empty">No pipeline execution data.</div>';

	html += '<div class="card"><h3 style="font-size:14px;margin-bottom:12px;">⏱️ 파이프라인 실행 요약</h3>';
	for (var i = 0; i < data.stages.length; i++) {
		var s = data.stages[i];
		var icon = s.status === 'completed' ? '✅' : s.status === 'failed' ? '❌' : s.status === 'running' ? '🔄' : '⏳';
		var dur = s.duration_ms ? ' (' + (s.duration_ms / 1000).toFixed(1) + 's)' : '';
		html += '<div style="padding:8px 0;border-bottom:1px solid rgba(55,65,81,0.3);font-size:13px;">';
		html += icon + ' <strong>' + esc(s.stage) + '</strong>' + dur;
		if (s.result_summary) html += '<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">' + esc(s.result_summary) + '</div>';
		html += '</div>';
	}
	html += '</div>';
	return html;
}

function buildLLMLogTab(data) {
	// Auto-load LLM Call Log
	setTimeout(loadLLMCallLog, 0);
	return '<div class="card" id="llmLogContainer">' +
		'<h3 style="font-size:14px;margin-bottom:12px;">🔎 LLM Call Log</h3>' +
		'<p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">파이프라인에서 LLM에 보낸 모든 요청과 응답을 시간순으로 표시합니다. 각 행을 클릭하면 상세 내용을 볼 수 있습니다.</p>' +
		'<div style="display:flex;gap:8px;margin-bottom:12px;">' +
		'<button class="btn btn-primary btn-sm" onclick="loadLLMCallLog()">🔄 Refresh</button>' +
		'</div>' +
		'<div id="llmLogContent"><div style="color:var(--text-muted);font-size:12px;">Loading...</div></div>' +
		'</div>';
}

async function loadLLMCallLog() {
	var btn = document.querySelector('#llmLogContainer button');
	if (btn) btn.disabled = true;
	var container = document.getElementById('llmLogContent');
	container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;">Loading...</div>';
	try {
		var sel = document.getElementById('evalTargetSelect');
		var targetId = sel ? sel.value : '';
		var pipSel = document.getElementById('evalPipelineSelect');
		var pipelineId = pipSel ? pipSel.value : '';
		if (!targetId || !pipelineId) { container.innerHTML = '<div class="empty">Select a target and pipeline first.</div>'; return; }
		var resp = await api('/api/targets/' + targetId + '/pipeline/' + pipelineId + '/llm-log');
		if (!resp.llm_call_log || resp.llm_call_log.length === 0) {
			container.innerHTML = '<div class="empty">No LLM calls recorded. Pipeline may have run in rule-based mode (no API Key).</div>';
			return;
		}
		var html = '<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">Total: ' + resp.total_calls + ' calls | Models: <code>' + esc((resp.llm_models_used||[]).join(', ')) + '</code></div>';
		html += '<table class="eval-table" style="font-size:11px;"><thead><tr><th>#</th><th>Stage</th><th>Model</th><th>Duration</th><th>Tokens</th><th>Prompt (click to expand)</th></tr></thead><tbody>';
		for (var i = 0; i < resp.llm_call_log.length; i++) {
			var e = resp.llm_call_log[i];
			var tokStr = (e.tokens_in || '?') + '→' + (e.tokens_out || '?');
			var durStr = (e.duration_ms / 1000).toFixed(1) + 's';
			var errBadge = e.error ? ' <span class="badge badge-red">ERROR</span>' : '';
			html += '<tr onclick="toggleLLMDetail(this)" style="cursor:pointer;">';
			html += '<td>' + e.seq + '</td>';
			html += '<td>' + esc(e.stage) + '</td>';
			html += '<td><code>' + esc(e.provider + '/' + e.model) + '</code>' + errBadge + '</td>';
			html += '<td>' + durStr + '</td>';
			html += '<td>' + tokStr + '</td>';
			html += '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(e.prompt_summary.slice(0, 80)) + '...</td>';
			html += '</tr>';
			html += '<tr class="llm-detail-row" style="display:none;"><td colspan="6">';
			html += '<div style="background:rgba(0,0,0,0.3);padding:12px;border-radius:6px;max-height:500px;overflow:auto;">';
			if (e.system_instruction_summary) {
				html += '<div style="margin-bottom:8px;"><strong>🔧 System Instruction:</strong></div>';
				html += '<pre style="white-space:pre-wrap;font-size:11px;color:#9ca3af;max-height:120px;overflow:auto;border-left:3px solid #6366f1;padding-left:8px;">' + esc(e.system_instruction_summary) + '</pre>';
			}
			if (e.request_params) {
				var params = [];
				if (e.request_params.temperature !== undefined) params.push('temp=' + e.request_params.temperature);
				if (e.request_params.max_tokens !== undefined) params.push('max_tokens=' + e.request_params.max_tokens);
				if (e.request_params.json_mode !== undefined) params.push('json_mode=' + e.request_params.json_mode);
				if (params.length > 0) {
					html += '<div style="margin-bottom:8px;font-size:11px;color:#9ca3af;">⚙️ <strong>Params:</strong> ' + esc(params.join(', ')) + '</div>';
				}
			}
			html += '<div style="margin-bottom:8px;"><strong>📤 Prompt:</strong></div>';
			html += '<pre style="white-space:pre-wrap;font-size:11px;color:var(--text-muted);max-height:200px;overflow:auto;">' + esc(e.prompt_summary) + '</pre>';
			if (e.error) {
				html += '<div style="margin-top:8px;"><strong style="color:var(--error);">❌ Error:</strong></div>';
				html += '<pre style="white-space:pre-wrap;font-size:11px;color:var(--error);">' + esc(e.error) + '</pre>';
			} else {
				html += '<div style="margin-top:8px;"><strong>📥 Response:</strong></div>';
				html += '<pre style="white-space:pre-wrap;font-size:11px;color:var(--text-muted);max-height:200px;overflow:auto;">' + esc(e.response_summary) + '</pre>';
			}
			html += '</div></td></tr>';
		}
		html += '</tbody></table>';
		container.innerHTML = html;
	} catch (err) {
		container.innerHTML = '<div style="color:var(--error);">Failed to load: ' + esc(err.message) + '</div>';
	}
}

function toggleLLMDetail(row) {
	var detail = row.nextElementSibling;
	if (detail && detail.classList.contains('llm-detail-row')) {
		detail.style.display = detail.style.display === 'none' ? 'table-row' : 'none';
	}
}

// ── Agent Prompts ────────────────────────────────────
async function loadPrompts() {
	try {
		prompts = await api('/api/settings/agents/prompts');
		renderPrompts();
	} catch (e) { toast(e.message, 'error'); }
}

function renderPrompts() {
	const container = document.getElementById('promptsContent');
	container.innerHTML = prompts.map(p => `<div class="card">
		<div style="display:flex;justify-content:space-between;align-items:center;">
			<div>
				<h2>${esc(p.agent_id)}</h2>
				<div style="font-size:12px;color:var(--text-muted);">
					${p.is_customized ? '<span class="badge badge-yellow">Customized</span>' : '<span class="badge badge-gray">Default</span>'}
					${p.last_modified ? ' | Last modified: ' + new Date(p.last_modified).toLocaleString() : ''}
				</div>
			</div>
			<button class="btn btn-ghost btn-sm" onclick="editPrompt('${p.agent_id}')">Edit</button>
		</div>
		<div style="margin-top:8px;font-size:12px;color:var(--text-muted);white-space:pre-wrap;max-height:60px;overflow:hidden;">${esc((p.system_instruction||'').slice(0,200))}...</div>
	</div>`).join('');
}

function editPrompt(agentId) {
	const p = prompts.find(x => x.agent_id === agentId);
	if (!p) return;
	document.getElementById('promptModalTitle').textContent = 'Edit: ' + agentId;
	document.getElementById('promptEditId').value = agentId;
	document.getElementById('promptText').value = p.system_instruction || '';
	document.getElementById('promptModal').classList.remove('hidden');
}

async function savePrompt() {
	const agentId = document.getElementById('promptEditId').value;
	try {
		await api('/api/settings/agents/prompts/' + agentId, {
			method: 'PUT',
			body: { system_instruction: document.getElementById('promptText').value },
		});
		toast('Prompt saved');
		closeModal('promptModal');
		loadPrompts();
	} catch (e) { toast(e.message, 'error'); }
}

async function resetPrompt() {
	const agentId = document.getElementById('promptEditId').value;
	try {
		await api('/api/settings/agents/prompts/' + agentId + '/reset', { method: 'POST' });
		toast('Prompt reset to default');
		closeModal('promptModal');
		loadPrompts();
	} catch (e) { toast(e.message, 'error'); }
}

async function resetAllPrompts() {
	if (!confirm('Reset all agent prompts to defaults?')) return;
	try {
		await api('/api/settings/agents/prompts/reset-all', { method: 'POST' });
		toast('All prompts reset');
		loadPrompts();
	} catch (e) { toast(e.message, 'error'); }
}

// ── LLM Providers ────────────────────────────────────
async function loadLLMProviders() {
	try {
		providers = await api('/api/settings/llm-providers');
		renderLLMProviders();
	} catch (e) { toast(e.message, 'error'); }
}

function renderLLMProviders() {
	const container = document.getElementById('llmContent');
	container.innerHTML = providers.map(p => `<div class="card">
		<div style="display:flex;justify-content:space-between;align-items:center;">
			<div>
				<h2>${esc(p.display_name)}</h2>
				<div style="font-size:12px;color:var(--text-muted);">
					Model: ${esc(p.default_model)} | Auth: ${p.auth_method}
					${p.api_key ? ' | Key: ' + p.api_key.slice(0,8) + '...' : ''}
				</div>
			</div>
			<div style="display:flex;gap:8px;align-items:center;">
				<label class="toggle">
					<input type="checkbox" ${p.enabled ? 'checked' : ''} onchange="toggleProvider('${p.provider_id}', this.checked)">
					<span class="slider"></span>
				</label>
				<button class="btn btn-ghost btn-sm" onclick="editLLMProvider('${p.provider_id}')">Edit</button>
			</div>
		</div>
	</div>`).join('');
}

async function toggleProvider(id, enabled) {
	try {
		await api('/api/settings/llm-providers/' + id + '/' + (enabled ? 'enable' : 'disable'), { method: 'POST' });
		toast(id + ' ' + (enabled ? 'enabled' : 'disabled'));
		loadLLMProviders();
	} catch (e) { toast(e.message, 'error'); }
}

function editLLMProvider(id) {
	const p = providers.find(x => x.provider_id === id);
	if (!p) return;
	document.getElementById('llmModalTitle').textContent = 'Edit: ' + p.display_name;
	document.getElementById('llmEditId').value = id;
	document.getElementById('llmApiKey').value = '';
	document.getElementById('llmBaseUrl').value = p.api_base_url || '';
	document.getElementById('llmModel').value = p.default_model || '';
	document.getElementById('llmMaxTokens').value = p.max_tokens || '';
	document.getElementById('llmTemp').value = p.temperature ?? '';
	document.getElementById('llmModal').classList.remove('hidden');
}

async function saveLLMProvider() {
	const id = document.getElementById('llmEditId').value;
	const body = {
		default_model: document.getElementById('llmModel').value,
		api_base_url: document.getElementById('llmBaseUrl').value || undefined,
		max_tokens: Number(document.getElementById('llmMaxTokens').value) || undefined,
		temperature: Number(document.getElementById('llmTemp').value) || undefined,
	};
	const apiKey = document.getElementById('llmApiKey').value;
	if (apiKey) body.api_key = apiKey;
	try {
		await api('/api/settings/llm-providers/' + id, { method: 'PUT', body });
		toast('Provider saved');
		closeModal('llmModal');
		loadLLMProviders();
	} catch (e) { toast(e.message, 'error'); }
}

async function resetAllProviders() {
	if (!confirm('Reset all LLM providers to defaults?')) return;
	try {
		await api('/api/settings/llm-providers/reset-all', { method: 'POST' });
		toast('All providers reset');
		loadLLMProviders();
	} catch (e) { toast(e.message, 'error'); }
}

// ── Utils ────────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
var escHtml = esc;

function collapsible(title, contentHtml, defaultOpen) {
	return '<details class="collapsible"' + (defaultOpen ? ' open' : '') + '>' +
		'<summary>' + esc(title) + '</summary>' +
		'<div class="collapsible-content">' + contentHtml + '</div></details>';
}

function jsonBlock(obj) {
	return '<pre style="white-space:pre-wrap;font-size:11px;color:var(--text-muted);max-height:600px;overflow:auto;padding:12px;background:rgba(0,0,0,0.3);border-radius:6px;">' + esc(JSON.stringify(obj, null, 2)) + '</pre>';
}

// ── Eval Data Helpers (for collapsible supplementary sections) ──
function renderEvalCrawlability(ed) {
	var html = '';
	if (!ed.bot_policies) return '<div class="empty">No eval_data crawlability.</div>';
	html += '<table class="eval-page-table"><thead><tr><th>AI Bot</th><th>Service</th><th>Status</th><th>Blocked Paths</th></tr></thead><tbody>';
	for (var i = 0; i < ed.bot_policies.length; i++) {
		var bot = ed.bot_policies[i];
		var stStyle = bot.status === 'allowed' ? 'color:var(--success)' : bot.status === 'blocked' ? 'color:var(--danger)' : 'color:var(--warning)';
		html += '<tr><td><code>' + esc(bot.bot_name) + '</code></td><td>' + esc(bot.service) + '</td>';
		html += '<td style="' + stStyle + ';font-weight:600;">' + esc(bot.status) + '</td>';
		html += '<td style="font-size:11px;">' + (bot.disallowed_paths && bot.disallowed_paths.length > 0 ? esc(bot.disallowed_paths.slice(0, 3).join(', ')) : '-') + '</td></tr>';
	}
	html += '</tbody></table>';
	return html;
}
function renderEvalStructure(ed) {
	if (!ed.schema_coverage) return '';
	var html = '<table class="eval-page-table"><thead><tr><th>Schema</th><th>Present</th><th>Quality</th><th>Details</th></tr></thead><tbody>';
	for (var i = 0; i < ed.schema_coverage.length; i++) {
		var sc = ed.schema_coverage[i];
		html += '<tr><td>' + esc(sc.schema_type) + '</td><td>' + (sc.present ? '✅' : '❌') + '</td>';
		html += '<td>' + esc(sc.quality || '') + '</td><td style="font-size:11px;">' + esc(sc.details || '') + '</td></tr>';
	}
	html += '</tbody></table>';
	return html;
}
function renderEvalProducts(ed) {
	if (!ed.product_info || ed.product_info.length === 0) return '';
	var html = '<table class="eval-page-table"><thead><tr><th>Page</th><th>Product</th><th>Price</th><th>Schema Spec</th><th>Rating</th></tr></thead><tbody>';
	for (var i = 0; i < ed.product_info.length; i++) {
		var pi = ed.product_info[i];
		html += '<tr><td style="font-size:11px;">' + esc(pi.filename || '') + '</td>';
		html += '<td>' + (pi.info.product_name ? esc(pi.info.product_name) : '❌') + '</td>';
		html += '<td>' + (pi.info.prices.length > 0 ? esc(pi.info.prices[0]) : '❌') + '</td>';
		html += '<td>' + (pi.info.specs_in_schema.length > 0 ? pi.info.specs_in_schema.length : '❌') + '</td>';
		html += '<td>' + (pi.info.has_aggregate_rating ? '✅' : '❌') + '</td></tr>';
	}
	html += '</tbody></table>';
	return html;
}
function renderEvalBrand(ed) {
	if (!ed.marketing_claims || ed.marketing_claims.length === 0) return '';
	var html = '<table class="eval-page-table"><thead><tr><th>Claim</th><th>Source</th><th>Verifiability</th></tr></thead><tbody>';
	for (var i = 0; i < ed.marketing_claims.length; i++) {
		var cl = ed.marketing_claims[i];
		html += '<tr><td style="font-size:12px;max-width:350px;">' + esc(cl.text) + '</td>';
		html += '<td>' + (cl.has_source ? '✅' : '❌') + '</td>';
		html += '<td>' + esc(cl.verifiability || '') + '</td></tr>';
	}
	html += '</tbody></table>';
	return html;
}
function renderEvalEvidenceContent(ed) {
	var html = '';
	if (ed.schema_coverage) {
		var impl = ed.schema_coverage.filter(function(s) { return s.present; });
		var miss = ed.schema_coverage.filter(function(s) { return !s.present; });
		html += '<div style="margin-bottom:12px;"><strong style="font-size:12px;">Implemented: ' + impl.length + '/' + ed.schema_coverage.length + '</strong></div>';
		impl.forEach(function(s) { html += '<div style="font-size:11px;padding:4px 0;">' + esc(s.schema_type) + ' — ' + esc(s.quality || '') + '</div>'; });
		if (miss.length > 0) {
			html += '<div style="margin-top:8px;"><strong style="font-size:12px;color:var(--danger);">Missing:</strong></div>';
			miss.forEach(function(s) { html += '<div style="font-size:11px;padding:4px 0;color:var(--danger);">' + esc(s.schema_type) + '</div>'; });
		}
	}
	if (ed.product_info && ed.product_info.length > 0) {
		html += '<div style="margin-top:12px;">' + renderEvalProducts(ed) + '</div>';
	}
	return html || '<div>No eval evidence data</div>';
}
function renderEvalRecommendations(ed) {
	if (!ed.improvements || ed.improvements.length === 0) return '';
	var sprintLabels = { 1: '\uC989\uC2DC \uC2E4\uD589', 2: '1~3\uAC1C\uC6D4', 3: '\uBD84\uAE30 \uB0B4' };
	var diffLabels = { 1: '\uC27D\uC74C', 2: '\uBCF4\uD1B5', 3: '\uB09C\uC774\uB3C4 \uB192\uC74C', 4: '\uB9E4\uC6B0 \uB09C\uD574', 5: '\uB9E4\uC6B0 \uB09C\uD574' };
	var html = '<table class="eval-page-table"><thead><tr><th>#</th><th>\uD56D\uBAA9</th><th>\uC601\uD5A5\uB3C4</th><th>\uB09C\uC774\uB3C4</th><th>\uC2E4\uD589 \uC2DC\uAE30</th></tr></thead><tbody>';
	for (var i = 0; i < ed.improvements.length; i++) {
		var r = ed.improvements[i];
		html += '<tr><td>' + esc(r.id) + '</td><td>' + esc(r.title) + '</td>';
		html += '<td>' + r.impact + '/5</td><td>' + (diffLabels[r.difficulty] || r.difficulty) + '</td>';
		html += '<td>' + (sprintLabels[r.sprint] || 'Sprint ' + r.sprint) + '</td></tr>';
	}
	html += '</tbody></table>';
	return html;
}

// ── Init ─────────────────────────────────────────────
checkHealth();

// Load version info (build-time commit SHA + date/time)
api('/api/version').then(function(v) {
	var parts = v.date.split(' ');
	var dateStr = parts[0] || '';
	var timeStr = (parts[1] || '').replace(/:\d{2}$/, ''); // HH:MM (drop seconds)
	var display = v.short + ' · ' + dateStr + ' ' + timeStr;
	document.getElementById('versionInfo').textContent = display.trim();
	document.getElementById('versionInfo').title = 'Build Commit: ' + v.sha + '\nDate: ' + v.date;
}).catch(function() { /* ignore */ });

// Restore active tab from URL hash, default to 'targets'
var initTab = (window.location.hash || '').replace('#', '') || 'targets';
var validTabs = ['targets', 'pipelines', 'prompts', 'evaluation', 'llm'];
if (validTabs.indexOf(initTab) === -1) initTab = 'targets';
switchTab(initTab);

// Initialize SSE for real-time updates
initSSE();
</script>
</body>
